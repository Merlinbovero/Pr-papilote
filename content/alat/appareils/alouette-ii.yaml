content:
  essentiel:
    body: |
      L'**Alouette II** (SE3130) est une double pionnière : c'est le **premier
      hélicoptère de série à turbine au monde** (premier vol le **12 mars
      1955**), et la **première génération** d'hélicoptères à turbine de l'ALAT.
      Elle ouvre l'ère de l'aviation légère moderne.

      Motorisée par une turbine **Turbomeca Artouste**, plus légère et plus
      puissante qu'un moteur à pistons, elle offre à l'armée de Terre un
      appareil **agile** pour la **liaison**, l'**observation**, l'**évacuation
      sanitaire** et le **transport léger** (750 kg sous élingue). L'ALAT en a
      reçu **176 SE3130**.

      Engagée dès la **guerre d'Algérie**, elle y a mené ravitaillements,
      évacuations et dépose de commandos, et a servi aux **premiers essais** de
      **missiles antichar** héliportés (AS10, AS11) — l'amorce de l'aérocombat.
      Le SE3130 (turbine **Artouste**) sera plus tard complété par une version
      remotorisée, la **SA318C** (turbine **Astazou**).
    aRetenir:
      - Alouette II (SE3130) — premier hélicoptère de série à turbine au monde (premier vol 1955) et pionnière de l'ALAT.
      - 176 SE3130 reçus par l'ALAT ; turbine Turbomeca Artouste.
      - Rôles fondateurs — liaison, observation, évacuation sanitaire, transport léger, premiers essais antichar (AS10/AS11).
      - À distinguer de la SA318C (version remotorisée avec turbine Astazou).
  sections:
    - id: la-revolution-de-la-turbine
      title: La révolution de la turbine
      body: |
        Jusqu'aux années 1950, les hélicoptères sont propulsés par de lourds
        **moteurs à pistons**, peu puissants et fragiles. L'Alouette II change
        tout : elle est le **premier hélicoptère de série** équipé d'une
        **turbine à gaz** (Turbomeca **Artouste**), plus **légère**, plus
        **puissante** et plus **fiable**.

        Ce saut technologique donne à l'aviation légère un appareil réellement
        **opérationnel** : capable d'emporter une charge utile, de travailler en
        montagne, de se poser sur des terrains sommaires. C'est le début de
        l'**hélicoptère utilitaire** moderne — et le point de départ de la
        longue lignée des **Alouette** puis des hélicoptères français.
    - id: pionniere-de-l-aerocombat
      title: Pionnière de l'aérocombat (à savoir)
      strate: maitriser
      body: |
        Pendant la **guerre d'Algérie**, l'Alouette II démontre l'intérêt
        militaire de l'hélicoptère : **évacuation sanitaire** au plus près des
        combats, **ravitaillement**, **liaison** et dépose de **commandos**.
        Surtout, elle sert de banc d'essai aux **premiers missiles antichar**
        filoguidés (**AS10**, **AS11**) tirés depuis un hélicoptère — l'ancêtre
        de la **lutte antichar** qui fera plus tard la spécialité de la Gazelle
        et du Tigre.

        Attention à la **variante** : le **SE3130** est la version d'origine, à
        turbine **Artouste**. Une version remotorisée, le **SA318C**, adopte la
        turbine **Astazou** (leurs caractéristiques diffèrent légèrement). La
        relève viendra ensuite de l'**Alouette III**, plus grande, puis de la
        **Gazelle**.
  pieges:
    - L'Alouette II est un hélicoptère léger — pas un appareil de manœuvre (transport lourd) comme le Puma.
    - Elle est retirée du service — c'est un appareil fondateur du patrimoine de l'ALAT.
    - Deux variantes à ne pas confondre — le SE3130 (turbine Artouste) et le SA318C remotorisé (turbine Astazou).
