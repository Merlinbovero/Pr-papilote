content:
  essentiel:
    body: |
      L'**Alouette III** (SA316) est un **hélicoptère léger polyvalent** qui fut,
      des années 1960 aux années 1990, l'un des **piliers historiques** de
      l'ALAT. Monoturbine à **sept places**, robuste et simple, elle a formé des
      générations d'équipages et rempli presque toutes les missions de
      l'aviation légère.

      Livrée à l'ALAT à partir de **1963** (**89 exemplaires**), elle assurait la
      **liaison**, l'**observation**, l'**évacuation sanitaire** (deux blessés en
      nacelles extérieures), le **transport léger** (750 kg sous élingue,
      treuil de 175 kg) et, en version armée, la **lutte antichar** avec les
      missiles filoguidés **SS11**.

      Remplacée par la **Gazelle** dans les années 1980, l'Alouette III a volé
      jusqu'en **1999** (dernières unités de l'escadrille de haute montagne).
      Elle appartient au patrimoine de l'ALAT, aux côtés de l'Alouette II qui
      l'avait précédée.
    aRetenir:
      - Alouette III (SA316) — hélicoptère léger polyvalent, pilier historique de l'ALAT (1963-1999).
      - 89 exemplaires livrés dès 1963 ; monoturbine à sept places.
      - Emplois — liaison, observation, évacuation sanitaire, transport léger, lutte antichar (missiles SS11).
      - Remplacée par la Gazelle dans les années 1980 ; dernières unités retirées en 1999.
  sections:
    - id: un-helicoptere-a-tout-faire
      title: Un hélicoptère à tout faire
      body: |
        L'Alouette III doit son succès à sa **polyvalence**. Avec sa cabine de
        **sept places**, son **treuil** et son crochet de charge, elle passe
        d'une mission à l'autre : transporter un groupe léger, hélitreuiller un
        blessé, évacuer des victimes (deux civières en nacelles latérales),
        acheminer du fret **sous élingue** (750 kg), effectuer des liaisons ou
        de l'observation.

        Sa **turbine** unique (Artouste IIIB) et sa conception simple la rendent
        **fiable** et facile à entretenir, y compris sur des terrains sommaires.
        Ces qualités expliquent son immense carrière — plus de **1 400
        exemplaires** construits dans le monde, pour de très nombreux pays.
    - id: de-la-lutte-antichar-a-la-gazelle
      title: De la lutte antichar à la Gazelle (à savoir)
      strate: maitriser
      body: |
        À l'ALAT, l'Alouette III a aussi été un **hélicoptère de combat** avant
        l'heure : équipée de missiles filoguidés **SS11** (AS11), elle a inauguré
        la **lutte antichar** héliportée, une mission qui deviendra centrale
        pour l'aérocombat.

        Dans les années **1980**, la **Gazelle** — plus rapide, plus moderne —
        prend sa relève pour la reconnaissance, la liaison et l'antichar (avec
        le missile HOT). L'Alouette III se retire progressivement, ses dernières
        unités volant jusqu'en **1999**. Elle reste un jalon : le pont entre les
        pionnières **Alouette II** et les hélicoptères légers modernes de
        l'ALAT.
  pieges:
    - L'Alouette III est un hélicoptère léger polyvalent — pas un hélicoptère de manœuvre lourd comme le Puma.
    - Elle est retirée du service (dernières unités en 1999) — c'est un appareil du patrimoine, remplacé par la Gazelle.
    - À ne pas confondre avec l'Alouette II (SE3130) qui l'a précédée — l'Alouette III est plus grande et plus puissante (sept places, turbine Artouste IIIB).
