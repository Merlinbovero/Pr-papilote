content:
  essentiel:
    body: |
      Le **Caracal** (H225M) est un hélicoptère de **manœuvre lourd**, le
      **dernier standard** de la grande famille française **Puma → Super Puma →
      Cougar → Caracal**. Entré en service en **2006**, c'est l'outil de
      prédilection des **forces spéciales**.

      À l'ALAT, ses **huit** exemplaires arment le **4e régiment d'hélicoptères
      des forces spéciales (4e RHFS)**. Il transporte jusqu'à **28 combattants**
      et se distingue par une **très grande autonomie** — environ **4 heures**,
      et jusqu'à **10 heures** grâce au **ravitaillement en vol**, capacité rare
      pour un hélicoptère.

      Il assure le transport et l'infiltration de commandos, la **RESCO**
      (récupération de personnel en milieu hostile) et le sauvetage. Pour
      opérer au plus près de la menace, il emporte deux **mitrailleuses M3M**,
      un **canon de 20 mm** en sabord et un système d'**autoprotection**
      (détecteurs et lance-leurres). Le Caracal est aussi mis en œuvre par
      l'**armée de l'Air et de l'Espace**.
    aRetenir:
      - Caracal (H225M) — hélicoptère de manœuvre des forces spéciales, dernier de la lignée Puma/Super Puma.
      - À l'ALAT, huit appareils au 4e RHFS ; entré en service en 2006.
      - Très grande autonomie — jusqu'à 10 heures avec ravitaillement en vol.
      - Missions — transport de commandos, RESCO (récupération de personnel), sauvetage ; aussi employé par l'armée de l'Air et de l'Espace.
  sections:
    - id: le-porteur-des-forces-speciales
      title: Le porteur des forces spéciales
      body: |
        Les **forces spéciales** exigent un hélicoptère capable d'**aller loin**,
        de **rester longtemps** sur zone et d'**emporter** un groupe de combat
        avec son matériel. Le Caracal réunit ces qualités.

        Son atout majeur est l'**autonomie** : environ quatre heures de vol, et
        jusqu'à **dix heures** lorsqu'il est **ravitaillé en vol** — une
        capacité qui lui permet d'atteindre des objectifs très éloignés. Il
        peut transporter jusqu'à **28 combattants**, hisser des personnels au
        **treuil**, et opérer de nuit grâce à sa **vision** adaptée au vol
        tactique.

        À l'ALAT, il équipe le **4e RHFS**, le régiment dédié à l'aérocombat
        des opérations spéciales — une spécificité française (seuls la France,
        le Royaume-Uni et les États-Unis alignent une unité d'hélicoptères
        entièrement consacrée aux forces spéciales).
    - id: la-releve-du-puma
      title: La relève du Puma (à savoir)
      strate: maitriser
      body: |
        Le Caracal appartient à la même **famille** que le Puma et le Cougar,
        mais il en est la version la plus **récente** et la plus **capable**.
        Avec le **NH90 Caïman**, il prend la relève des vieux **Puma (SA330)**
        en cours de retrait.

        Attention à ne pas le confondre avec le **Cougar** (AS532), la
        génération précédente : le Caracal (H225M) est plus **moderne**,
        pensé pour la **haute intensité** et la **projection lointaine** des
        forces spéciales. C'est aussi un appareil **interarmées** — l'armée de
        l'Air et de l'Espace en met en œuvre pour la RESCO.
  pieges:
    - Le Caracal est un hélicoptère de manœuvre (transport) — pas un hélicoptère d'attaque comme le Tigre.
    - À l'ALAT, il équipe spécifiquement le 4e RHFS (forces spéciales) — huit appareils.
    - C'est un appareil interarmées — mis en œuvre par l'armée de Terre et par l'armée de l'Air et de l'Espace.
