content:
  essentiel:
    body: |
      Le **Puma** (SA330) est l'hélicoptère de **manœuvre** historique de
      l'ALAT — le **pilier de l'héliportage tactique** depuis un
      demi-siècle. Conçu par **Sud-Aviation** dans les années 1960 pour offrir
      à l'armée de Terre un **biturbine** puissant et endurant, il a été livré
      à **118 exemplaires** (SA330B) entre **1969 et 1987**.

      C'est un appareil de **transport** : jusqu'à **16 soldats**, du fret, des
      blessés en évacuation sanitaire, des liaisons. Robuste et polyvalent, il a
      été de tous les engagements de l'armée française pendant des décennies.

      Le Puma est aujourd'hui en **fin de service** : trop coûteux à entretenir
      et de moins en moins disponible, il est **progressivement retiré**
      (échéance 2025-2030) et remplacé par le **NH90 Caïman** et le **Caracal**.
      Il ouvre la lignée **Puma → Super Puma → Cougar → Caracal**.
    aRetenir:
      - Puma (SA330) — hélicoptère de manœuvre historique de l'ALAT, en service depuis 1969.
      - 118 exemplaires (SA330B) livrés entre 1969 et 1987 ; jusqu'à 16 soldats transportés.
      - Tête de la lignée Puma → Super Puma → Cougar → Caracal.
      - En cours de retrait (2025-2030), relevé par le NH90 Caïman et le Caracal.
  sections:
    - id: le-pilier-de-l-heliportage
      title: Le pilier de l'héliportage
      body: |
        Au début des années 1960, l'armée de Terre cherche un hélicoptère de
        **transport tactique** plus puissant que ses appareils à moteur à
        pistons, capable de déplacer un groupe de combat par tous les temps et
        assez compact pour être transporté par un **Transall C-160**.
        Sud-Aviation répond avec le **SA330 Puma**, un **biturbine** moderne.

        Livré dès **1969**, le Puma devient le **cheval de bataille** de
        l'héliportage : transport de troupes, ravitaillement, évacuation
        sanitaire, recherche et sauvetage. Sa **robustesse** et sa
        **polyvalence** en font l'un des symboles de l'ALAT, engagé sur presque
        tous les théâtres où l'armée française a opéré.
    - id: fin-de-service-et-releve
      title: Fin de service et relève (à savoir)
      strate: maitriser
      body: |
        Après un demi-siècle de service, le Puma **vieillit** : sa maintenance
        devient coûteuse et sa **disponibilité** baisse. L'ALAT le **retire**
        donc progressivement, sur la période **2025-2030**.

        Sa relève est assurée par deux appareils plus modernes : le **NH90
        Caïman** (transport tactique) et le **Caracal** (manœuvre des forces
        spéciales) — tous deux déjà en service. Le Puma reste néanmoins la
        **tête** d'une longue lignée : c'est de lui que descendent le Super
        Puma, le Cougar et le Caracal.
  pieges:
    - Le Puma est un hélicoptère de manœuvre (transport) — pas un hélicoptère d'attaque comme le Tigre.
    - Le SA330 Puma (turbines Turmo) est la génération d'origine — à ne pas confondre avec le Cougar (AS532, turbines Makila) ni le Caracal (H225M), ses descendants.
    - Il est en cours de retrait — sa relève est assurée par le NH90 Caïman et le Caracal.
