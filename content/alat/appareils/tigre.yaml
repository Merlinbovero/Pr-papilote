summary: >-
  L'hélicoptère de combat de l'ALAT. Biplace, armé d'un canon de 30 mm et de
  missiles, il appuie les troupes au sol et détruit les blindés. Issu d'une
  coopération franco-allemande, il se décline en versions HAP et HAD.
objectifs:
