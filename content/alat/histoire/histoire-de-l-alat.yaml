title: Histoire de l'ALAT
slug: histoire-de-l-alat
summary: >-
  Des avions d'observation d'artillerie de 1952 aux hélicoptères Tigre, l'ALAT
  a inventé en Algérie la guerre aéromobile, structuré l'aéromobilité avec la
  4e division aéromobile, puis prouvé sa puissance lors de l'opération Daguet.
objectifs:
  - Situer les grandes étapes de l'histoire de l'ALAT (1952-1954, Algérie, 1985, 1991, 2016).
  - Expliquer la naissance de l'aérocombat pendant la guerre d'Algérie.
  - Mobiliser ces repères pour l'entretien de motivation ALAT.
