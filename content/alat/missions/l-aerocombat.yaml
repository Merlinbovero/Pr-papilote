title: L'aérocombat et les missions de l'ALAT
slug: l-aerocombat
summary: >-
  L'aérocombat, c'est combattre par la troisième dimension au profit des
  troupes au sol — reconnaissance, attaque, transport tactique, appui et
  évacuation, sous le commandement du COMALAT et de la 4e brigade d'aérocombat.
objectifs:
  - Définir l'aérocombat et le rôle de l'ALAT au sein de l'armée de Terre.
  - Citer les grandes missions (reconnaissance, attaque, héliportage, appui, évacuation, forces spéciales).
  - Situer le COMALAT et la 4e brigade d'aérocombat dans l'organisation actuelle.
