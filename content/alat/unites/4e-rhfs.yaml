  devise: Nulle part sans nous
content:
  essentiel:
    body: |
      Le **4e régiment d'hélicoptères des forces spéciales** est stationné à
      **Pau**, au quartier de Rose — voisin du 5e RHC, mais dans un monde à
      part : il est la **composante hélicoptères des forces spéciales**
      françaises.

      Rattaché organiquement au commandement des actions spéciales de
      l'armée de Terre, il est **employé par le COS** (commandement des
      opérations spéciales). Ses équipages — environ **500 personnels** —
      assurent **infiltrations**, **exfiltrations** et **appuis** dans les
      environnements les plus **hostiles**, de jour comme de nuit.

      Sa devise résume l'esprit : **« Nulle part sans nous »** — aucune
      opération spéciale d'ampleur ne se conçoit sans sa composante
      aéromobile.
    aRetenir:
      - 4e RHFS — Pau, la composante hélicoptères des forces spéciales, employée par le COS.
      - Filiation — EOS (1993) → DAOS (1er juillet 1997) → 4e RHFS (1er août 2009).
      - Missions — infiltration, exfiltration, appui des forces spéciales, contre-terrorisme.
      - Devise « Nulle part sans nous » ; il ne fait pas partie de la 4e BAC.
  sections:
    - id: filiation-et-statut
      title: Filiation et statut
      body: |
        L'aviation spéciale française s'est construite par étapes :

        1. **1993** — création à Pau de l'**escadrille des opérations
           spéciales (EOS)** au sein du 4e régiment d'hélicoptères de
           commandement et de manœuvre ;
        2. **1er juillet 1997** — le **détachement ALAT des opérations
           spéciales (DAOS)** prend le relais ;
        3. **1er août 2009** — le DAOS devient **régiment** : le 4e RHFS.

        Cette montée en puissance suit celle du **COS**, créé après la
        guerre du Golfe (1992) pour fédérer les forces spéciales des trois
        armées.
    - id: moyens-et-missions
      title: Moyens et missions
      strate: maitriser
      body: |
        Le 4e RHFS met en œuvre un parc **hétérogène et spécialisé** —
        **Caracal**, **Cougar**, **Tigre**, **Gazelle** — adapté aux poser
        d'assaut discrets, à l'appui rapproché et aux longues élongations ;
        18 **NH90 Caïman en version forces spéciales** sont attendus entre
        2026 et 2029 pour moderniser cette flotte (donnée à suivre).

        Ses missions : **infiltrer** et **exfiltrer** les commandos (dont
        ceux du COS), **appuyer** leurs actions, participer au
        **contre-terrorisme** et à la **libération d'otages**. La sélection
        et la qualification de ses équipages comptent parmi les plus
        exigeantes de l'ALAT — un objectif de carrière fréquent chez les
        pilotes confirmés.
  pieges:
    - Le 4e RHFS n'appartient pas à la 4e BAC — il relève des actions spéciales et il est employé par le COS.
    - RHFS ≠ RHC — régiment d'hélicoptères des forces spéciales, pas « de combat ».
    - Deux régiments d'hélicoptères cohabitent à Pau — le 5e RHC (4e BAC) et le 4e RHFS (forces spéciales).
