infobox:
  appellation: 4e régiment d'hélicoptères des forces spéciales (4e RHFS)
  garnison: Quartier de Rose, Pau (Pyrénées-Atlantiques)
  appareils: [Caracal, Cougar, Tigre, Gazelle]
