resumeRevision:
  - Bernoulli — le long d'un écoulement, ps + ½·ρ·V² = constante (pression totale conservée).
  - Vitesse ↑ ⇒ pression statique ↓ (et réciproquement).
  - Effet Venturi — au col d'un rétrécissement, vitesse maximale et pression statique minimale.
  - Hypothèses — fluide peu compressible, sans frottement, le long d'une même ligne de courant.
  - Portance — Bernoulli est un modèle utile mais partiel ; ne jamais invoquer un « temps de parcours égal ».
  - La déviation de l'air (Newton) est la lecture complémentaire de la portance.
