title: Théorème de Bernoulli et effet Venturi
description: >-
  La loi qui relie vitesse et pression dans un écoulement : la pression totale
  se conserve (ps + ½·ρ·V² = constante), donc quand l'air accélère, sa pression
  chute. Application au tube de Venturi et première clé de la portance.
module: fondamentaux
categorieFondamentaux: aerodynamique
matiereBia: aerodynamique-et-principes-du-vol
objectifs:
  - Énoncer le théorème de Bernoulli et relier vitesse et pression statique.
  - Expliquer l'effet Venturi (rétrécissement → vitesse ↑ → pression ↓) et le manipuler.
  - Situer la portée et les limites de Bernoulli pour la portance (modèle partiel, jamais le « temps de parcours égal »).
