slug: couche-limite-et-decrochage
title: La couche limite et le décrochage
description: >-
  La fine couche d'air au contact de l'aile décide de tout : selon qu'elle reste
  collée ou décolle, l'aile porte ou décroche. Ce cours explique la couche
  limite (laminaire, turbulente, Reynolds) et le décollement à l'origine du
  décrochage, avec une interaction pour le voir.
module: fondamentaux
categorieFondamentaux: aerodynamique
matiereBia: aerodynamique-et-principes-du-vol
objectifs:
  - Définir la couche limite et distinguer ses régimes laminaire et turbulent.
  - Situer le rôle du nombre de Reynolds dans la transition laminaire-turbulent.
  - Expliquer le décollement de la couche limite et son lien avec le décrochage.
