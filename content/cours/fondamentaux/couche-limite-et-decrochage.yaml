resumeRevision:
  - La couche limite est la fine pellicule d'air ralentie par la viscosité au contact de l'aile.
  - Elle est d'abord laminaire (filets ordonnés, peu de frottement, fragile) puis turbulente (plus épaisse, mieux accrochée).
  - Le nombre de Reynolds gouverne la transition laminaire → turbulent et sert à la similitude en soufflerie.
  - À forte incidence (au-delà de l'incidence critique), la couche limite décolle de l'extrados.
  - Ce décollement fait chuter la portance — c'est le décrochage ; la correction est de réduire l'incidence.
