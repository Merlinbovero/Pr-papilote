title: Hypersustentateurs et hyposustentateurs
description: >-
  Pour voler lentement sans décrocher, ou au contraire descendre et freiner :
  volets et becs augmentent le Cz max, spoilers et aérofreins réduisent la
  portance ou ajoutent de la traînée. Ce cours compare les deux familles de
  dispositifs mobiles de l'aile.
module: fondamentaux
categorieFondamentaux: aerodynamique
matiereBia: aerodynamique-et-principes-du-vol
objectifs:
  - Expliquer le rôle des dispositifs hypersustentateurs (augmenter le Cz max, abaisser la vitesse de décrochage).
  - Distinguer volets (bord de fuite) et becs (bord d'attaque).
  - Distinguer les dispositifs hyposustentateurs (spoiler, aérofrein) et leurs usages.
