resumeRevision:
  - Les hypersustentateurs augmentent le Cz max — donc abaissent la vitesse de décrochage.
  - Les volets (bord de fuite) augmentent la cambrure (et parfois la surface) ; le Fowler ajoute de la surface, le plus efficace.
  - Les becs (bord d'attaque) retardent le décollement et repoussent l'incidence de décrochage.
  - Configurations — lisse (croisière), décollage (volets modérés), atterrissage (volets et becs au maximum).
  - Les hyposustentateurs font l'inverse — le spoiler détruit la portance, l'aérofrein augmente la traînée pour ralentir.
  - Au toucher des roues, les spoilers plaquent l'avion au sol pour un freinage efficace.
