title: Forces et lois de Newton
description: >-
  Le socle de la mécanique du vol : ce qu'est une force, comment plusieurs
  forces se combinent, et les trois lois de Newton qui expliquent pourquoi un
  avion avance, se soutient et garde sa trajectoire.
module: fondamentaux
categorieFondamentaux: physique
matiereBia: aerodynamique-et-principes-du-vol
objectifs:
  - Décrire une force par ses quatre caractéristiques et la représenter par un vecteur.
  - Énoncer les trois lois de Newton et les relier à des situations de vol.
  - Comprendre qu'une résultante nulle équivaut à une vitesse constante.
