resumeRevision:
  - Une force est un vecteur — point d'application, direction, sens, intensité (unité, le newton).
  - 1ʳᵉ loi (inertie) — résultante nulle ⇔ vitesse constante (ΣF = 0 ⇔ V = cste).
  - 2ᵉ loi — ΣF = m·a ; une résultante non nulle modifie le vecteur vitesse (accélération).
  - 3ᵉ loi (action-réaction) — forces égales, opposées, sur deux corps différents ; c'est le principe de la propulsion.
  - En vol stabilisé, quatre forces agissent mais s'équilibrent — la résultante est nulle.
