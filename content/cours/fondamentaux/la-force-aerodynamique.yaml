resumeRevision:
  - L'air exerce sur l'aile une force unique, la résultante aérodynamique, appliquée au centre de poussée.
  - On la décompose selon le vent relatif — portance (perpendiculaire) et traînée (parallèle, vers l'arrière).
  - F_R² = F_z² + F_x² ; la portance dépassant largement la traînée, la résultante est presque perpendiculaire au vent relatif.
  - Portance et traînée suivent F = ½·ρ·S·V²·C (Cz pour la portance, Cx pour la traînée).
  - Cz et Cx (sans dimension) résument le profil et l'incidence ; on les mesure en soufflerie.
  - La finesse est le rapport Cz/Cx — l'efficacité aérodynamique de l'aile.
