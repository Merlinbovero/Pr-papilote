matiereBia: aerodynamique-et-principes-du-vol
objectifs:
  - Définir la résultante aérodynamique et son point d'application (le centre de poussée).
  - Décomposer la force en portance (perpendiculaire au vent relatif) et traînée (parallèle).
  - Relier portance et traînée à F = ½·ρ·S·V²·C et aux coefficients Cz et Cx.
