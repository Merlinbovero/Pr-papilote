title: "La force aérodynamique : portance et traînée"
description: >-
  L'air exerce sur l'aile une force unique, la résultante aérodynamique. Ce
  cours la décompose en portance et traînée, introduit les coefficients Cz et Cx
  (F = ½·ρ·S·V²·C) et relie le tout aux fiches portance et traînée.
module: fondamentaux
