description: >-
  Toute l'aile sur une seule courbe : la polaire d'Eiffel relie Cz et Cx, une
  incidence par point. Ce cours apprend à y lire les points remarquables —
  traînée mini, finesse maximale, Cz maximal, décrochage — avec une interaction
  pour parcourir la courbe.
