objectifs:
  - Définir la polaire d'Eiffel (Cz en fonction de Cx, une incidence par point).
  - Situer les points remarquables (portance nulle, traînée mini, finesse max, Cz max, décrochage).
  - Relier la finesse maximale à la tangente issue de l'origine de la polaire.
