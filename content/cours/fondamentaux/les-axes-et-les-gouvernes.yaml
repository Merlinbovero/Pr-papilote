title: Les trois axes et les gouvernes
description: >-
  Comment pilote-t-on un avion ? Autour de trois axes passant par le centre de
  gravité — tangage, roulis, lacet — chacun commandé par une gouverne. Ce cours
  associe axes, gouvernes et commandes, avec une interaction pour les manipuler.
