title: Les bilans de forces en vol
description: >-
  Comment les quatre forces s'équilibrent selon la phase de vol : palier,
  montée, descente, plané et virage. Ce cours introduit le facteur de charge et
  son effet sur la vitesse de décrochage.
module: fondamentaux
categorieFondamentaux: aerodynamique
matiereBia: aerodynamique-et-principes-du-vol
objectifs:
  - Établir le bilan des forces en palier, en montée et en descente.
  - Expliquer le virage (portance inclinée) et définir le facteur de charge.
  - Relier le facteur de charge à l'augmentation de la vitesse de décrochage.
