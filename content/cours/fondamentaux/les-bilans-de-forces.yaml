resumeRevision:
  - En vol stabilisé, la résultante des forces est nulle (les quatre forces s'équilibrent).
  - Palier — portance = poids, traction = traînée.
  - Montée — plus de puissance ; descente/plané — une composante du poids « tire » l'avion.
  - L'angle de plané dépend de la finesse (grande finesse = plané tendu, longue distance).
  - En virage, la portance s'incline et augmente — le facteur de charge n = portance/poids passe au-dessus de 1.
  - La vitesse de décrochage est multipliée par √n — un virage serré rapproche du décrochage.
