title: Les effets moteur
description: >-
  Sur un avion à hélice, le moteur produit des effets secondaires qui font
  dévier l'appareil : souffle hélicoïdal, couple de renversement, effet
  gyroscopique et traction asymétrique. Ce cours les explique et rappelle que
  leur sens dépend du sens de rotation de l'hélice.
module: fondamentaux
categorieFondamentaux: aerodynamique
matiereBia: aerodynamique-et-principes-du-vol
objectifs:
  - Nommer les quatre effets moteur et leur origine.
  - Expliquer comment chaque effet fait dévier l'avion.
  - Comprendre que le sens des effets dépend du sens de rotation de l'hélice.
