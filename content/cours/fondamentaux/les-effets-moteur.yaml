resumeRevision:
  - L'hélice produit des effets secondaires qui font dévier l'avion, surtout à forte puissance et basse vitesse.
  - Souffle hélicoïdal — l'air brassé en spirale frappe la dérive et crée un lacet.
  - Couple de renversement — par réaction (Newton), l'avion tend à rouler à l'opposé de l'hélice.
  - Effet gyroscopique — l'hélice réagit à une rotation par une précession décalée de 90°.
  - Traction asymétrique — à forte incidence, la pale descendante décentre la traction (lacet).
  - Le sens de ces effets dépend du sens de rotation de l'hélice ; on les compense au palonnier.
