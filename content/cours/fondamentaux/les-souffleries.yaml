title: Les souffleries
description: >-
  Comment étudie-t-on l'air autour d'une aile ? En inversant le problème : une
  maquette immobile dans un courant d'air maîtrisé (relativité du mouvement). Ce
  cours présente la soufflerie, ses éléments et la mesure des forces.
module: fondamentaux
categorieFondamentaux: aerodynamique
matiereBia: aerodynamique-et-principes-du-vol
objectifs:
  - Expliquer le principe d'une soufflerie (relativité du mouvement entre l'air et la maquette).
  - Nommer les éléments d'une soufflerie et le rôle de chacun.
  - Distinguer circuit ouvert (Eiffel) et fermé (Prandtl) et le rôle de la balance aérodynamique.
