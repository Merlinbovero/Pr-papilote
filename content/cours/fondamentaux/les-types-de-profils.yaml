resumeRevision:
  - L'épaisseur relative = épaisseur maximale / corde (en %) ; épais = porteur à basse vitesse, mince = rapide.
  - La cambrure est la courbure de la ligne moyenne ; un profil symétrique n'est pas cambré.
  - Le calage est l'angle fixe (construction) entre la corde et l'axe de référence — à ne pas confondre avec l'incidence.
  - Biconvexe symétrique (voltige), biconvexe dissymétrique (courant), plan-convexe, creux (lent), autostable (aile volante), supercritique (rapide).
  - Chaque profil est un compromis adapté à un usage — il n'y a pas de profil universel.
