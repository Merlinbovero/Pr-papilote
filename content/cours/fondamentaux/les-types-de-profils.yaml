title: Les profils d'aile — géométrie et types
description: >-
  Un profil se décrit par trois paramètres — épaisseur relative, cambrure,
  calage — qui définissent des familles adaptées à des usages, de la voltige au
  transport rapide. Ce cours les compare et prolonge la fiche « Le profil
  d'aile ».
module: fondamentaux
categorieFondamentaux: aerodynamique
matiereBia: aerodynamique-et-principes-du-vol
objectifs:
  - Définir l'épaisseur relative, la cambrure et le calage d'un profil.
  - Distinguer les grandes familles de profils et leurs caractéristiques.
  - Associer chaque type de profil à un usage typique.
