title: Pression et écoulement de l'air
description: >-
  Comment décrire l'air en mouvement : la pression statique, dynamique et totale
  (q = ½·ρ·V²), la conservation du débit (S·V = constante) et pourquoi l'air
  accélère dans un rétrécissement. Les briques quantitatives de la portance.
module: fondamentaux
categorieFondamentaux: aerodynamique
matiereBia: aerodynamique-et-principes-du-vol
objectifs:
  - Distinguer pression statique, dynamique et totale, et relier pt = ps + q.
  - Calculer une pression dynamique (q = ½·ρ·V²) et l'exploiter pour la vitesse (Pitot).
  - Énoncer la conservation du débit et en déduire l'accélération dans un rétrécissement.
