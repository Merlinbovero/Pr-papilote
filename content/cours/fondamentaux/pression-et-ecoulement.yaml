resumeRevision:
  - Pression statique (ps) — s'exerce dans toutes les directions, indépendante du mouvement.
  - Pression dynamique — q = ½·ρ·V² ; elle croît avec le carré de la vitesse.
  - Pression totale — pt = ps + q ; c'est ce que capte le tube de Pitot pour donner la vitesse.
  - ρ ≈ 1,225 kg/m³ (atmosphère standard, niveau de la mer).
  - Débit — Qv = S·V (volumique), Qm = ρ·S·V (massique) ; il se conserve le long de l'écoulement.
  - Continuité — S·V = constante ; un rétrécissement accélère l'air (premier maillon vers la portance).
