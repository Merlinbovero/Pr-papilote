title: La stabilité et le centrage
description: >-
  Pourquoi un avion revient-il de lui-même à sa trajectoire ? Grâce à sa
  stabilité — longitudinale (foyer, marge statique), latérale (dièdre) et
  directionnelle (dérive) — et à un centrage maintenu dans une plage précise. Le
  cours qui clôt le socle de mécanique du vol.
module: fondamentaux
categorieFondamentaux: aerodynamique
matiereBia: aerodynamique-et-principes-du-vol
objectifs:
  - Définir la stabilité et la relier au retour vers l'équilibre.
  - Expliquer la stabilité longitudinale (foyer, centre de gravité, marge statique).
  - Décrire les stabilités latérale et directionnelle et le rôle du centrage.
