resumeRevision:
  - Un avion stable revient de lui-même à son équilibre après une perturbation.
  - Stabilité longitudinale — le centre de gravité doit être en avant du foyer (~25 % de la corde) ; leur écart est la marge statique.
  - Le dièdre assure la stabilité en roulis ; la dérive assure la stabilité en lacet.
  - Le centrage (position du centre de gravité) dépend du chargement et doit rester dans une plage définie.
  - Centrage trop avant — avion stable mais lourd à piloter ; trop arrière — instable et dangereux.
  - Le foyer se situe approximativement au quart de la corde — un ordre de grandeur, pas une valeur exacte universelle.
