resumeRevision:
  - La traînée induite est la conséquence directe de la portance (pas de portance, pas de traînée induite).
  - Elle naît des tourbillons marginaux, formés au bout de l'aile par le passage de l'air de l'intrados vers l'extrados.
  - Elle est forte à basse vitesse (forte incidence) et diminue à haute vitesse — l'inverse de la traînée parasite.
  - Les tourbillons persistent en turbulence de sillage — un risque géré par des distances de séparation.
  - Allongement λ = envergure² / surface ; un grand allongement réduit la traînée induite (planeurs).
  - Les winglets gênent les tourbillons marginaux et réduisent la traînée induite (gain de quelques pour cent).
