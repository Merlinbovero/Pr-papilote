title: Traînée induite, allongement et winglets
description: >-
  Le prix aérodynamique de la portance : la traînée induite, née des tourbillons
  de bout d'aile. Ce cours explique son origine, sa variation avec la vitesse,
  la turbulence de sillage, et comment l'allongement et les winglets la
  réduisent.
module: fondamentaux
categorieFondamentaux: aerodynamique
