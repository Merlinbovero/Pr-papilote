objectifs:
  - Expliquer l'origine de la traînée induite (les tourbillons marginaux).
  - Énoncer sa variation avec la vitesse et le risque de turbulence de sillage.
  - Définir l'allongement (λ = b²/S) et le rôle des winglets dans la réduction de la traînée induite.
