content:
  essentiel:
    body: |
      L'**A-10 Thunderbolt II**, universellement surnommé **« Warthog »**
      (phacochère), est un **avion d'attaque** américain **biréacteur**,
      spécialisé dans un seul rôle : l'**appui aérien rapproché** (*Close Air
      Support*, CAS) — protéger et appuyer les troupes au sol au plus près du
      contact. Il figure ici au titre de la **culture aéronautique mondiale** :
      ce n'est **pas** un appareil français.

      Fait unique, l'avion a été **conçu autour de son arme** : le **canon
      rotatif GAU-8/A Avenger de 30 mm**, à sept tubes, capable d'environ
      **3 900 coups par minute**, logé dans le fuselage. Tout le reste sert cette
      mission — vol **lent et bas**, grande **maniabilité** à basse altitude,
      autonomie sur zone.

      Sa marque de fabrique est la **survivabilité**. Le pilote et les
      commandes vitales sont protégés par une véritable **« baignoire » de
      blindage en titane** (plusieurs centaines de kilos). Les deux réacteurs
      sont placés **haut à l'arrière**, les commandes sont redondantes :
      l'appareil est réputé pour **rentrer très abîmé**. Robuste et peu élégant,
      le Warthog est devenu l'**emblème de l'appui-sol**.
    aRetenir:
      - L'A-10 est un avion d'attaque américain dédié à l'appui aérien rapproché (CAS) — pas un appareil français.
      - Il est conçu autour de son canon rotatif GAU-8/A de 30 mm (7 tubes, ~3 900 coups/min).
      - Philosophie = survivabilité — blindage titane du pilote, réacteurs hauts à l'arrière, commandes redondantes.
      - Surnom « Warthog » ; en service depuis 1977, modernisé en A-10C.
  sections:
    - id: concu-autour-du-canon
      title: Un avion construit autour de son canon
      body: |
        La plupart des avions embarquent un canon parmi d'autres armes. L'A-10
        inverse la logique : le **GAU-8/A**, l'un des canons d'avion les plus
        puissants jamais montés, occupe une grande partie du fuselage avant, et
        la cellule a été **dessinée autour de lui**. Le train avant est même
        **décalé** pour laisser la place à l'axe du canon.

        Cette arme tire des obus de **30 mm** à très haute cadence, efficaces
        contre les véhicules blindés. C'est ce qui a forgé la réputation — et le
        bruit caractéristique — du Warthog.
    - id: pourquoi-il-survit
      title: Pourquoi il encaisse (à savoir)
      strate: maitriser
      body: |
        Voler **lentement et bas** au contact des troupes expose au feu adverse.
        L'A-10 a donc été pensé pour **encaisser** : cabine et systèmes vitaux
        enfermés dans un caisson de **titane**, **réacteurs séparés et placés en
        hauteur** à l'arrière (moins exposés, moins repérables au sol),
        **commandes de vol redondantes** (dont un mode manuel de secours), et
        capacité à voler sur **un seul moteur** ou une gouverne endommagée.

        Pour un candidat, l'essentiel est de **savoir le reconnaître et le
        situer** : un avion d'attaque américain, laid et increvable, dédié à
        l'appui-sol — à distinguer d'un chasseur multirôle comme le F-16 ou d'un
        appareil français.
  pieges:
    - L'A-10 est américain — ce n'est pas un appareil des forces françaises (ne pas le ranger dans EOPN/EOPAN/ALAT).
    - Ce n'est pas un chasseur — c'est un avion d'attaque (appui-sol), lent et bas, pas un intercepteur.
    - Le canon n'est pas un accessoire — l'avion a été conçu autour de lui, c'est sa raison d'être.
