summary: >-
  Chasseur embarqué américain à géométrie variable, intercepteur de défense de
  flotte de l'US Navy (1974-2006). Célèbre pour son radar AWG-9 et son missile
  longue portée AIM-54 Phoenix, et popularisé par le cinéma. Repère de culture
  aéronautique mondiale — ce n'est pas un appareil français.
objectifs:
