content:
  essentiel:
    body: |
      Le **Hawker Hurricane** est l'autre grand **chasseur britannique** de la
      Seconde Guerre mondiale. Moins célèbre que le **Spitfire**, il en fut
      pourtant le **partenaire indispensable** : plus **nombreux**, plus
      **robuste** et plus **facile à réparer**, c'est lui qui a supporté le gros
      des combats de la **bataille d'Angleterre** (**1940**).

      Les archives lui attribuent la **majorité des victoires** britanniques
      durant cette bataille (autour de 55-60 % des pertes allemandes) — davantage
      que le Spitfire, plus rapide mais moins nombreux. Sa structure solide (en
      partie entoilée) encaissait les dommages et se remettait vite en état, un
      atout précieux quand chaque appareil comptait.

      Volant dès **1935** et en service à partir de **1937** (moteur **Rolls-
      Royce Merlin**), il a été construit à près de **14 500** exemplaires. Il
      illustre une leçon utile : un appareil **fiable et disponible** peut peser
      plus lourd qu'un appareil brillant mais rare.
    aRetenir:
      - Le Hurricane est le chasseur robuste et nombreux de la RAF pendant la Seconde Guerre mondiale.
      - Il a remporté la majorité des victoires britanniques de la bataille d'Angleterre — plus que le Spitfire.
      - Moins rapide que le Spitfire, mais plus solide et plus facile à entretenir.
      - Près de 14 500 exemplaires ; moteur Rolls-Royce Merlin.
  sections:
    - id: le-cheval-de-bataille-oublie
      title: Le cheval de bataille (un peu) oublié
      body: |
        Le grand public associe la bataille d'Angleterre au **Spitfire**, plus
        photogénique. Mais dans les faits, la RAF alignait **plus de Hurricane**,
        et ce sont eux qui ont intercepté le plus de **bombardiers** allemands.

        Le Hurricane doit ce rôle à ses qualités concrètes : une **plateforme de
        tir stable** (huit mitrailleuses groupées), une **maniabilité** correcte
        à basse et moyenne altitude, et surtout une **robustesse** qui
        permettait de le réparer vite. Face au Messerschmitt **Bf 109**, il était
        désavantagé en altitude, mais restait redoutable dans le combat
        tournoyant serré. C'est l'exemple parfait de l'appareil qu'on
        sous-estime… jusqu'à ce qu'on regarde les chiffres.
  pieges:
    - Le Hurricane est britannique (RAF) — pas un appareil des forces françaises.
    - Ne pas le sous-estimer face au Spitfire — il a remporté la majorité des victoires de la bataille d'Angleterre.
    - C'est un appareil historique (Seconde Guerre mondiale), retiré depuis longtemps.
