content:
  essentiel:
    body: |
      Le **Mitsubishi A6M Zero** est le **chasseur embarqué** de la **marine
      impériale japonaise**, conçu par **Jiro Horikoshi**. Au début de la
      **guerre du Pacifique** (à partir de fin 1941), il **domine** le ciel :
      d'une **maniabilité** stupéfiante et d'un **rayon d'action** immense
      (~1 870 km), il surprend des adversaires qui le croyaient impossible. Son
      ratio de victoires initial est écrasant.

      Ce succès repose sur un **choix radical** : la **légèreté**. Pour gagner en
      agilité et en allonge, les ingénieurs ont **supprimé** presque toute la
      **protection** — pas de blindage du pilote, pas de réservoirs
      auto-obturants. Un Zero touché **brûlait ou explosait** facilement.

      À partir de **mi-1942**, les Alliés adaptent leurs **tactiques** (ne pas
      tourner avec lui, exploiter la vitesse et le piqué) et alignent des
      chasseurs plus **rapides, robustes et protégés**. Le Zero, peu modernisé,
      devient alors **vulnérable**. C'est un cas d'école du compromis
      **agilité/protection** en conception d'avion de combat.
    aRetenir:
      - Le Zero est le chasseur embarqué japonais, dominant au début de la guerre du Pacifique.
      - Son secret — une légèreté extrême, offrant maniabilité et très grand rayon d'action.
      - Son défaut — une protection quasi nulle (pilote et réservoirs non protégés).
      - Il devient vulnérable dès 1942 face aux chasseurs alliés plus modernes.
  sections:
    - id: agilite-contre-protection
      title: Agilité contre protection
      body: |
        Concevoir un avion de combat, c'est **arbitrer**. Le Zero incarne un
        arbitrage extrême en faveur de l'**agilité** et de l'**allonge** : en
        allégeant tout, on obtient un chasseur qui **vire court** et vole
        **loin** — parfait pour l'immensité du Pacifique et les combats
        tournoyants du début de guerre.

        Mais ce choix a un **prix**. Sans **blindage** ni **réservoirs
        protégés**, l'appareil ne **pardonne pas** les coups au but. Quand
        l'adversaire cesse de jouer le combat tournoyant (le terrain favorable au
        Zero) pour imposer la **vitesse** et le **piqué**, l'avantage bascule.
        Le Zero rappelle qu'un point fort poussé à l'extrême crée souvent une
        **faiblesse symétrique**.
  pieges:
    - Le Zero est japonais (marine impériale) — pas un appareil des forces françaises.
    - Sa maniabilité et son rayon d'action venaient d'une légèreté extrême — au prix d'une protection quasi nulle.
    - Sa domination initiale n'a pas duré — dès 1942, les chasseurs alliés et de nouvelles tactiques ont renversé la situation.
