content:
  essentiel:
    body: |
      Le **North American P-51 Mustang** est le **chasseur d'escorte** américain
      qui a changé le cours de la **guerre aérienne** en Europe. Son histoire est
      celle d'une **transformation** : conçu avec un moteur **Allison** peu
      performant en altitude, il devient un appareil **exceptionnel** une fois
      équipé du moteur britannique **Rolls-Royce Merlin** (construit sous licence
      par Packard).

      Son atout décisif est le **rayon d'action**. Grâce à une cellule sobre en
      traînée et à des **réservoirs largables**, le Mustang pouvait **escorter les
      bombardiers** depuis l'Angleterre **jusqu'au cœur de l'Allemagne et
      revenir** — une capacité que l'on croyait impossible. Les bombardiers,
      jusque-là très vulnérables au-dessus du Reich, disposaient enfin d'une
      **protection** sur tout le trajet.

      Rapide, bien armé (six mitrailleuses de 12,7 mm) et endurant, le Mustang a
      pris l'ascendant sur les chasseurs allemands (**Bf 109**, **Fw 190**) et
      contribué à la **maîtrise du ciel** en 1944-1945.
    aRetenir:
      - Le P-51 Mustang est le grand chasseur d'escorte américain de la Seconde Guerre mondiale.
      - Le passage au moteur Rolls-Royce Merlin l'a rendu décisif (performances en altitude).
      - Son atout majeur — un rayon d'action permettant d'escorter les bombardiers jusqu'en Allemagne et retour.
      - Il a pris l'ascendant sur les Bf 109 et Fw 190 en fin de guerre.
  sections:
    - id: le-probleme-de-l-escorte
      title: Le problème de l'escorte
      body: |
        Au début de la guerre aérienne sur l'Europe, les **bombardiers** alliés
        frappaient l'Allemagne de jour, mais **sans escorte** sur la fin du
        trajet : aucun chasseur n'avait un rayon d'action suffisant. Résultat,
        des **pertes énormes** face à la chasse allemande.

        Le **P-51 Mustang** a résolu ce problème. En combinant une **cellule très
        efficace** (peu de traînée) et une grande **capacité en carburant**
        (interne + bidons largables), il pouvait **accompagner** les bombardiers
        de bout en bout. C'est un cas d'école : ce n'est pas seulement la
        performance pure, mais l'**allonge** — la capacité d'aller loin et de
        rester — qui a fait du Mustang une arme décisive.
  pieges:
    - Le P-51 Mustang est américain (US Army Air Forces) — pas un appareil des forces françaises.
    - Sa réussite tient au moteur Merlin (britannique) — la version d'origine à moteur Allison était médiocre en altitude.
    - Son atout n'est pas que la vitesse, mais le rayon d'action (escorte longue distance).
