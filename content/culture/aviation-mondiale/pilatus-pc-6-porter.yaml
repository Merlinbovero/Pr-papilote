content:
  essentiel:
    body: |
      Le **Pilatus PC-6 Porter** est un **avion utilitaire** suisse à
      **turbopropulseur**, célèbre pour ses capacités **STOL** (Short Take-Off
      and Landing) : il décolle et se pose sur des **terrains très courts** et
      **sommaires** (herbe, altitude, zones reculées), là où d'autres avions ne
      peuvent pas opérer. Volant depuis **1959**, il a été produit jusqu'en
      **2019** — une longévité rare.

      Sa **polyvalence** en a fait un outil de **transport léger**, de
      **liaison**, de missions **humanitaires** et de travail aérien. Il est
      surtout l'un des appareils **favoris du parachutisme** : sa **large
      porte** (retirable) facilite les sauts, il **monte efficacement** vers
      l'altitude de largage et se contente de **pistes courtes** au bord des
      zones de saut.

      Ce n'est **pas** un appareil des forces armées françaises : il figure ici
      au titre de la **culture aéronautique**, comme repère d'aviation civile et
      utilitaire.
    aRetenir:
      - Le PC-6 Porter est un avion utilitaire STOL suisse à turbopropulseur (Pilatus), volant depuis 1959.
      - Sa spécialité — décoller et se poser très court, sur terrains sommaires.
      - Usages — transport léger, liaison, humanitaire, et surtout parachutisme.
      - Ce n'est pas un appareil des forces françaises (aviation civile / mondiale).
  sections:
    - id: le-roi-des-terrains-courts
      title: Le roi des terrains courts
      body: |
        La force du PC-6 est le **STOL** : grâce à une **grande aile**, des
        **volets** généreux et un moteur à hélice puissant, il **arrache** très
        vite du sol et s'arrête sur une distance minime. On l'a vu se poser sur
        des **glaciers**, des **bandes de terre** improvisées ou des **altitudes
        élevées** — des endroits normalement réservés aux hélicoptères.

        Cette rusticité explique ses usages : ravitaillement de zones isolées,
        évacuation, largage, travail aérien. Pour le **parachutisme**, il coche
        toutes les cases — porte large, montée franche, terrains courts —, ce
        qui en fait un classique des **écoles et clubs** de saut.
    - id: un-accident-recent-a-savoir
      title: Un accident récent (à savoir)
      strate: maitriser
      body: |
        Le **28 juin 2026**, un PC-6 s'est écrasé à **Tomblaine**, près de
        **Nancy**, lors d'un vol de **parachutisme** : **onze personnes** ont
        perdu la vie. C'est l'**accident d'aviation générale le plus grave en
        France depuis une trentaine d'années**.

        Au moment où cette fiche est écrite, l'**enquête de sécurité du BEA** est
        **en cours** et **la cause n'est pas établie**. Par respect des victimes
        et des règles de l'enquête, on **ne spécule pas** ici sur l'origine de
        l'accident : c'est au BEA de l'établir. Cet événement rappelle
        l'importance de la **culture de sécurité** et du **retour d'expérience**
        dans l'aviation (voir la fiche dédiée).
  pieges:
    - Le PC-6 est un avion civil/utilitaire suisse — pas un appareil des forces armées françaises.
    - « STOL » signifie décollage et atterrissage courts — c'est la marque de fabrique du Porter.
    - Sur l'accident de Nancy (2026), la cause n'est pas établie — l'enquête du BEA est en cours, on ne spécule pas.
