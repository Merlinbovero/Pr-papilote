content:
  essentiel:
    body: |
      Le **Sukhoi Su-27** (nom de code **OTAN « Flanker »**) est le grand
      **chasseur de supériorité aérienne** soviétique, conçu dans les années
      1970 pour **rivaliser avec le F-15 Eagle** américain. Volant en **1977** et
      en service en **1985**, c'est un **biréacteur** lourd, à grand rayon
      d'action, réputé pour sa **manœuvrabilité** exceptionnelle (démonstrations
      spectaculaires comme le « Cobra de Pougatchev »).

      Son importance dépasse l'appareil lui-même : le Su-27 est la **matrice**
      d'une **immense famille** — **Su-30** (multirôle biplace), **Su-33**
      (embarqué), **Su-34** (bombardier), **Su-35** (version très modernisée) —,
      et il a été copié/produit en Chine (J-11). C'est l'un des **piliers** de
      l'aviation de combat russe et de nombreux pays clients.

      Ce n'est **pas** un appareil français : il figure ici comme repère de
      **culture aéronautique mondiale** et de défense.
    aRetenir:
      - Le Su-27 (« Flanker ») est le grand chasseur de supériorité aérienne soviétique/russe.
      - Conçu pour rivaliser avec le F-15 américain ; biréacteur lourd et très manœuvrant.
      - C'est la base d'une vaste famille — Su-30, Su-33, Su-34, Su-35.
      - Appareil russe (et de nombreux pays), à ne pas confondre avec un appareil français.
  sections:
    - id: une-matrice-d-avions
      title: Une matrice d'avions
      body: |
        Rares sont les avions qui donnent naissance à toute une **lignée**. Le
        Su-27, par sa cellule ample et puissante, s'est prêté à de nombreuses
        **déclinaisons** : ajouter un second siège et des capacités multirôles
        (Su-30), un crochet d'appontage (Su-33), une soute et un blindage pour le
        bombardement (Su-34), une avionique et des moteurs de nouvelle génération
        (Su-35).

        Pour un candidat, l'important est de **reconnaître** la silhouette
        « Flanker » (deux dérives, deux moteurs espacés, grande aile) et de
        savoir qu'elle recouvre **beaucoup d'appareils différents** — un peu comme
        la famille « Super Puma » côté hélicoptères. C'est un repère utile pour
        s'y retrouver dans l'aviation militaire moderne.
  pieges:
    - Le Su-27 est russe (soviétique à l'origine) — pas un appareil des forces françaises.
    - « Flanker » désigne toute une famille — Su-27/30/33/34/35 se ressemblent mais ont des rôles distincts.
    - C'est l'homologue conceptuel du F-15 américain, pas du F-16 (plus léger).
