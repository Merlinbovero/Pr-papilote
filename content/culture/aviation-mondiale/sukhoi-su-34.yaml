content:
  essentiel:
    body: |
      Le **Sukhoi Su-34** (nom **OTAN « Fullback »**) n'est pas un chasseur mais
      un **bombardier tactique** — un avion de **frappe**. Dérivé de la famille
      **Su-27**, il en reprend la cellule puissante mais l'adapte à une autre
      mission : emporter **loin** une **forte charge** de bombes et de missiles
      air-sol, et frapper des objectifs au sol.

      Ses particularités le rendent reconnaissable et logique pour sa mission :
      un **cockpit blindé** (blindage épais autour de l'équipage) et **deux
      membres d'équipage assis côte à côte** (pilote et navigateur/opérateur),
      pour les longues missions de frappe. Son nez **plat et large** en « bec de
      canard » lui a valu des surnoms comme « caneton ». Volant dès **1990**, il
      est entré massivement en service à partir de **2014**.

      C'est un appareil **russe**, à situer dans la culture de défense — pas un
      avion des forces françaises.
    aRetenir:
      - Le Su-34 (« Fullback ») est un bombardier tactique russe, pas un chasseur.
      - Dérivé de la famille Su-27, spécialisé dans la frappe air-sol (forte charge, allonge).
      - Reconnaissable — cockpit blindé, deux équipiers côte à côte, nez plat en « bec de canard ».
      - Appareil russe, à ne pas confondre avec les chasseurs Su-27/Su-35 de la même famille.
  sections:
    - id: une-meme-famille-des-roles-differents
      title: Une même famille, des rôles différents
      body: |
        La famille **Su-27** illustre une idée importante : à partir d'une
        **cellule** réussie, on peut construire des avions aux **missions très
        différentes**. Le **Su-27** et le **Su-35** sont des **chasseurs**
        (supériorité aérienne). Le **Su-34**, lui, est un **bombardier** :
        priorité à la charge, à l'allonge et à la **survivabilité** de
        l'équipage (d'où le blindage et l'installation côte à côte, plus
        confortable pour de longues missions).

        Pour un candidat, la leçon est double : savoir **reconnaître** la parenté
        « Flanker », mais ne pas confondre un **chasseur** et un **bombardier**
        sous prétexte qu'ils se ressemblent. Le rôle prime sur l'apparence.
  pieges:
    - Le Su-34 est russe — pas un appareil des forces françaises.
    - Ce n'est pas un chasseur mais un bombardier tactique (frappe air-sol).
    - Il descend de la famille Su-27 mais ne remplit pas le même rôle que le Su-27 ou le Su-35.
