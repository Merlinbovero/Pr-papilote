summary: >-
  Les escadrons « agresseurs » sont des unités dont les pilotes sont formés à
  imiter les tactiques de l'adversaire pour jouer l'ennemi (la « force rouge »)
  lors des entraînements. Nés de l'analyse de la guerre du Vietnam, ils rendent
  les exercices comme Red Flag réalistes.
objectifs:
  - Définir un escadron « agresseur » — une unité spécialisée qui simule l'ennemi en reproduisant ses tactiques et son matériel.
  - Comprendre pourquoi ils existent — offrir aux pilotes un adversaire crédible et exigeant, plutôt qu'un partenaire complaisant.
  - Relier ce concept aux grands exercices (Red Flag) et à la notion de « force rouge » (Red Air).
