title: Les jumelles de vision nocturne (JVN)
slug: jumelles-de-vision-nocturne
summary: >-
  Instruments qui amplifient la lumière résiduelle pour voler et combattre de
  nuit. Fixées sur le casque des équipages, elles rendent possibles les missions
  nocturnes — assaut, sauvetage, transport, appui — au plus près du terrain.
objectifs:
  - Comprendre le principe des JVN — l'intensification de la lumière résiduelle (et non la vision thermique).
  - Connaître les missions où les pilotes les utilisent (assaut héliporté, sauvetage, transport tactique, appui).
  - Saisir leurs limites (champ de vision réduit, absence de couleur, dépendance à la lumière ambiante).
