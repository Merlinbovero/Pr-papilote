summary: >-
  Red Flag est le grand exercice d'entraînement au combat aérien de l'US Air
  Force, créé en 1975 à Nellis (Nevada) d'après les leçons du Vietnam. Face à des
  escadrons « agresseurs », il fait vivre aux équipages leurs premières missions
  de guerre en sécurité, et réunit des alliés dont la France.
objectifs:
  - Expliquer ce qu'est Red Flag — un exercice réaliste de combat aérien à grande échelle, à Nellis (Nevada), sur le vaste champ de tir du NTTR.
  - Comprendre son origine (leçons du Vietnam) et son idée directrice — offrir aux pilotes leurs premières missions de combat à l'entraînement, là où elles sont les plus dangereuses.
  - Situer le rôle des escadrons « agresseurs » (Red Air) et la dimension multinationale (interopérabilité entre alliés, dont la France).
