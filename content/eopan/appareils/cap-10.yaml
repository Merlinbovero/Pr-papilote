summary: >-
  Le petit biplace de voltige sur lequel tout commence — c'est sur Cap 10, à
  l'escadrille 50S de Lanvéoc-Poulmic, que les candidats EOPAN passent leur
  sélection en vol. Un vrai voltigeur certifié, en bois, à +6/−4,5 g.
objectifs:
  - Identifier le Cap 10 comme l'avion de la sélection en vol EOPAN (escadrille 50S, Lanvéoc-Poulmic).
  - Connaître ses caractéristiques essentielles (biplace côte à côte de voltige en bois, Lycoming 180 ch).
  - Citer ses limites d'emploi remarquables (catégories utilitaire/acrobatique, facteurs de charge, VNE).
  - Comprendre pourquoi un avion léger de voltige sert à sélectionner de futurs pilotes.
