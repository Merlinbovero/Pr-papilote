infobox:
  constructeur: Mudry, puis Robin Aircraft (Cap 10 NG)
  role: Avion d'entraînement et de voltige — sélection en vol EOPAN
  armees: [Marine nationale]
  miseEnService: 1970 (années 1980 dans la Marine)
  statut: En service (escadrille 50S)
  equipage: "2"
content:
  essentiel:
    body: |
      Le **Cap 10** est un petit avion **biplace côte à côte** de **voltige**,
      conçu par **Mudry** (premier vol en 1968) et produit aujourd'hui par
      **Robin Aircraft** dans sa version modernisée **Cap 10 NG**. Construit
      en **bois**, motorisé par un **Lycoming de 180 ch**, il supporte les
      facteurs de charge de la voltige.

      C'est **l'avion de la sélection en vol EOPAN** : au sein de
      l'**escadrille 50S**, sur la BAN de **Lanvéoc-Poulmic**, les candidats y
      démontrent en une quinzaine de vols leur **aptitude à apprendre** —
      avant même de savoir s'ils deviendront pilotes de chasse, de patrouille
      maritime ou d'hélicoptère.

      Pour un candidat EOPAN, connaître le Cap 10, c'est connaître **son
      premier avion militaire**.
    aRetenir:
      - Biplace côte à côte de voltige, construction bois, moteur Lycoming 180 ch.
      - Conçu par Mudry ; produit et modernisé aujourd'hui par Robin Aircraft (Cap 10 NG).
      - Avion de la sélection en vol EOPAN — escadrille 50S, BAN Lanvéoc-Poulmic.
      - Le côte à côte permet à l'instructeur d'observer directement le candidat.
  sections:
    - id: l-avion
      title: L'avion
      body: |
        Caractéristiques principales (Cap 10 B/C) :

        | Caractéristique | Valeur |
        | --- | --- |
        | Équipage | 2, côte à côte |
        | Construction | bois (longerons renforcés carbone sur le Cap 10 C) |
        | Moteur | Lycoming AEIO-360, 180 ch |
        | Envergure | 8,06 m |
        | Longueur | 7,16 m |
        | Masse maximale | 830 kg |
        | Vitesse maximale | 340 km/h |
        | Facteurs de charge | +6 / −4,5 g (Cap 10 C) |

        Léger, maniable et **entièrement voltigeable**, le Cap 10 permet
        d'évaluer un candidat dans tout le domaine de vol — y compris tête en
        bas.
    - id: la-selection-en-vol
      title: Le rôle dans la sélection EOPAN
      body: |
        À l'escadrille **50S**, unité d'instruction créée en **1946**, le
        Cap 10 sert d'**outil de mesure** : au fil d'une quinzaine de vols, le
        candidat apprend les bases du pilotage et doit **restituer** ce qui lui
        est enseigné, de plus en plus vite.

        Ce que les instructeurs évaluent n'est pas un niveau de pilotage —
        c'est la **pente de progression** : capacité à intégrer une
        démonstration, à la reproduire, à tenir les paramètres tout en gérant
        radio et sécurité. La configuration **côte à côte** du Cap 10 permet à
        l'instructeur d'observer directement le regard, les mains et la charge
        de travail du candidat.
    - id: et-apres
      title: Et après la sélection ?
      strate: maitriser
      body: |
        Le Cap 10 ne sert qu'à la **sélection** et à l'**initiation**. La
        formation qui suit se poursuit dans le cadre interarmées — le programme
        **Mentor 2** (marché notifié fin 2024) doit rationaliser la formation
        initiale des pilotes de l'armée de l'Air et de la Marine sur
        **Pilatus PC-7 MKX** à Salon-de-Provence.

        La flotte de Cap 10 de la 50S, elle, est **modernisée** (standard
        Cap 10 NG et kits de mise à niveau commandés à Robin Aircraft) : la
        sélection en vol des EOPAN sur Cap 10 à Lanvéoc reste d'actualité.
  pieges:
    - Le Cap 10 est l'avion de la sélection en vol, pas celui de la formation de chasse — après la sélection, le cursus se poursuit sur d'autres appareils.
    - Ne pas confondre l'escadrille 50S (sélection et initiation, Lanvéoc) avec les flottilles opérationnelles (11F, 12F, 17F…).
    - Le Cap 10 est un avion en bois et cela n'en fait pas un jouet — c'est un voltigeur certifié à +6/−4,5 g dans sa version C.
