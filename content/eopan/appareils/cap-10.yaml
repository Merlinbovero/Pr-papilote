content:
  essentiel:
    body: |
      Le **Cap 10** est un petit avion **biplace côte à côte** de **voltige**,
      conçu par les **Avions Mudry** (premier vol en 1968, certifié en 1969) et
      produit aujourd'hui, modernisé, sous le nom **Cap 10 NG**. C'est un avion
      **entièrement construit en bois** (longerons en spruce, revêtement en
      contre-plaqué), à **aile basse** et **train classique** (roulette de
      queue), motorisé par un **Lycoming de 180 ch** doté du **système
      Christen** qui autorise le **vol sur le dos continu**.

      C'est **l'avion de la sélection en vol EOPAN** : au sein de
      l'**escadrille 50S**, sur la BAN de **Lanvéoc-Poulmic**, les candidats y
      démontrent en une quinzaine de vols leur **aptitude à apprendre** — avant
      même de savoir s'ils deviendront pilotes de chasse, de patrouille
      maritime ou d'hélicoptère.

      Pour un candidat EOPAN, connaître le Cap 10, c'est connaître **son premier
      avion militaire**.
    aRetenir:
      - Biplace côte à côte de voltige, entièrement en bois, moteur Lycoming 180 ch.
      - Certifié en deux catégories — utilitaire et acrobatique ; en voltige, il encaisse +6/−4,5 g.
      - Le système Christen permet le vol dos continu (moteur alimenté tête en bas).
      - Avion de la sélection en vol EOPAN — escadrille 50S, BAN Lanvéoc-Poulmic ; le côte à côte laisse l'instructeur observer directement le candidat.
  sections:
    - id: la-cellule
      title: La cellule
      body: |
        Le Cap 10 est un **avion en bois** : voilure **monolongeron** à
        caissons de torsion (semelles en spruce, âmes et revêtement en
        contre-plaqué), fuselage en **treillis de bois**, verrière **largable en
        vol**. L'aile basse au **profil NACA 23012** offre **10,85 m²** de
        surface pour **8,06 m** d'envergure.

        Le groupe motopropulseur est un **Lycoming (A)EIO-360-B2F** de **180 ch**
        (182 CV / 134 kW nominal à 2700 t/min), à **injection**, équipé du
        **système Christen** de graissage qui permet un **vol dos continu** —
        moteur alimenté en essence même tête en bas. L'hélice est en **bois à
        pas fixe**. Les deux réservoirs (72 L avant, 78 L arrière) totalisent
        **150 litres**.

        La version modernisée **Cap 10 C** a introduit un **longeron renforcé
        au carbone** ; le **Cap 10 NG** (Robin Aircraft) poursuit cette
        modernisation.
    - id: limites-d-emploi
      title: Les limites d'emploi
      body: |
        Le Cap 10 B est certifié (règlement AIR 2052) en **deux catégories** :
        **utilitaire (U)** et **acrobatique (A)**. Les limites changent selon la
        catégorie choisie pour le vol :

        | Limite | Utilitaire | Acrobatique (voltige) |
        | --- | --- | --- |
        | Facteurs de charge (volets rentrés) | +4,4 / −1,8 g | **+6 / −4,5 g** |
        | Masse maxi au décollage | 830 kg | 760 kg |
        | Vitesse de manœuvre (VA) | 200 km/h | 235 km/h |

        Quelques repères communs, à mémoriser : **VNE 340 km/h** (à ne jamais
        dépasser, trait rouge), **VNO 300 km/h** (arc jaune au-delà), **VFE
        160 km/h** (volets sortis), **décrochage ≈ 85-89 km/h** volets sortis.
        Le **vent de travers limite** est de **20 kt** (37 km/h). L'avion n'est
        autorisé qu'en **VFR de jour, hors conditions givrantes** — et la
        **voltige n'est permise qu'en catégorie A**.
    - id: la-selection-en-vol
      title: Le rôle dans la sélection EOPAN
      body: |
        À l'escadrille **50S**, unité d'instruction créée en **1946**, le
        Cap 10 sert d'**outil de mesure** : au fil d'une quinzaine de vols, le
        candidat apprend les bases du pilotage et doit **restituer** ce qui lui
        est enseigné, de plus en plus vite.

        Ce que les instructeurs évaluent n'est pas un niveau de pilotage — c'est
        la **pente de progression** : capacité à intégrer une démonstration, à
        la reproduire, à tenir les paramètres tout en gérant radio et sécurité.
        La configuration **côte à côte** du Cap 10 permet à l'instructeur
        d'observer directement le regard, les mains et la charge de travail du
        candidat.
    - id: et-apres
      title: Et après la sélection ?
      strate: maitriser
      body: |
        Le Cap 10 ne sert qu'à la **sélection** et à l'**initiation**. La
        formation qui suit se poursuit dans le cadre interarmées — le programme
        **Mentor 2** (marché notifié fin 2024) doit rationaliser la formation
        initiale des pilotes de l'armée de l'Air et de la Marine sur **Pilatus
        PC-7 MKX** à Salon-de-Provence.

        La flotte de Cap 10 de la 50S, elle, est **modernisée** (standard
        Cap 10 NG et kits de mise à niveau commandés à Robin Aircraft) : la
        sélection en vol des EOPAN sur Cap 10 à Lanvéoc reste d'actualité.
  pieges:
    - Le Cap 10 est l'avion de la sélection en vol, pas celui de la formation de chasse — après la sélection, le cursus se poursuit sur d'autres appareils.
    - Ne pas confondre l'escadrille 50S (sélection et initiation, Lanvéoc) avec les flottilles opérationnelles (11F, 12F, 17F…).
    - Les facteurs de charge dépendent de la catégorie — c'est en acrobatique (+6/−4,5 g), pas en utilitaire (+4,4/−1,8 g), que le Cap 10 voltige.
    - Un avion en bois n'est pas un jouet — c'est un voltigeur certifié dont le moteur, grâce au système Christen, tourne même sur le dos.
