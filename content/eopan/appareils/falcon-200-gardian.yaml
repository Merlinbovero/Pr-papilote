content:
  essentiel:
    body: |
      Le **Falcon 200 Gardian** est un avion de **surveillance maritime** de
      l'aéronautique navale, historiquement déployé **outre-mer**, dans le
      **Pacifique** (Polynésie française, Nouvelle-Calédonie). C'est un
      **biréacteur** — deux réacteurs — dérivé de la famille **Falcon 20/200**,
      des avions d'affaires de Dassault.

      Livré à partir de **1984** (cinq exemplaires), il a assuré pendant quatre
      décennies la **surveillance** des vastes espaces maritimes ultramarins :
      police des pêches, lutte contre les trafics, contrôle des approches, et
      **alerte SAR** (sauvetage) grâce à une chaîne de largage de matériel de
      secours. Son **radar** détecte les navires de surface à 120–140 nautiques,
      et deux grands **hublots** servent à l'observation.

      Le Falcon 200 Gardian est aujourd'hui **en cours de retrait** : il cède la
      place au **Falcon 50M Triton** (relève transitoire), en attendant la
      plateforme neuve, le **Falcon 2000 Albatros**.
    aRetenir:
      - Le Falcon 200 Gardian est l'avion de surveillance maritime de la Marine basé outre-mer (Pacifique).
      - C'est un biréacteur dérivé du Falcon 20/200 d'affaires, livré à partir de 1984 (5 exemplaires).
      - Sa mission est la surveillance et le secours en mer, pas la patrouille maritime armée.
      - Il est en cours de retrait, remplacé par le Falcon 50M Triton puis le Falcon 2000 Albatros.
  sections:
    - id: la-surveillance-maritime-outre-mer
      title: La surveillance maritime outre-mer
      body: |
        La France exerce sa souveraineté sur d'immenses espaces maritimes dans
        le **Pacifique**. Depuis la **Polynésie française** et la
        **Nouvelle-Calédonie**, le Falcon 200 Gardian a longtemps été l'avion
        qui **surveille** ces zones : repérer les navires, contrôler la
        **pêche**, traquer les **trafics**, et assurer l'**alerte SAR** (Search
        And Rescue) sur toute la surface couverte.

        Pour cela il emporte un **radar** à compression d'impulsions (détection
        à 120–140 nautiques), deux grands **hublots d'observation** et une
        **chaîne de largage** ouvrant par une trappe de plancher, pour
        délivrer canots et matériel de survie à des naufragés. C'est un avion de
        **service public** en mer, comme le Falcon 50M — pas un avion de combat.
    - id: un-bireacteur-de-la-famille-falcon
      title: Un biréacteur de la famille Falcon
      body: |
        Le Gardian dérive de la famille **Falcon 20/200**, des avions
        d'affaires de Dassault, adaptés à la surveillance. C'est un
        **biréacteur** (deux moteurs Garrett), ce qui le distingue nettement du
        **Falcon 50M**, qui est un **triréacteur** (trois moteurs).

        Son équipage de **six** — pilote, mécanicien de bord, radio et
        navigateurs-radaristes — arme les postes de mission pendant les longues
        veilles au-dessus de l'océan. Livré dans les **années 1980**, l'appareil
        a rendu quarante ans de service avant d'être relevé.
    - id: le-retrait-et-la-releve
      title: Le retrait et la relève (à savoir)
      strate: maitriser
      body: |
        Le retrait du Falcon 200 Gardian est **engagé**. En **Polynésie**, il a
        été relevé par le **Falcon 50M Triton** (version modernisée du Falcon
        50M). Les derniers exemplaires, basés à **Nouméa** (Nouvelle-Calédonie),
        doivent quitter le service dans les années suivantes.

        Cette relève est une étape **intermédiaire** : à terme, la surveillance
        maritime — métropole comme outre-mer — reposera sur le **Falcon 2000
        Albatros** du programme **AVSIMAR**. Le Triton fait le **pont** entre
        l'ancien Gardian et le futur Albatros.
  pieges:
    - Le Falcon 200 Gardian est un biréacteur (deux moteurs) ; le Falcon 50M est un triréacteur (trois moteurs) — ne pas les confondre.
    - Son nom officiel est « Gardian » (orthographe Dassault), pas « Guardian ».
    - Il est en cours de retrait — sa relève immédiate est le Falcon 50M Triton, avant le Falcon 2000 Albatros.
