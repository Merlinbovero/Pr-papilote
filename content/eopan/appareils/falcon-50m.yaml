content:
  essentiel:
    body: |
      Le **Falcon 50M** (dit **Surmar**, pour « **sur**veillance **mar**itime »)
      est un avion de **surveillance maritime et de secours en mer** de
      l'aéronautique navale. C'est un **triréacteur** — trois réacteurs —
      dérivé du **Falcon 50**, un avion d'affaires de Dassault militarisé pour
      les besoins de la Marine.

      Sa mission relève du **service public** en mer : **surveillance** des
      approches et des espaces maritimes, **police des pêches**, lutte contre
      les **trafics** et la **pollution**, et surtout **sauvetage** (SAR). Pour
      cela il emporte un **radar** de surface (Ocean Master), une **optronique**
      stabilisée (EUROFLIR 410), des **hublots d'observation** et une **chaîne
      de largage** capable de délivrer jusqu'à **9 canots ou lots de secours**
      par une trappe ventrale.

      La flotte se répartit entre la **flottille 24F** à Lann-Bihoué et la
      **flottille 25F** à Tahiti (version modernisée **Triton**). Le Falcon 50M
      sera progressivement **remplacé par le Falcon 2000 Albatros**.
    aRetenir:
      - Le Falcon 50M (Surmar) est l'avion de surveillance maritime et de secours en mer de la Marine.
      - C'est un triréacteur dérivé du Falcon 50 d'affaires de Dassault.
      - Sa mission est le service public en mer (surveillance, pêches, trafics, pollution, sauvetage) — pas la lutte anti-sous-marine armée.
      - Flottilles 24F (Lann-Bihoué) et 25F (Tahiti, version Triton) ; relève par le Falcon 2000 Albatros.
  sections:
    - id: un-avion-de-service-public-en-mer
      title: Un avion de service public en mer
      body: |
        La France doit surveiller un **domaine maritime** immense, en
        métropole comme outre-mer. Le Falcon 50M en est l'un des outils : il
        décolle vite, couvre de grandes distances et **observe** ce qui se passe
        en mer.

        Ses missions sont dites de **service public** : **police des pêches**
        (contrôle de la pêche, par exemple au thon rouge en Méditerranée),
        lutte contre les **trafics** (stupéfiants) et les **pollutions**,
        surveillance de la **navigation** et des **approches**. Il assure aussi
        l'**alerte SAR** (Search And Rescue) : repérer des naufragés et leur
        **larguer** canots et matériel de survie en attendant les secours de
        surface ou l'hélicoptère.

        C'est donc un avion de **surveillance et de sauvetage**, à distinguer de
        l'**Atlantique 2**, qui est l'avion de **patrouille maritime armé**
        (lutte anti-sous-marine et anti-navires).
    - id: un-falcon-d-affaires-militarise
      title: Un Falcon d'affaires militarisé
      body: |
        Le Falcon 50M reprend la cellule du **Falcon 50**, un **triréacteur**
        d'affaires réputé pour sa fiabilité et son rayon d'action. Militariser
        une cellule civile déjà éprouvée permet de disposer d'un avion **fiable**
        et **économique** à mettre en œuvre.

        La transformation consiste à installer le **système de mission** :
        radar de veille de surface **Ocean Master**, **boule optronique**
        (caméra jour/nuit et infrarouge stabilisée) **EUROFLIR 410** sur les
        appareils modernisés, hublots d'observation et **système de largage**
        SAR. Huit appareils ont servi la Marine : certains conçus d'emblée pour
        le « Surmar », d'autres d'anciens **Falcon 50** de transport
        gouvernemental transformés.
    - id: la-version-triton-et-la-releve
      title: La version Triton et la relève (à savoir)
      strate: maitriser
      body: |
        Cinq Falcon 50M ont reçu une **optronique modernisée** (l'**EUROFLIR
        410** de Safran remplaçant l'ancien pod FLIR Chlio) : c'est la version
        **Triton**. Elle a été déployée **outre-mer**, à **Tahiti** (flottille
        **25F**), pour prendre la relève des vieux **Falcon 200 Gardian**.

        À terme, tous les Falcon 50M cèderont la place au **Falcon 2000
        Albatros**, la plateforme neuve du programme **AVSIMAR**. La transition
        s'étale sur plusieurs années : le Triton assure le **relais** en
        attendant la montée en puissance de l'Albatros.
  pieges:
    - Le Falcon 50M fait de la surveillance et du secours — il ne remplace pas l'Atlantique 2, avion de patrouille maritime armé (lutte anti-sous-marine).
    - « Triton » n'est pas un autre avion — c'est la version modernisée (optronique EUROFLIR 410) du Falcon 50M, déployée outre-mer.
    - C'est un triréacteur (trois moteurs), à ne pas confondre avec le biréacteur Falcon 200 Gardian ni avec le futur Falcon 2000 Albatros.
