content:
  essentiel:
    body: |
      Le **Panther** (AS565) est l'**hélicoptère embarqué léger** de
      l'aéronautique navale. C'est la **version militaire** du **Dauphin** : même
      cellule, mais équipée pour opérer depuis les **bâtiments de combat**
      (frégates) et remplir des missions militaires.

      Son rôle principal est d'**armer l'alerte** — le *plan d'action immédiat* —
      depuis un navire : décoller vite pour une mission de **sûreté**, de
      **reconnaissance** ou de **transport** (jusqu'à cinq passagers). Il peut
      emporter une **mitrailleuse de sabord** (MAG58) et s'appuie sur un système
      de mission (TRISTAN) et un **radar** (ORB-32).

      Il est regroupé au sein de la **flottille 36F**, sur la **base
      d'aéronautique navale de Hyères** (Var).
    aRetenir:
      - Le Panther est l'hélicoptère embarqué léger de la Marine, version militaire du Dauphin.
      - Il arme l'alerte (plan d'action immédiat) et les missions de sûreté et de soutien depuis les frégates.
      - Équipage de 3, masse maximale 4 250 kg, vitesse max 150 kt, rayon d'action 400 NM.
      - Il est mis en œuvre par la flottille 36F, à Hyères.
  sections:
    - id: un-helicoptere-embarque
      title: Un hélicoptère embarqué de combat
      body: |
        Contrairement au **NH90 Caïman**, plus gros et dédié à la lutte
        anti-sous-marine et au sauvetage en haute mer, le **Panther** est un
        appareil **léger** conçu pour accompagner les **frégates**. Embarqué à
        bord, il étend le « regard » et le « bras » du navire au-delà de
        l'horizon.

        Sa mission emblématique est l'**alerte** : maintenu prêt, il décolle sans
        délai pour aller **identifier** un contact suspect, **transporter** une
        équipe ou du matériel, ou appuyer une opération de **sûreté maritime**. Sa
        version dérive directement du **Dauphin** civil, militarisée pour ces
        besoins.
    - id: capacites-et-mise-en-oeuvre
      title: Capacités et mise en œuvre
      body: |
        Le Panther emporte un **équipage de trois** et peut transporter jusqu'à
        **cinq passagers**. Il atteint **150 nœuds** (environ 278 km/h) et tient
        l'air **environ trois heures**, pour un rayon d'action de l'ordre de
        **400 milles nautiques**.

        Pour ses missions militaires, il dispose d'un **système de mission**
        (TRISTAN), d'un **radar** (ORB-32) et peut recevoir une **mitrailleuse de
        sabord** (MAG58). L'ensemble de la flotte est regroupé au sein de la
        **flottille 36F**, à **Hyères**, d'où les appareils rejoignent les
        bâtiments qu'ils accompagnent en opération.
  pieges:
    - Le Panther est un hélicoptère embarqué léger — il ne remplit pas les mêmes missions que le NH90 Caïman (lutte anti-sous-marine, sauvetage lourd).
    - C'est la version militaire du Dauphin ; ne pas les confondre — le Dauphin de la Marine est surtout dédié au secours en mer et à la servitude.
    - Sa vocation première est l'alerte et la sûreté depuis les frégates, pas le combat anti-navire lourd.
