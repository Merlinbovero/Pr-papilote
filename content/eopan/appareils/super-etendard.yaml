summary: >-
  L'avion d'assaut embarqué qui a porté l'aéronavale pendant près de quarante
  ans (1978-2016) — Exocet, frappe nucléaire ASMP, guerres des Malouines (sous
  pavillon argentin) et du Kosovo, jusqu'au passage de témoin au Rafale M.
objectifs:
  - Situer le Super-Étendard dans l'histoire de l'aéronavale (service 1978-2016).
  - Connaître ses capacités marquantes (Exocet AM39, frappe nucléaire ASMP, version SEM).
  - Comprendre ce que son retrait (2016) a changé — le « tout-Rafale ».
