content:
  essentiel:
    body: |
      La **base d'aéronautique navale (BAN) de Hyères**, au lieu-dit **Le
      Palyvestre** (Var), près de **Toulon**, est la **seule** BAN de
      **Méditerranée**. C'est la grande **base d'hélicoptères** de la façade
      **sud**.

      Elle abrite **trois flottilles** d'hélicoptères de combat — la **31F**,
      la **35F** et la **36F** — mettant en œuvre le **Caïman Marine**, le
      **Panther**, le **Dauphin** et le **H160**. De là, les hélicoptères
      **surveillent**, luttent contre les **sous-marins** et les menaces de
      **surface**, et assurent le **secours en mer**.

      Créée en **1925**, active **24 h/24**, Hyères est le **pivot** des
      opérations aéromaritimes de la région, au service de la **Force d'action
      navale** basée à Toulon.
    aRetenir:
      - La BAN de Hyères (Var, près de Toulon) est la seule base d'aéronautique navale de Méditerranée.
      - C'est la grande base d'hélicoptères — flottilles 31F, 35F et 36F.
      - Ses hélicoptères assurent surveillance, lutte anti-sous-marine, action de surface et secours en mer.
      - Elle sert la Force d'action navale de Toulon et fonctionne 24 h/24.
  sections:
    - id: la-base-des-helicopteres
      title: La base des hélicoptères
      body: |
        Là où Landivisiau incarne la chasse et Lann-Bihoué la patrouille,
        **Hyères** est le royaume des **hélicoptères**. Ses trois flottilles de
        combat mettent en œuvre une **gamme** d'appareils : le **Caïman Marine**
        pour la lutte anti-sous-marine et le secours, mais aussi le **Panther**,
        le **Dauphin** et le nouveau **H160**, pour la surveillance, l'action de
        surface ou le service depuis les bâtiments.

        Ces hélicoptères **embarquent** sur les **frégates** et bâtiments de la
        **Force d'action navale** de **Toulon**, dont Hyères est le point
        d'appui aérien. La base réalise chaque année de nombreuses missions de
        **sauvetage en mer** au profit des usagers de la Méditerranée.
    - id: une-position-strategique
      title: Une position stratégique
      strate: maitriser
      body: |
        Implantée sur les anciens marais du **Palyvestre**, asséchés pour y
        installer l'aviation maritime dès les années **1920**, la base de Hyères
        a **un siècle d'histoire**. Fermée sous l'Occupation, elle a repris son
        essor pour devenir la **grande base hélicoptères** du Sud.

        Sa position en **Méditerranée**, proche de **Toulon** — premier port
        militaire français et port d'attache du **porte-avions Charles de
        Gaulle** — en fait un **pivot** des opérations aéromaritimes régionales.
        Elle accueille aussi des aéronefs alliés et d'autres armées lors des
        exercices internationaux.
  pieges:
    - Hyères est la seule BAN de Méditerranée — les trois autres sont en Bretagne.
    - C'est une base d'hélicoptères — pas de chasse embarquée ni de patrouille maritime à demeure.
    - Ne pas confondre la BAN de Hyères avec le port de Toulon — la base aéronavale arme les hélicoptères, le port abrite les navires.
