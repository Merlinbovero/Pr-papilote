content:
  essentiel:
    body: |
      Un aéronef de combat ne vaut que par ce qu'il **emporte**. Les armements
      de l'aéronautique navale se lisent par **mission** :

      - **antinavire** — le missile **Exocet AM39**, tiré par le Rafale M et
        l'Atlantique 2 ;
      - **dissuasion nucléaire** — le missile **ASMP-A** des Rafale Marine de
        la **FANu** ;
      - **lutte anti-sous-marine** — la torpille légère **MU90**, larguée par
        l'Atlantique 2 et le Caïman Marine ;
      - **combat air-air** — les missiles **MICA** et **Meteor** du Rafale ;
      - **frappe au sol** — bombes guidées et missiles de croisière selon les
        missions.

      Retenir les **couples porteur-armement** suffit pour l'entretien : un
      candidat qui sait qu'un ATL2 peut tirer un Exocet et larguer une MU90 a
      compris ce qu'est la **patrouille maritime armée**.
    aRetenir:
      - Exocet AM39 — missile antinavire (portée ~70 km), tiré par Rafale M et Atlantique 2.
      - ASMP-A — missile nucléaire supersonique de la FANu (Rafale), pilier aéroporté de la dissuasion.
      - MU90 — torpille légère anti-sous-marine (Atlantique 2, Caïman Marine).
      - MICA et Meteor — missiles air-air du Rafale (autodéfense et interception longue portée).
  sections:
    - id: antinavire-l-exocet
      title: L'antinavire — Exocet AM39
      body: |
        L'**Exocet** est la famille française de missiles **antinavires** —
        célèbre depuis les années 1980. Sa version **AM39** est **aéroportée** :
        tirée par le **Rafale Marine** ou l'**Atlantique 2**, elle vole en
        **subsonique** au **ras des flots** (vol dit *sea-skimming*, difficile
        à détecter) sur environ **70 km**, en « **tire et oublie** » — le
        missile rejoint seul sa cible après le tir.

        La famille compte d'autres versions — **MM40** depuis les navires,
        **SM39** depuis les sous-marins — d'où des **tirs coordonnés**
        multi-porteurs régulièrement exercés par la Marine.
    - id: dissuasion-l-asmp-a
      title: La dissuasion — ASMP-A
      body: |
        L'**ASMP-A** (*air-sol moyenne portée amélioré*) est le missile de la
        composante **aéroportée** de la dissuasion. **Supersonique** et doté
        d'une **charge nucléaire**, il arme les **Rafale** — dont les Rafale
        Marine de la **FANu**, capables d'opérer depuis le porte-avions.

        C'est l'armement au **statut le plus singulier** : il n'existe que
        pour ne pas servir. Sa simple existence, jointe aux SNLE de la FOST,
        garantit la **crédibilité** de la dissuasion française — à relier à
        la fiche missions.
    - id: asm-air-air-et-frappe
      title: Lutte ASM, air-air et frappe
      strate: maitriser
      body: |
        **Lutte anti-sous-marine** — la torpille légère **MU90**
        (coopération franco-italienne) est l'arme des chasseurs de
        sous-marins : larguée par l'**Atlantique 2** ou le **Caïman Marine**,
        elle poursuit seule sa cible en plongée.

        **Air-air** — le Rafale emporte le **MICA** (missile polyvalent
        d'autodéfense et de combat) et le **Meteor**, missile à
        **statoréacteur** d'interception à **longue portée** (plus de 100 km),
        qui conserve son énergie jusqu'à l'impact.

        **Frappe** — bombes **guidées laser** (notamment depuis l'ATL2 en
        appui des forces au sol) et armements air-sol du Rafale complètent la
        panoplie. Inutile de mémoriser chaque référence : ce que le jury
        apprécie, c'est la **cohérence** — quelle arme, pour quelle mission,
        depuis quel porteur.
  pieges:
    - L'Exocet n'est pas un armement unique mais une famille — AM39 aéroportée, MM40 depuis les navires, SM39 depuis les sous-marins.
    - L'ASMP-A n'est pas une arme d'emploi — c'est l'instrument de la dissuasion, dont la vocation est de ne jamais servir.
    - La MU90 est une torpille (autopropulsée, guidée) — pas une bombe ni une grenade sous-marine.
    - Ne pas confondre MICA (polyvalent, courte-moyenne portée) et Meteor (interception longue portée, statoréacteur).
