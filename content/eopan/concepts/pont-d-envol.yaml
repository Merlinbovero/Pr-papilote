title: Le pont d'envol
slug: pont-d-envol
summary: >-
  L'aérodrome flottant du porte-avions. Grâce à sa piste oblique, il permet de
  catapulter et d'apponter en même temps ; ses équipes, identifiées par des
  chasubles de couleur, y orchestrent un ballet aérien millimétré.
objectifs:
  - Décrire le pont d'envol comme l'aérodrome du porte-avions et le rôle de la piste oblique.
  - Expliquer comment la piste oblique permet de catapulter et d'apponter simultanément.
  - Identifier les équipes du pont par leurs chasubles de couleur (jaune, rouge, bleu, violet) et le « chien jaune ».
