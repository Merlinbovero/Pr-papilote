summary: >-
  Des hydravions de 1912 au groupe aéronaval du Charles de Gaulle, plus d'un
  siècle d'histoire : pionniers, porte-avions, guerres mondiales, Indochine et
  Algérie, puis l'ère moderne du tout-Rafale.
objectifs:
  - Situer les grandes étapes de l'histoire de l'aéronautique navale française (1912 à nos jours).
  - Identifier les porte-avions marquants (Béarn, Clemenceau, Foch, Charles de Gaulle).
  - Mobiliser des repères historiques utiles à la culture aéronavale de l'entretien.
