content:
  essentiel:
    body: |
      La **patrouille maritime (PATMAR)** est la mission de surveillance et de
      combat menée **au-dessus de la mer**, loin des côtes, par des avions à
      **grande endurance**. En France, elle repose sur l'**Atlantique 2
      (ATL2)**, mis en œuvre depuis la base d'aéronautique navale de
      **Lann-Bihoué** par les **flottilles 21F et 23F**.

      Sa mission la plus emblématique est la **lutte sous la mer** — la
      **lutte anti-sous-marine (ASM)** : détecter, pister puis, si nécessaire,
      traiter un sous-marin adverse. L'ATL2 est **l'un des rares avions en
      service au monde conçus spécialement pour cette mission**. Il assure
      aussi la **lutte anti-navires**, l'**action de l'État en mer** et
      l'**appui aux forces au sol**.

      Un équipage complet compte **14 personnes** — dont pilotes, coordonnateur
      tactique, détecteurs et opérateurs acoustiques — pour une endurance
      pouvant atteindre **14 heures de vol**.
    aRetenir:
      - La patrouille maritime surveille et combat au large ; sa mission phare est la lutte sous la mer (ASM).
      - L'Atlantique 2 est mis en œuvre depuis Lann-Bihoué (flottilles 21F et 23F), équipage de 14, jusqu'à 14 h d'endurance.
      - L'ATL2 est l'un des rares avions au monde conçus spécialement pour la lutte anti-sous-marine.
      - La patrouille maritime protège la Force océanique stratégique — donc la dissuasion.
  sections:
    - id: traquer-sous-la-mer
      title: Traquer un sous-marin
      body: |
        La lutte anti-sous-marine est un travail de **patience** et
        d'**écoute** : l'avion sème des **bouées acoustiques** (sonobouées),
        analyse les signatures sonores, croise les indices, puis affine sa
        recherche pour **localiser** la cible avant de pouvoir la traiter.

        Voler **bas et longtemps**, souvent au-dessus de l'océan sans repère,
        exige une endurance et une **maniabilité à basse altitude**
        remarquables — d'où l'importance de l'équipage nombreux et spécialisé
        qui arme l'ATL2.
    - id: proteger-la-dissuasion
      title: Protéger la dissuasion
      body: |
        Au-delà du renseignement et du combat naval, la patrouille maritime a
        une mission **stratégique** : contribuer à la **sûreté des approches**
        et à la protection de la **Force océanique stratégique (FOST)** — les
        **SNLE** qui portent la dissuasion.

        Garantir qu'aucun sous-marin hostile ne piste nos propres sous-marins
        est une condition de la **permanence à la mer** de la dissuasion : la
        patrouille maritime travaille ainsi, discrètement, au cœur de la
        souveraineté nationale.
    - id: une-mission-polyvalente
      title: Une mission polyvalente
      strate: maitriser
      body: |
        L'ATL2 n'est pas qu'un chasseur de sous-marins. La même plateforme
        surveille le **trafic de surface**, participe à l'**action de l'État
        en mer** (lutte contre les trafics, secours, pollutions) et peut,
        rénové au **standard 6**, appuyer des **opérations à terre** par le
        renseignement. C'est cette **polyvalence** — un seul avion, plusieurs
        métiers — qui fait sa valeur.
  pieges:
    - La patrouille maritime n'est pas de la simple surveillance — sa mission phare est la lutte anti-sous-marine (ASM).
    - Ne pas confondre la FOST (les SNLE, cœur de la dissuasion) avec la patrouille maritime qui la protège.
    - L'Atlantique 2 vole depuis une base à terre (Lann-Bihoué) — ce n'est pas un avion embarqué sur porte-avions.
