title: Le catapultage
slug: catapultage
summary: >-
  Procédure de décollage embarqué : la catapulte à vapeur lance l'avion de 0 à
  près de 250 km/h en environ deux secondes sur 75 mètres, pour lui donner sa
  vitesse d'envol sur la piste courte du porte-avions.
objectifs:
  - Expliquer le principe du catapultage — donner à l'avion sa vitesse d'envol sur une piste trop courte.
  - Décrire la catapulte à vapeur du Charles de Gaulle et ses performances (75 m, ~2 s, jusqu'à plus de 20 t).
  - Situer le catapultage dans la mise en œuvre CATOBAR, en vis-à-vis de l'appontage.
