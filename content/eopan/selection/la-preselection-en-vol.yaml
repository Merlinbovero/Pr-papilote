summary: >-
  Sept mois à Lanvéoc-Poulmic, une quinzaine de vols notés sur Cap 10 — la
  présélection en vol ne cherche pas des pilotes déjà formés, elle mesure une
  seule chose : la capacité à apprendre vite et à restituer en vol.
objectifs:
  - Situer la présélection en vol dans le parcours EOPAN (après la sélection initiale).
  - Décrire son déroulement (EIP/50S, Lanvéoc-Poulmic, Cap 10, ~7 mois, vols notés).
  - Comprendre ce qui est évalué — la pente de progression, pas le niveau de départ.
