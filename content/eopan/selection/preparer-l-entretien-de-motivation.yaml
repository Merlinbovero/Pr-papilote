title: Préparer l'entretien de motivation
slug: preparer-l-entretien-de-motivation
summary: >-
  L'entretien ne se récite pas — il se construit. Ce que le jury cherche à
  évaluer, comment bâtir sa préparation sur des preuves personnelles, et les
  erreurs qui disqualifient.
objectifs:
  - Comprendre ce que le jury évalue réellement lors de l'entretien EOPAN.
  - Construire sa préparation à partir de son propre parcours (méthode de la grille de preuves).
  - Éviter les erreurs classiques — réponses apprises, motivation floue, méconnaissance du métier.
