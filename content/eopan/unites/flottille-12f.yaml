content:
  essentiel:
    body: |
      La **flottille 12F** est l'une des **trois flottilles de chasse** de
      l'aéronautique navale, avec les 11F et 17F. Équipée de **Rafale Marine**
      et stationnée à la **BAN Landivisiau**, elle embarque sur le porte-avions
      **Charles de Gaulle**.

      Sa particularité est **historique et mondiale** : la 12F a été la **toute
      première unité aérienne au monde** mise en œuvre sur **Rafale**, en
      **mai 2001**. Elle a ainsi ouvert la voie à toute la carrière
      opérationnelle de l'avion, dans la Marine comme dans l'Armée de l'Air.

      Créée en **1948**, riche d'une longue histoire (Indochine, Algérie,
      F-8 Crusader), elle est surnommée **« La Douzeff »** ou **« Les
      Lascars »**, et arbore une mascotte bien connue : **Donald Duck**.
    aRetenir:
      - La 12F est l'une des trois flottilles de chasse de l'aéronavale (Rafale M), avec les 11F et 17F.
      - Elle fut la première unité aérienne au monde mise en œuvre sur Rafale (mai 2001).
      - Créée en 1948, stationnée à Landivisiau, elle embarque sur le Charles de Gaulle.
      - Surnommée « La Douzeff » ou « Les Lascars », avec Donald Duck pour mascotte.
  sections:
    - id: missions
      title: Missions
      body: |
        Comme ses sœurs de Landivisiau, la 12F couvre l'ensemble des missions
        de la **chasse embarquée** : **interception** et **défense aérienne**,
        **assaut** contre la terre et contre les navires, **appui**,
        **reconnaissance**, **ravitaillement en vol** entre Rafale et volet
        aéronaval de la **dissuasion nucléaire**.

        Elle les conduit depuis la **terre** (à Landivisiau) comme depuis le
        **porte-avions**, au sein du groupe aérien embarqué.
    - id: pionniere-du-rafale
      title: Pionnière du Rafale
      strate: maitriser
      body: |
        En recevant ses premiers **Rafale M** en **mai 2001**, la 12F est
        entrée dans l'histoire comme la **première unité au monde** à mettre en
        œuvre cet appareil — avant même les escadrons de l'Armée de l'Air et de
        l'Espace. Ce rôle de **pionnière** a fait d'elle le banc d'essai
        opérationnel du Rafale Marine.

        Auparavant dissoute puis réarmée à plusieurs reprises (notamment sur
        **F-8 Crusader** à partir de 1964, pour trente-quatre ans de service),
        la 12F illustre la façon dont une flottille traverse les générations
        d'appareils tout en conservant son **identité** et ses **traditions**.
  pieges:
    - Une flottille est l'unité de l'aéronautique navale — l'équivalent de l'escadron dans l'Armée de l'Air et de l'Espace.
    - La particularité de la 12F est d'avoir été la première unité au monde sur Rafale (2001) — pas la plus ancienne flottille de chasse (c'est la 11F).
    - La 12F est stationnée à Landivisiau et embarque sur le porte-avions lors des déploiements — elle n'est pas basée en permanence à bord.
