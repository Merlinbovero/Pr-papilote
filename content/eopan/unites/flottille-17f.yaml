summary: >-
  Flottille de chasse de l'aéronautique navale, équipée de Rafale Marine et
  stationnée à Landivisiau. Surnommée « La Glorieuse », elle fut la dernière
  unité française sur Super-Étendard modernisé avant son passage au Rafale.
objectifs:
