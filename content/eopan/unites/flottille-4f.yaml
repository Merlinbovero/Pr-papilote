content:
  essentiel:
    body: |
      La **flottille 4F** est une unité **unique** dans l'aéronautique navale :
      c'est la flottille de **guet aérien**. Elle met en œuvre les **E-2C
      Hawkeye**, ces avions radars reconnaissables à leur grande soucoupe
      tournante, qui servent d'**yeux** et de **cerveau** au groupe aéronaval.

      Sa mission n'est pas le combat mais la **détection**, le **commandement**
      et le **contrôle** : repérer très loin les menaces aériennes, suivre les
      pistes et **coordonner** l'action des chasseurs. Sans elle, le groupe
      aérien embarqué serait aveugle au-delà de l'horizon.

      Héritière de la **première** formation de l'aviation d'escadre, la 4F est
      stationnée à la **BAN Lann-Bihoué** et embarque sur le porte-avions
      **Charles de Gaulle** lors des déploiements.
    aRetenir:
      - La 4F est l'unique flottille de guet aérien de l'aéronautique navale, équipée des E-2C Hawkeye.
      - Sa mission est la détection, le commandement et le contrôle — pas le combat.
      - Elle est stationnée à la BAN Lann-Bihoué et embarque sur le Charles de Gaulle.
      - Héritière de la première formation de l'aviation d'escadre, elle est la seule flottille aux trois fourragères.
  sections:
    - id: role-au-sein-du-groupe
      title: Rôle au sein du groupe aéronaval
      body: |
        Au cœur du **groupe aérien embarqué**, la 4F joue le rôle de **vigie**
        et de **tour de contrôle** volante. Ses Hawkeye, en patrouillant en
        altitude, détectent les aéronefs bien au-delà de la portée des radars
        des navires, puis **répartissent** et **guident** les chasseurs vers les
        menaces.

        C'est une capacité **rare** : peu de marines dans le monde disposent
        d'un guet aérien embarqué. Elle démultiplie l'efficacité de tout le
        groupe, en offrant une **vision** d'ensemble de la situation aérienne.
    - id: une-flottille-decoree
      title: Une flottille décorée
      strate: maitriser
      body: |
        Descendante de la **première** formation de l'aviation d'escadre
        (créée en **1918**), la 4F a traversé un siècle d'histoire navale :
        Seconde Guerre mondiale, Indochine, Liban, Bosnie, Afghanistan et
        opérations au Moyen-Orient.

        Dissoute en **1997**, elle est **réactivée** le **10 mars 2000** pour
        mettre en œuvre les Hawkeye. Son histoire lui vaut une distinction
        unique : c'est la **seule flottille** de l'aéronavale autorisée à porter
        **trois fourragères**. Son insigne — un **aigle de mer** posé sur une
        **tortue** — symbolise l'union de l'air et de la mer.
  pieges:
    - La 4F ne combat pas — c'est une flottille de guet aérien (détection et coordination), à ne pas confondre avec les flottilles de chasse (11F, 12F, 17F).
    - Ses Hawkeye sont basés à terre (Lann-Bihoué) et n'embarquent sur le porte-avions que lors des déploiements.
    - Le guet aérien embarqué est une capacité rare — la 4F en est l'unique détentrice dans l'aéronautique navale.
