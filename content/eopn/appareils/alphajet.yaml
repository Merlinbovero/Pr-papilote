  constructeur: Dassault-Breguet / Dornier (coopération France-RFA)
  role: Avion d'entraînement et d'appui léger — aujourd'hui monture de la Patrouille de France
  armees: [Armée de l'air et de l'espace]
  miseEnService: Fin des années 1970 (premier avion de série en vol le 4 novembre 1977)
  statut: En service à la Patrouille de France (BA 701 Salon-de-Provence) — état au 2026-07
