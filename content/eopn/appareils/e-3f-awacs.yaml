content:
  essentiel:
    body: |
      L'**E-3F AWACS** (Airborne Warning And Control System), désigné en
      français **SDCA** (Système de Détection et de Commandement Aéroporté), est
      le **« radar volant »** de l'armée de l'Air et de l'Espace. Reconnaissable
      à son grand **radar en forme de soucoupe** (le « rotodôme ») posé sur le
      dos, c'est un avion dérivé du **Boeing 707**.

      Sa mission est double : **voir** et **commander**. Son radar détecte les
      aéronefs, les navires et les menaces à **plus de 400 km**, y compris à
      **basse altitude** là où les radars au sol sont aveuglés par le relief.
      À bord, une **équipe de contrôleurs** (l'équipage compte **18**
      personnes) élabore la situation tactique et **coordonne la manœuvre
      aérienne** — chasseurs, ravitailleurs, défense sol-air — grâce à la
      liaison de données **Link 16**.

      La France dispose de **quatre** E-3F, livrés au **début des années 1990**,
      mis en œuvre par la **36e escadre** sur la **base aérienne 702 d'Avord**.
    aRetenir:
      - L'E-3F AWACS (SDCA) est l'avion radar de détection et de commandement aéroporté de l'AAE.
      - Son radar dorsal (rotodôme) détecte à plus de 400 km, y compris à basse altitude.
      - Il commande la manœuvre aérienne (18 personnes à bord, liaison Link 16) — voir et faire agir.
      - Quatre appareils dérivés du Boeing 707, livrés au début des années 1990, basés à Avord (36e escadre).
  sections:
    - id: voir-loin-et-commander
      title: Voir loin et commander
      body: |
        Un radar posé au sol est **limité par le relief** : les collines et la
        courbure de la Terre créent des angles morts, surtout à **basse
        altitude**. En montant le radar dans un avion à haute altitude, l'AWACS
        supprime ces angles morts et **voit beaucoup plus loin** — au-delà de
        **400 km**.

        Mais l'E-3F n'est pas qu'un capteur : c'est un **poste de commandement
        volant**. Les **contrôleurs** à bord identifient les pistes,
        reconstituent la **situation tactique** (avions, navires, menaces
        sol-air) et **guident** les chasseurs vers leurs objectifs, orchestrent
        les ravitaillements, gèrent l'espace aérien. La **liaison Link 16**
        partage cette image en temps réel avec les autres acteurs — l'E-3F fut
        d'ailleurs la première plateforme française à en être dotée.
    - id: un-noeud-de-la-puissance-aerienne
      title: Un nœud de la puissance aérienne (à savoir)
      strate: maitriser
      body: |
        L'AWACS est un **multiplicateur de force** : il rend l'ensemble du
        dispositif aérien plus efficace en lui donnant une **vision commune** et
        une **coordination** centralisée. On le retrouve aussi bien dans la
        **posture permanente de sûreté aérienne** (surveillance du ciel
        national) que dans les opérations extérieures et les missions de
        réassurance de l'**OTAN**.

        Sa très longue **endurance** (10 h de vol, jusqu'à **18 h** avec
        ravitaillement en vol) lui permet de tenir la veille pendant de longues
        périodes. C'est un appareil **rare et précieux** : seuls quelques pays
        en disposent, et ses quatre exemplaires français sont des atouts
        stratégiques suivis de près.
  pieges:
    - L'E-3F n'est pas un avion de chasse — c'est un capteur et un poste de commandement (il « voit » et « commande », il ne combat pas).
    - Son radar est le rotodôme dorsal — à ne pas confondre avec un simple avion de transport dérivé du Boeing 707.
    - La France n'en aligne que quatre — c'est une capacité rare, basée à Avord (36e escadre), pas un appareil de série courant.
