summary: >-
  Le premier avion de la classe Mach 2 construit en série en Europe — le delta
  de Dassault qui a donné son nom à toute une lignée et s'est vendu à plus de
  1 400 exemplaires dans le monde. L'ancêtre direct du Mirage 2000.
objectifs:
  - Situer le Mirage III (intercepteur delta, premier Mach 2 européen de série).
  - Connaître les jalons (Mirage I 1955, prototype 17/11/1956, Mirage III C 1960).
  - Comprendre le succès mondial de la famille Mirage III/5 (plus de 1 400 exemplaires).
