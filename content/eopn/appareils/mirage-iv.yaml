infobox:
  constructeur: Dassault (GAMD)
  role: Bombardier stratégique supersonique — premier vecteur de la dissuasion nucléaire
  armees: [Armée de l'air (Forces aériennes stratégiques)]
  miseEnService: "1964 (première prise d'alerte nucléaire le 8 octobre 1964)"
  statut: Retiré du service (fin du rôle nucléaire en 1996, retrait définitif le 23 juin 2005)
