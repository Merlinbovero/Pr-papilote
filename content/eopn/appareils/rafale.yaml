content:
  essentiel:
    body: |
      Le **Rafale** est l'**avion de combat** de référence de l'**Armée de l'air
      et de l'Espace**. Biréacteur de **Dassault Aviation**, mis en service en
      **2006**, il forme, avec le **Mirage 2000**, l'**épine dorsale** de la
      chasse française.

      Sa signature est d'être **omnirôle** : un même appareil, dans une même
      mission, peut enchaîner des tâches très différentes — **défense
      aérienne**, **assaut** au sol, action **anti-navire**, **reconnaissance**,
      et **dissuasion nucléaire** (missile ASMP/A porté par le Rafale B).

      Il existe en deux versions pour l'armée de l'air : le **Rafale B**,
      **biplace**, et le **Rafale C**, **monoplace**. La Marine, elle, met en
      œuvre le **Rafale M**, sa version embarquée — même famille, adaptée au
      porte-avions.
    aRetenir:
      - Le Rafale est l'avion de combat omnirôle de l'Armée de l'air et de l'Espace, mis en service en 2006.
      - Il existe en Rafale B (biplace) et Rafale C (monoplace) ; la version embarquée de la Marine est le Rafale M.
      - Omnirôle, il couvre toutes les missions — défense aérienne, assaut, anti-navire, reconnaissance, dissuasion.
      - Il porte, avec le Rafale B, le volet aéroporté de la dissuasion nucléaire (missile ASMP/A).
  sections:
    - id: un-avion-omnirole
      title: Un avion omnirôle
      body: |
        Le concept clé du Rafale est l'**omnirôle** : là où des générations
        précédentes spécialisaient chaque avion (un pour la chasse, un pour le
        bombardement, un pour la reconnaissance), le Rafale sait **tout faire**,
        et parfois **au cours d'une même sortie**.

        Il assure ainsi la **supériorité** et la **défense aériennes**,
        l'**assaut** et la **pénétration** au sol par tout temps, l'action
        **anti-navire**, la **reconnaissance** tactique et stratégique, et
        l'**intervention** à longue distance grâce au **ravitaillement en vol**.
        Cette polyvalence est un atout majeur pour une armée qui doit faire
        **beaucoup avec un parc concentré**.
    - id: versions-et-bases
      title: Versions et bases
      body: |
        Pour l'**Armée de l'air et de l'Espace**, le Rafale existe en deux
        versions :

        - le **Rafale B**, **biplace** (deux membres d'équipage) ;
        - le **Rafale C**, **monoplace**.

        La **Marine nationale** met en œuvre la version embarquée, le **Rafale
        M**, toujours monoplace — c'est le même appareil de base, adapté au
        catapultage et à l'appontage.

        Le Rafale est entré en service en **2006** au sein de l'escadron de
        chasse **« Provence »**, à **Saint-Dizier**. Plusieurs **bases
        aériennes** de chasse en sont aujourd'hui équipées (Saint-Dizier,
        Mont-de-Marsan, Orange…).
    - id: le-rafale-et-la-dissuasion
      title: Le Rafale et la dissuasion
      strate: maitriser
      body: |
        Au-delà de ses missions conventionnelles, le Rafale porte une
        responsabilité **stratégique** : il est l'un des vecteurs de la
        **dissuasion nucléaire** française. Le **Rafale B** emporte le missile
        **ASMP/A**, au sein des **Forces aériennes stratégiques**.

        Cette mission, permanente et discrète, illustre le **niveau
        d'exigence** attendu des équipages. Elle rappelle aussi que, derrière le
        concours **EOPN**, se profile un métier où l'on peut être appelé à
        servir les intérêts les plus **vitaux** de la Nation — une dimension que
        le candidat doit comprendre.
  pieges:
    - Le Rafale de l'armée de l'air (B/C) et le Rafale M de la Marine sont de la même famille, mais adaptés à des milieux différents (terre / porte-avions).
    - « Omnirôle » ne veut pas dire « polyvalent entre deux missions » — le Rafale peut enchaîner des tâches différentes au cours d'une même sortie.
    - Le Rafale B est biplace ; c'est notamment lui qui porte le missile de la dissuasion nucléaire aéroportée (ASMP/A).
