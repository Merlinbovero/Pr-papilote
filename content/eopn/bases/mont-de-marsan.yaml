content:
  essentiel:
    body: |
      La **BA 118 « Colonel Rozanoff »** — du nom du premier pilote
      français à avoir dépassé 1 000 km/h — cumule deux vocations rares
      sur une même plateforme landaise :

      - la **chasse opérationnelle** — la **30e escadre**, montée en
        puissance à partir de 2015, aligne des **Rafale** au sein de
        trois escadrons : l'ECE **1/30 « Côte d'Argent »**
        (expérimentation), l'EC **2/30 « Normandie-Niémen »** (l'escadron
        des As du front de l'Est) et l'EC **3/30 « Lorraine »** ;
      - l'**expérimentation** — le **CEAM** (Centre d'expertise aérienne
        militaire) y étudie, teste et définit les **emplois futurs** des
        matériels de l'armée de l'Air : nouveaux standards du Rafale,
        drones, systèmes.

      Mont-de-Marsan est aussi un lieu de mémoire de la dissuasion —
      c'est de cette base que le **Mirage IV** a fait ses derniers vols,
      jusqu'au retrait définitif de juin **2005**.
    aRetenir:
      - "BA 118 « Colonel Rozanoff » à Mont-de-Marsan (Landes) — chasse ET expérimentation sur la même base."
      - "30e escadre de chasse sur Rafale — dont le Normandie-Niémen (2/30) et l'escadron d'expérimentation 1/30 Côte d'Argent."
      - "Le CEAM y définit les emplois futurs des matériels — tout nouveau standard du Rafale passe par Mont-de-Marsan."
      - "Lieu du dernier vol du Mirage IV (retrait définitif, juin 2005)."
  sections:
    - id: la-boucle-experimentation-operations
      title: La boucle expérimentation-opérations
      body: |
        L'originalité de Mont-de-Marsan est la **boucle courte** entre
        essais et emploi — le CEAM et l'escadron d'expérimentation 1/30
        reçoivent les nouveaux standards (Rafale F4 hier, F5 demain), en
        écrivent les **procédures d'emploi**, forment les premiers
        équipages, et les escadrons opérationnels de la base les mettent
        en œuvre aussitôt. Entre DGA Essais en vol (qui vérifie que « ça
        marche ») et les forces (qui s'en servent), le CEAM répond à la
        question du **comment s'en servir au combat**.

        Pour un futur pilote de chasse, la base incarne une trajectoire
        possible — après quelques années en escadron, les meilleurs
        peuvent rejoindre l'expérimentation, voire l'EPNER pour les
        essais : trois métiers de pilote, trois niveaux de la même
        passion.
  pieges:
    - "CEAM = expertise et EMPLOI des matériels — à ne pas confondre avec DGA Essais en vol (Istres), qui conduit les essais techniques."
    - "Le Normandie-Niémen vole aujourd'hui sur Rafale à Mont-de-Marsan — pas à Saint-Dizier."
    - "« Colonel Rozanoff » — premier pilote français à plus de 1 000 km/h, et non un As de 14-18."
    - "Le Mirage IV a fini sa carrière ici en 2005 — en mission de reconnaissance stratégique, pas nucléaire (transférée dès 1996)."
