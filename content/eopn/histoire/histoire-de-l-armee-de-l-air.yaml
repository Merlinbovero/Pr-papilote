summary: >-
  De l'Aéronautique militaire de 1912 à l'armée de l'Air et de l'Espace de
  2020 — l'indépendance de 1934, les As de 14-18, les FAFL, l'entrée dans la
  dissuasion avec le Mirage IV : un siècle de puissance aérienne française.
