content:
  essentiel:
    body: |
      La **posture permanente de sûreté aérienne (PPS-A)** — la « **police du
      ciel** » — est la mission **permanente et prioritaire** de défense du
      territoire assurée par l'armée de l'Air et de l'Espace. Elle est active
      **24h/24 et 7j/7**, sous l'autorité du **CDAOA** (commandement de la
      défense aérienne et des opérations aériennes).

      Elle repose sur trois actes opérationnels, à mener en un temps très
      court : **détecter**, **identifier**, puis, si nécessaire,
      **intercepter** tout aéronef suspect dans l'espace aérien national. La
      permanence d'un dispositif d'alerte pré-positionné se combine à la
      réactivité de la chaîne de commandement.
    aRetenir:
      - La PPS-A est la mission permanente et prioritaire de la défense aérienne, assurée 24h/24 et 7j/7.
      - Trois actes — détecter, identifier, intercepter — sous l'autorité du CDAOA.
      - Le dispositif s'appuie sur un réseau d'environ 70 radars et trois centres de détection et de contrôle.
      - Lors des grands événements, des dispositifs particuliers de sûreté aérienne (DPSA) renforcent la posture.
  sections:
    - id: detecter-et-identifier
      title: Détecter et identifier
      body: |
        À chaque instant, l'armée de l'Air et de l'Espace doit **connaître**
        la situation aérienne au-dessus du territoire. Grâce à la mise en
        réseau de près de **70 radars** civils et militaires, **trois centres
        de détection et de contrôle (CDC)** — **Lyon Mont-Verdun** (Rhône),
        **Cinq-Mars-la-Pile** (Indre-et-Loire) et **Mont-de-Marsan** (Landes)
        — suivent les aéronefs qui transitent dans leurs secteurs.

        Cette mission quotidienne mobilise environ **450 aviateurs**. Tout
        écart — avion qui ne répond plus, trajectoire anormale, aéronef non
        identifié — déclenche l'alerte.
    - id: intercepter
      title: Intercepter
      body: |
        Quand le doute persiste, des **chasseurs** et des **hélicoptères**
        maintenus en **alerte** décollent en quelques minutes pour aller au
        contact : reconnaître visuellement l'appareil, le guider, le
        contraindre à se dérouter — voire, en dernier recours et sur décision
        politique, employer la force.

        Ce dispositif est porté par la **brigade aérienne de la posture
        permanente de sûreté (BAPPS)**, subordonnée au CDAOA. C'est
        l'expression concrète de la souveraineté sur l'espace aérien.
    - id: les-dispositifs-particuliers
      title: Les dispositifs particuliers (DPSA)
      strate: maitriser
      body: |
        Lors d'un **événement sensible** — sommet international, grande
        compétition, cérémonie — un **dispositif particulier de sûreté
        aérienne (DPSA)** vient renforcer le socle de la PPS-A. Il densifie la
        surveillance et les moyens d'interception sur une zone et une période
        données pour **prévenir tout acte de malveillance venu des airs**,
        qu'il soit d'origine terroriste, militaire ou revendicative.

        C'est un point d'actualité apprécié en entretien : la police du ciel
        n'est pas qu'une posture de guerre froide, elle protège aussi les
        grands rendez-vous de la vie nationale.
  pieges:
    - La PPS-A est permanente — elle ne s'interrompt jamais, même en temps de paix profonde.
    - Ne pas confondre le CDAOA (qui commande la défense aérienne) et les CDC (qui détectent et contrôlent).
    - L'interception ne signifie pas « tir » — c'est d'abord aller reconnaître et contraindre ; l'emploi de la force relève d'une décision politique.
