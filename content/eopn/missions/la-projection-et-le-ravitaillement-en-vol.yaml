summary: >-
  Aller loin, vite et longtemps : projeter des forces à l'autre bout du monde
  repose sur le trio A330 MRTT Phénix — Rafale — A400M Atlas, et sur une
  capacité clé, le ravitaillement en vol, qui allonge le bras de l'aviation.
objectifs:
  - Définir la projection de puissance et de forces comme mission de l'armée de l'Air et de l'Espace.
  - Expliquer le rôle du ravitaillement en vol et le trio A330 MRTT — Rafale — A400M.
  - Distinguer le transport tactique (A400M) du ravitaillement stratégique (A330 Phénix).
