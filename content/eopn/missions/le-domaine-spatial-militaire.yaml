content:
  essentiel:
    body: |
      Depuis **2020**, l'armée de l'Air est devenue l'armée de l'Air **et de
      l'Espace (AAE)** : l'espace, devenu un milieu **stratégique** et
      **encombré** (satellites, débris, menaces), est désormais un domaine
      militaire à part entière.

      Le **Commandement de l'espace (CDE)**, créé le **3 septembre 2019**, en
      est le pilier. Rattaché à l'AAE mais **interarmées** (personnels de
      l'Air, de la Terre, de la Marine, de la DGA…), il est installé à
      **Toulouse**, au cœur du plus grand écosystème spatial d'Europe, à
      proximité du **CNES**. Il organise chaque année un grand exercice spatial
      militaire (**AsterX**).
    aRetenir:
      - Depuis 2020, l'armée de l'Air est l'armée de l'Air et de l'Espace.
      - Le Commandement de l'espace (CDE) a été créé en 2019 et s'installe à Toulouse, près du CNES.
      - Le CDE est rattaché à l'AAE mais interarmées (Air, Terre, Marine, DGA).
      - Ses fonctions — surveillance de la situation spatiale, appui aux opérations, action dans l'espace.
  sections:
    - id: pourquoi-l-espace
      title: Pourquoi l'espace est devenu stratégique
      body: |
        Les armées **dépendent** de l'espace : positionnement et navigation
        (GPS/Galileo), communications, observation, alerte, renseignement.
        Or ce milieu est de plus en plus **encombré** (multiplication des
        satellites et des débris) et **disputé** (capacités d'écoute, de
        brouillage, d'approche de satellites par des puissances rivales).

        Protéger nos satellites et **connaître** ce qui se passe en orbite est
        devenu une condition de l'autonomie stratégique — d'où la bascule de
        2020 : l'armée de l'Air devient armée de l'Air **et de l'Espace**.
    - id: le-commandement-de-l-espace
      title: Le Commandement de l'espace
      body: |
        Créé en **2019**, le **CDE** rassemble les moyens spatiaux militaires
        sur un site unique à **Toulouse**. Son action s'organise autour de
        quatre fonctions : le **soutien aux capacités spatiales**, l'**appui
        spatial aux opérations interarmées**, la **connaissance de la situation
        spatiale** (surveiller ce qui gravite autour de la Terre) et l'**action
        dans l'espace**.

        Le choix de Toulouse n'est pas un hasard : la ville abrite le **Centre
        spatial** du CNES et le plus grand pôle spatial européen — le militaire
        s'appuie sur l'écosystème civil et industriel.
    - id: s-entrainer-dans-l-espace
      title: S'entraîner dans l'espace
      strate: maitriser
      body: |
        Chaque année, le CDE conduit **AsterX**, un exercice de **wargame**
        spatial : simuler des crises en orbite (satellite menacé, manœuvre
        hostile, panne) pour entraîner les opérateurs et éprouver les
        procédures. C'est un point d'actualité très apprécié en entretien —
        montrer qu'on a compris que le « ciel » militaire ne s'arrête plus à
        la stratosphère.
  pieges:
    - Depuis 2020, dire « armée de l'Air » est incomplet — c'est l'armée de l'Air et de l'Espace.
    - Le Commandement de l'espace est rattaché à l'AAE mais il est interarmées — pas réservé aux seuls aviateurs.
    - Le rôle militaire dans l'espace est surtout de surveiller, appuyer et protéger — pas de « faire la guerre des étoiles ».
