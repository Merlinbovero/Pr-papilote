summary: >-
  Protéger, dissuader, intervenir — les trois fonctions stratégiques de
  l'armée de l'Air et de l'Espace, de la police du ciel assurée 24h/24 (PPS-A)
  à la dissuasion nucléaire des Forces aériennes stratégiques.
objectifs:
  - Citer les trois fonctions stratégiques de l'AAE (protéger, dissuader, intervenir).
  - Expliquer la posture permanente de sûreté aérienne (PPS-A) et son dispositif.
  - Situer les Forces aériennes stratégiques (FAS) dans la dissuasion nucléaire.
