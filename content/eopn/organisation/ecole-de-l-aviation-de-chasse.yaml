summary: >-
  Créée en 1943, l'École de l'aviation de chasse « Christian Martell » forme
  les pilotes de chasse français. Installée à Cognac (BA 709) et rééquipée en
  PC-21, elle est née en 2020 de la fusion de l'EAC de Tours et de l'école de
  pilotage de Cognac.
objectifs:
