slug: la-formation-du-pilote-de-chasse
summary: >-
  De Salon-de-Provence au premier escadron — le cursus du pilote de chasse de
  l'armée de l'Air et de l'Espace : vol militaire sur planeur et Cirrus,
  spécialisation chasse à Cognac sur Grob 120 et PC-21, puis transformation
  sur Rafale ou Mirage 2000.
objectifs:
  - Restituer les grandes étapes du cursus du pilote de chasse (Salon, Cognac, transformation, escadron).
  - Associer chaque étape à ses appareils (planeur/Cirrus, Grob 120, PC-21, Rafale/Mirage 2000).
  - Comprendre la logique de sélection continue tout au long de la formation.
