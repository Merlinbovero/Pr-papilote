content:
  essentiel:
    body: |
      La **Patrouille de France (PAF)** — aussi appelée **Patrouille
      acrobatique de France** — est l'**équipe de présentation** et
      l'**ambassadrice** de l'armée de l'Air et de l'Espace. Surnommée « **la
      grande dame** », elle évolue dans le ciel avec grâce et précision depuis
      **1953**, et compte parmi les patrouilles acrobatiques les plus
      prestigieuses au monde.

      Son nom naît le **17 mai 1953**, lors d'un meeting à **Alger** : une
      patrouille de quatre **F-84** de la 3ᵉ escadre de Reims, menée par le
      commandant **Delachenal**, est baptisée « la Patrouille de France » par
      le commentateur **Jacques Noetinger**. Le nom restera.

      Elle vole sur **Alphajet** depuis **1981** et se présente en **huit
      avions** en formation. Elle est basée sur la **base aérienne 701 de
      Salon-de-Provence**, berceau des officiers de l'armée de l'Air.
    aRetenir:
      - La Patrouille de France est l'équipe de présentation et l'ambassadrice de l'armée de l'Air et de l'Espace.
      - Née en 1953 (baptisée à Alger le 17 mai 1953), surnommée « la grande dame ».
      - Elle vole sur Alphajet depuis 1981, à huit avions, depuis la base 701 de Salon-de-Provence.
      - Sa mission est la représentation et le rayonnement — en vol comme au sol.
  sections:
    - id: une-naissance-par-hasard
      title: Un nom né d'un meeting
      body: |
        La PAF ne s'est pas décrétée : son nom est **né du public**. Le
        **17 mai 1953**, à Alger, quatre **F-84 Thunderjet** de la 3ᵉ escadre
        de chasse de Reims enchaînent des figures serrées. Le commentateur
        **Jacques Noetinger** lance à la foule : « Et voici… la Patrouille de
        France ! ». L'expression fait mouche et devient officielle.

        De cette origine, la PAF garde une **exigence** : chaque figure est
        répétée des centaines de fois, car la précision au mètre près, à
        quelques dizaines de centimètres entre appareils, ne tolère aucune
        approximation.
    - id: ambassadrice-de-l-armee-de-l-air
      title: Une ambassadrice
      body: |
        La Patrouille de France a une **mission de représentation** : elle
        porte les couleurs de la France et de son armée de l'Air et de
        l'Espace dans les meetings, en France et à l'étranger. Cette mission
        exige une **disponibilité**, une **rigueur** et un **engagement**
        particuliers, **en vol comme au sol**.

        Ses pilotes ne sont pas des acrobates professionnels : ce sont des
        **pilotes de chasse et d'instruction** confirmés, détachés pour
        quelques saisons, qui incarnent le **savoir-faire** collectif de leur
        armée.
    - id: la-grande-dame
      title: « La grande dame »
      strate: maitriser
      body: |
        Pour un candidat, la PAF est un **symbole utile** en entretien : elle
        montre que l'excellence aéronautique est aussi une affaire de
        **collectif**, de **confiance** et de **discipline**. On ne vole pas à
        huit, aile dans aile, sans une cohésion totale.

        Évoquer la Patrouille de France, c'est parler de l'**esprit d'équipe**
        et du **rayonnement** de l'institution — bien au-delà de la simple
        performance de voltige.
  pieges:
    - La Patrouille de France est une équipe de présentation — ce n'est pas une unité de combat.
    - Ses pilotes viennent des escadrons de chasse et d'instruction ; ce ne sont pas des acrobates civils.
    - Elle vole sur Alphajet (depuis 1981), pas sur avion de chasse de première ligne.
