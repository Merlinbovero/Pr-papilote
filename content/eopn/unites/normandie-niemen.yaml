  traditions: Héritier du groupe de chasse Normandie-Niémen (France libre, front de l'Est)
content:
  essentiel:
    body: |
      Le **Normandie-Niémen** est sans doute l'**escadron** le plus **chargé
      d'histoire** de l'Armée de l'air et de l'Espace. Un escadron est, dans
      l'armée de l'air, l'**unité** qui met en œuvre les avions — l'équivalent
      de la **flottille** dans la Marine.

      Son histoire commence dans la **France libre** : créé en **1942**, il part
      combattre sur le **front de l'Est**, aux côtés de l'**Armée rouge**, en
      **Union soviétique**. C'est la **seule** unité occidentale à s'être
      battue sur le **sol soviétique** pendant la Seconde Guerre mondiale. Son
      nom associe la **Normandie** (dont il porte les deux léopards d'or) et le
      fleuve **Niémen**, dont le nom lui fut donné en récompense de ses combats.

      Aujourd'hui, l'escadron **2/30 « Normandie-Niémen »** vole sur **Rafale**,
      depuis la **base aérienne 118 de Mont-de-Marsan**. Il perpétue une
      tradition d'exception, entre mémoire et missions modernes.
    aRetenir:
      - Le Normandie-Niémen est un escadron de chasse emblématique de l'Armée de l'air et de l'Espace.
      - Né dans la France libre en 1942, il a combattu sur le front de l'Est aux côtés de l'Armée rouge.
      - Un escadron est l'unité volante de l'armée de l'air — l'équivalent de la flottille dans la Marine.
      - Il vole aujourd'hui sur Rafale, à la base aérienne 118 de Mont-de-Marsan.
  sections:
    - id: une-legende-de-la-france-libre
      title: Une légende de la France libre
      body: |
        Formé en **1942**, le groupe de chasse **« Normandie »** rejoint le
        **front de l'Est** pour combattre l'Allemagne nazie aux côtés des
        **Soviétiques** — un engagement **unique** parmi les forces
        occidentales. Ses pilotes y accomplissent des milliers de **missions**
        et y remportent de nombreuses **victoires** aériennes.

        En récompense, l'unité reçoit le nom du fleuve **Niémen**, théâtre de
        durs combats. Elle compte dans ses rangs plusieurs **Compagnons de la
        Libération** et reçoit de hautes **décorations**, françaises comme
        soviétiques. À la fin de la guerre, ses pilotes rentrent en France aux
        commandes de leurs chasseurs **Yak** — dont un exemplaire est conservé
        au **musée de l'Air et de l'Espace** du Bourget.
    - id: l-escadron-aujourd-hui
      title: L'escadron aujourd'hui
      strate: maitriser
      body: |
        Le Normandie-Niémen a traversé les époques et les appareils. Depuis
        **2011**, il vole sur **Rafale** (B et C), à la **base aérienne 118 de
        Mont-de-Marsan**. Il assure les missions de la chasse moderne : défense
        aérienne, assaut, reconnaissance, participation à la dissuasion.

        Cet héritage illustre une notion importante pour le candidat **EOPN** :
        les **traditions** des unités. Un escadron n'est pas qu'un ensemble
        d'avions et de pilotes — c'est une **histoire vivante**, un **insigne**,
        des **noms** hérités des anciens. Connaître le Normandie-Niémen, c'est
        toucher du doigt la **culture** de l'armée de l'air.
  pieges:
    - Un escadron est l'unité volante de l'armée de l'air — l'équivalent de la flottille dans la Marine ; ne pas mélanger les deux termes.
    - Le Normandie-Niémen a combattu aux côtés de l'Armée rouge sur le front de l'Est — un fait historique unique parmi les forces occidentales.
    - L'escadron vole aujourd'hui sur Rafale — son histoire est ancienne, mais l'unité est bien active et moderne.
