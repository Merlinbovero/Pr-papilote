title: L'air et ses propriétés
slug: air-et-proprietes
summary: >-
  L'air est un fluide pesant, compressible et visqueux. Sa densité — qui dépend
  de la pression, de la température, de l'altitude et de l'humidité — gouverne la
  portance, la traînée et les performances. Une propriété clé du vol.
objectifs:
  - Décrire l'air comme un fluide pesant, compressible et visqueux.
  - Définir la masse volumique de l'air et citer ses facteurs (pression, température, altitude, humidité).
  - Expliquer pourquoi la densité de l'air est déterminante pour le vol.
  - Relier les propriétés de l'air à leurs conséquences concrètes (décollage, chaleur, altitude, portance et traînée).
