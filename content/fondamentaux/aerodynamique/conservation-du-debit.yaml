summary: >-
  Le débit, c'est la quantité d'air qui traverse une section par unité de temps.
  Il se conserve le long d'un écoulement : quand la section se resserre, la
  vitesse augmente (S·V = constante). C'est la loi de continuité, brique de
  l'effet Venturi et de la portance.
objectifs:
  - Définir le débit et distinguer débit volumique (Qv = S·V) et débit massique (Qm = ρ·S·V).
  - Énoncer la loi de continuité — le débit se conserve le long d'un écoulement.
  - En déduire qu'un rétrécissement de section accélère l'air (S₁·V₁ = S₂·V₂).
