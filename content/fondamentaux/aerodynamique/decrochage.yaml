summary: >-
  Le décrochage est la perte brutale de portance qui survient quand l'angle
  d'incidence dépasse l'angle critique — l'écoulement décolle de l'extrados. Il
  dépend de l'incidence, pas de la vitesse ; on en sort en réduisant l'incidence.
objectifs:
  - Définir le décrochage comme la perte de portance survenant au-delà de l'angle d'incidence critique.
  - Expliquer son origine (le décollement de l'écoulement sur l'extrados à forte incidence).
  - Énoncer qu'il dépend de l'angle d'incidence et non de la vitesse, et que la correction consiste à réduire l'incidence.
