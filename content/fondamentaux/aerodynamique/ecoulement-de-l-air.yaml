title: L'écoulement de l'air
slug: ecoulement-de-l-air
summary: >-
  L'air s'écoule autour de l'aile en filets d'air. Le débit se conserve, donc
  l'air accélère dans un rétrécissement ; et là où il accélère, sa pression
  diminue (Venturi). La viscosité crée une fine couche limite.
objectifs:
  - Décrire un écoulement d'air par ses filets d'air et la conservation du débit.
  - Énoncer le lien entre vitesse et pression (quand la vitesse augmente, la pression diminue).
  - Définir la couche limite et expliquer son origine (la viscosité de l'air).
