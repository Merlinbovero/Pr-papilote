summary: >-
  Avant l'aile, il y a eu la bulle — les aérostats volent parce qu'ils sont
  plus légers que l'air (poussée d'Archimède). Montgolfières, ballons à gaz,
  dirigeables : une notion au programme du BIA et un pan d'histoire française.
objectifs:
