summary: >-
  L'allongement mesure l'élancement d'une aile (envergure² / surface). Un grand
  allongement réduit la traînée induite — d'où les longues ailes des planeurs.
  Les winglets, en bout d'aile, gênent les tourbillons marginaux et réduisent
  eux aussi la traînée induite.
