summary: >-
  La couche limite est la fine pellicule d'air ralentie par la viscosité au
  contact de l'aile. Elle est d'abord laminaire, puis turbulente après un point
  de transition. À forte incidence, elle décolle de l'extrados — c'est l'origine
  du décrochage.
