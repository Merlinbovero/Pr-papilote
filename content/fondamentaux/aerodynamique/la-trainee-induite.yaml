summary: >-
  La traînée induite est le prix à payer de la portance. À l'extrémité de
  l'aile, l'air passe de l'intrados en surpression vers l'extrados en
  dépression : il se forme des tourbillons marginaux. Ils inclinent la portance
  vers l'arrière et persistent en turbulence de sillage.
objectifs:
  - Expliquer l'origine de la traînée induite (la formation des tourbillons marginaux).
  - Énoncer sa variation avec la vitesse (forte à basse vitesse, faible à haute vitesse).
  - Relier les tourbillons marginaux à la turbulence de sillage et à ses risques.
