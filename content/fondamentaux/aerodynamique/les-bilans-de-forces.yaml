summary: >-
  En vol stabilisé, les quatre forces s'équilibrent. Ce bilan change selon la
  phase : palier, montée, descente, plané et virage. En virage, la portance doit
  croître, d'où un facteur de charge supérieur à 1 et une vitesse de décrochage
  plus élevée.
objectifs:
  - Établir le bilan des forces en vol en palier, en montée et en descente.
  - Expliquer le virage (portance inclinée) et définir le facteur de charge.
  - Relier le facteur de charge à l'augmentation de la vitesse de décrochage.
