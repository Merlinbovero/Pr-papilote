  - Nommer les éléments d'une soufflerie et le rôle de chacun (collecteur, veine d'essai, diffuseur, ventilateur).
  - Distinguer les souffleries à circuit ouvert (Eiffel) et fermé (Prandtl) et le rôle de la balance aérodynamique.
