summary: >-
  Une soufflerie produit un courant d'air contrôlé pour étudier l'action de
  l'air sur une maquette immobile — c'est la relativité du mouvement. On y
  distingue les souffleries à circuit ouvert (Eiffel) et fermé (Prandtl), et
  l'on y mesure les forces avec une balance aérodynamique.
objectifs:
