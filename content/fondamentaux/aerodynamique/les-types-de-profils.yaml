summary: >-
  Un profil se décrit par son épaisseur relative, sa cambrure et son calage. Ces
  paramètres définissent des familles — biconvexe symétrique ou dissymétrique,
  plan-convexe, creux, autostable, supercritique — chacune adaptée à un usage,
  de la voltige au transport rapide.
objectifs:
  - Définir les paramètres géométriques d'un profil (épaisseur relative, cambrure, calage).
  - Distinguer les grandes familles de profils et leurs caractéristiques.
  - Associer chaque type de profil à un usage typique.
