summary: >-
  Les dispositifs hypersustentateurs augmentent le Cz maximal de l'aile pour
  voler plus lentement au décollage et à l'atterrissage. Les volets (bord de
  fuite) accroissent la cambrure et la surface ; les becs (bord d'attaque)
  retardent le décrochage.
