summary: >-
  Le « mur du son » est la forte hausse de traînée qui accompagne l'approche de
  la vitesse du son, quand des ondes de choc apparaissent. Le nombre de Mach
  compare la vitesse de l'avion à celle du son ; franchir Mach 1, c'est passer
  supersonique.
objectifs:
  - Définir la vitesse du son et expliquer pourquoi elle diminue avec l'altitude (température).
  - Définir le nombre de Mach et les régimes de vol (subsonique, transsonique, supersonique, hypersonique).
  - Expliquer ce qu'est le « mur du son » (traînée d'onde, ondes de choc) et le bang supersonique.
  - Situer le premier vol supersonique (Chuck Yeager, Bell X-1, 1947) et comprendre pourquoi on franchit plus facilement Mach 1 en altitude.
