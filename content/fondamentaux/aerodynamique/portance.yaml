title: La portance
slug: portance
summary: >-
  La portance est la force qui soutient l'avion. Elle naît de l'air dévié vers
  le bas (Newton) et d'une différence de pression extrados-intrados (Bernoulli).
  Elle croît avec le carré de la vitesse, l'incidence, la surface et la densité.
objectifs:
  - Expliquer l'origine de la portance (l'aile dévie l'air et crée une différence de pression), sans le mythe du temps de transit égal.
  - Identifier les facteurs de la portance (vitesse, angle d'incidence, surface, densité de l'air).
  - Énoncer l'influence de chaque facteur (la portance croît avec le carré de la vitesse, l'incidence, la surface et la densité).
