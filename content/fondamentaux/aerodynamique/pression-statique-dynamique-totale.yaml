summary: >-
  Dans un air en mouvement, la pression se décompose en trois grandeurs liées :
  la pression statique (l'air « au repos »), la pression dynamique (le
  mouvement, q = ½·ρ·V²) et la pression totale (leur somme, ps + q). C'est cette
  relation qui, mesurée par le tube de Pitot, donne la vitesse de l'avion.
objectifs:
  - Distinguer pression statique, pression dynamique et pression totale, et énoncer la relation qui les lie.
  - Calculer une pression dynamique avec q = ½·ρ·V² en utilisant ρ ≈ 1,225 kg/m³.
  - Expliquer comment le tube de Pitot exploite pt = ps + q pour mesurer la vitesse.
