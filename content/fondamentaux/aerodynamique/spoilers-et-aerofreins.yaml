content:
  essentiel:
    body: |
      Si les hypersustentateurs servent à **porter plus** à basse vitesse, les
      dispositifs **hyposustentateurs** font l'**inverse** : ils **réduisent la
      portance** ou **augmentent la traînée** pour **descendre** ou **freiner**.

      Le **spoiler** (ou **destructeur de portance**) est une surface qui se
      dresse sur l'**extrados** et **décolle volontairement** l'écoulement :
      la portance chute là où il se déploie. En vol, il aide à **descendre**
      sans accélérer ; au **toucher des roues**, déployé symétriquement, il
      **plaque** l'avion au sol pour rendre le **freinage** efficace. Déployé
      d'un seul côté, il aide au **contrôle en roulis** (comme un aileron).

      L'**aérofrein** est une surface dont le seul rôle est d'**augmenter la
      traînée** pour **ralentir** l'avion, sans chercher à modifier la portance.
      On en trouve sur les planeurs, les avions de chasse et certains
      transports.
    aRetenir:
      - Les dispositifs hyposustentateurs réduisent la portance et/ou augmentent la traînée (l'inverse des hypersustentateurs).
      - Le spoiler (destructeur de portance) dresse une surface sur l'extrados et décolle volontairement l'écoulement.
      - Au toucher des roues, les spoilers plaquent l'avion au sol pour un freinage efficace.
      - Un spoiler déployé d'un seul côté aide au contrôle en roulis.
      - L'aérofrein augmente la traînée pour ralentir, sans viser à modifier la portance.
  sections:
    - id: le-spoiler
      title: Le spoiler (destructeur de portance)
      body: |
        Le **spoiler** est une plaque articulée sur l'**extrados**. En se
        dressant, il **perturbe** l'écoulement et **détruit la portance** de la
        zone concernée — d'où son nom de **destructeur de portance**.

        Ses usages sont multiples :

        - **en descente** : déployé symétriquement, il permet de **descendre
          vite** sans que la vitesse n'augmente trop ;
        - **à l'atterrissage** : au **toucher des roues**, il **plaque** l'avion
          au sol, ce qui reporte le poids sur les roues et rend le **freinage**
          (et le freinage aérodynamique) efficaces ;
        - **en roulis** : déployé d'un **seul côté**, il réduit la portance de
          cette aile et fait **incliner** l'avion — il seconde alors les
          ailerons.
    - id: l-aerofrein
      title: L'aérofrein
      body: |
        L'**aérofrein** est une surface (souvent sur le fuselage ou l'aile) qui,
        déployée, **augmente franchement la traînée** pour **ralentir** l'avion,
        **sans** viser à détruire la portance. C'est un outil de **gestion de la
        vitesse** et de la trajectoire.

        On le rencontre par exemple sur les **planeurs** (contrôler l'approche),
        les **avions de chasse** (décélérer rapidement) et certains **avions de
        transport**.
      strate: maitriser
  pieges:
    - Le spoiler vise à détruire la portance (et accessoirement à traîner) ; l'aérofrein vise à traîner sans forcément détruire la portance.
    - Un spoiler déployé au sol au toucher des roues améliore le freinage en reportant le poids sur les roues.
    - Hypersustentateurs et hyposustentateurs sont opposés — les uns font porter plus, les autres font porter moins ou freinent.
