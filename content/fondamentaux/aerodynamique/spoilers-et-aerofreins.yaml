summary: >-
  À l'inverse des hypersustentateurs, les dispositifs hyposustentateurs réduisent
  la portance et augmentent la traînée. Les spoilers (destructeurs de portance)
  décollent volontairement l'écoulement ; les aérofreins freinent l'avion sans
  modifier la portance.
objectifs:
  - Expliquer le rôle des dispositifs hyposustentateurs (réduire la portance, augmenter la traînée).
  - Distinguer un spoiler (destructeur de portance) d'un aérofrein.
  - Donner les usages typiques (descente, freinage à l'atterrissage, contrôle en roulis).
