summary: >-
  Le long d'un écoulement, la pression totale se conserve : quand l'air
  accélère, sa pression statique diminue (ps + ½·ρ·V² = constante). C'est le
  théorème de Bernoulli, dont l'effet Venturi est l'application directe. Un
  modèle éclairant, mais partiel pour expliquer la portance.
objectifs:
