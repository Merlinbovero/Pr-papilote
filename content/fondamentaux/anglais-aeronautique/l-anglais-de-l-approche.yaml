summary: >-
  Downwind, base, final — le circuit d'aérodrome parle anglais. Les points de
  report, les clairances d'atterrissage, le vent, le touch and go et le
  dégagement de piste : l'anglais du retour au sol.
objectifs:
  - Nommer en anglais les branches du circuit d'aérodrome (downwind, base, final).
  - Comprendre les clairances d'arrivée (report final, cleared to land, touch and go).
  - Restituer l'échange type complet de l'arrivée au dégagement de piste.
