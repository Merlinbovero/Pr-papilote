summary: >-
  L'anglais est évalué dans les trois sélections de pilote — et il pèse lourd.
  Ce que mesurent les épreuves (vocabulaire, grammaire, compréhension), le
  niveau visé, et la méthode pour progresser vite et durablement.
objectifs:
  - Comprendre la place de l'anglais dans les sélections EOPAN, EOPN et ALAT et dans le métier (OACI niveau 4).
  - Identifier ce que mesurent les épreuves (vocabulaire, grammaire, compréhension écrite et orale).
  - Construire un plan d'entraînement quotidien efficace.
