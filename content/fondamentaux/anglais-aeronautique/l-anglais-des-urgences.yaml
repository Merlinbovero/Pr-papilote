content:
  essentiel:
    body: |
      En situation d'urgence, l'anglais doit venir **sans réfléchir**. Le
      message de détresse suit un **format fixe**, à connaître par cœur :

      1. **MAYDAY, MAYDAY, MAYDAY** (ou PAN PAN × 3 pour l'urgence) ;
      2. **station appelée** (*Cognac Tower*) ;
      3. **indicatif** (*F-GABC*) ;
      4. **nature de la détresse** (*engine failure*) ;
      5. **intentions** (*forced landing*) ;
      6. **position, altitude** (*5 miles north of the field, 2,000
         feet*).

      Exemple complet : *« MAYDAY, MAYDAY, MAYDAY, Cognac Tower, F-GABC,
      engine failure, forced landing, 5 miles north of the field, 2,000
      feet. »*

      En parallèle, le **transpondeur** parle aussi : **7700** (détresse),
      **7600** (panne radio), **7500** (intervention illicite) — *squawk
      seven seven zero zero*.
    aRetenir:
      - "Format du MAYDAY — 3 × MAYDAY, station, indicatif, nature, intentions, position/altitude."
      - "Transpondeur — 7700 détresse, 7600 panne radio, 7500 intervention illicite."
      - "Vocabulaire des pannes — engine failure, bird strike, gear problem, smoke in the cockpit."
      - "« Minimum fuel » signale une réserve tendue — « MAYDAY fuel » une détresse carburant."
  sections:
    - id: le-vocabulaire-des-pannes
      title: Le vocabulaire des pannes
      body: |
        Les mots qui décrivent le problème :

        | Anglais | Français |
        | --- | --- |
        | *engine failure* | panne moteur |
        | *engine on fire* | moteur en feu |
        | *smoke in the cockpit* | fumée dans le cockpit |
        | *bird strike* | collision aviaire |
        | *gear problem / gear unsafe* | problème de train |
        | *hydraulic failure* | panne hydraulique |
        | *electrical failure* | panne électrique |
        | *lost / unsure of position* | perdu / position incertaine |
        | *souls on board* | personnes à bord |

        Le contrôleur demandera souvent : *« say souls on board and fuel
        remaining »* — le nombre de personnes et l'autonomie restante (en
        **temps** : *two hours fuel remaining*).
    - id: carburant-et-degrades
      title: Carburant et situations dégradées
      strate: maitriser
      body: |
        Le carburant a sa gradation propre :

        - *« minimum fuel »* — information : la réserve devient tendue,
          tout retard supplémentaire posera problème ; ce n'est **pas**
          une détresse ;
        - *« MAYDAY, MAYDAY, MAYDAY, fuel »* — détresse carburant :
          l'atterrissage ne peut plus attendre.

        Autres formules utiles en situation dégradée : *request priority
        landing* (demande priorité), *request vectors* (demande de caps
        vers le terrain), *unable* (impossible d'exécuter), *request
        immediate landing* — et pour clore l'événement : *cancel MAYDAY*.

        S'entraîner à **dire ces messages à voix haute**, chrono en main,
        est le meilleur exercice : le jour où l'anglais devra sortir seul,
        il sortira comme il a été répété.
  pieges:
    - "MAYDAY et PAN PAN se prononcent trois fois — c'est le format, pas une emphase facultative."
    - "« Minimum fuel » n'est pas une détresse — la détresse carburant se déclare « MAYDAY fuel »."
    - "Les codes transpondeur — 7700 (détresse), 7600 (panne radio), 7500 (intervention illicite) : ne pas les intervertir."
    - L'autonomie restante s'annonce en temps de vol (« two hours fuel remaining »), pas en litres.
