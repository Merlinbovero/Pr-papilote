title: L'anglais des urgences
slug: l-anglais-des-urgences
summary: >-
  MAYDAY, PAN PAN, squawk 7700 — quand tout va mal, l'anglais doit sortir
  seul. Le format complet du message de détresse, les mots des pannes et le
  vocabulaire qui sauve.
objectifs:
  - Construire un message MAYDAY ou PAN PAN complet en anglais (format en 6 éléments).
  - Connaître le vocabulaire des pannes et situations anormales (engine failure, bird strike, fuel).
  - Employer les codes transpondeur d'urgence (7700, 7600, 7500).
