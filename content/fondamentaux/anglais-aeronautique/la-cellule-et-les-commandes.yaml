title: La cellule et les commandes en anglais
slug: la-cellule-et-les-commandes
summary: >-
  Wing, aileron, rudder, flaps, landing gear — l'anatomie de l'avion en
  anglais, des surfaces de vol au train d'atterrissage, avec les pièges
  favoris des QCM (rudder/elevator, flap/slat).
objectifs:
  - Nommer en anglais les éléments de la cellule (fuselage, wing, tail, canopy).
  - Associer chaque commande de vol à sa surface (stick/aileron, pedals/rudder).
  - Déjouer les confusions classiques (rudder vs elevator, flaps vs slats).
