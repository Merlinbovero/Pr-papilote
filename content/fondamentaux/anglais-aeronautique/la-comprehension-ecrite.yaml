title: La compréhension écrite — méthode
slug: la-comprehension-ecrite
summary: >-
  Lire vite, répondre juste — l'épreuve de compréhension écrite se gagne par
  la méthode : lecture en deux passes, repérage des paraphrases, et la chasse
  aux pièges (not stated, mots extrêmes, distracteurs littéraux).
objectifs:
  - Appliquer la lecture en deux passes (skimming global, scanning ciblé).
  - Reconnaître les pièges des questions (paraphrase, not stated, mots extrêmes).
  - Gérer le temps d'une épreuve de compréhension (texte + questions).
