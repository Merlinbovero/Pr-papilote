title: La météo en anglais
slug: la-meteo-en-anglais
summary: >-
  Gusts, overcast, CAVOK — la météo aéronautique parle anglais, du bulletin
  parlé au METAR codé. Le vocabulaire du ciel (nuages, vent, visibilité,
  givrage) et les clés de lecture d'un METAR.
objectifs:
  - Employer le vocabulaire météo anglais (wind, gusts, visibility, fog, icing, thunderstorm).
  - Connaître les quantités de nuages (few, scattered, broken, overcast) et CAVOK.
  - Décoder les éléments essentiels d'un METAR simple.
