summary: >-
  TREE, FIFE, NINer — l'anglais de la radio a sa prononciation, ses clairances
  et ses mots interdits. Les nombres OACI, les clairances essentielles
  (cleared for takeoff, line up and wait, go around) et le collationnement en
  anglais.
objectifs:
  - Prononcer les chiffres et nombres selon la convention OACI (TREE, FOWer, FIFE, NINer).
  - Comprendre les clairances anglaises essentielles (roulage, décollage, atterrissage, remise de gaz).
  - Collationner correctement en anglais (read-back des éléments critiques).
