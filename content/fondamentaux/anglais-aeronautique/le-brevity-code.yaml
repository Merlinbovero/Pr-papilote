summary: >-
  Tally, bogey, feet wet, winchester — en combat, chaque seconde de radio
  compte : le brevity code condense une situation en un mot. Les termes
  publics les plus célèbres, pour comprendre récits d'opérations et films
  sans sous-titres.
objectifs:
  - Comprendre le principe du brevity code (un mot = une situation tactique).
  - Connaître les termes publics les plus répandus (bogey/bandit, tally/visual, feet wet/dry).
  - Relier ce vocabulaire à la culture aéronautique militaire (récits, documentaires).
