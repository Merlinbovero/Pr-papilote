content:
  essentiel:
    body: |
      En combat aérien, une phrase entière coûte trop cher : le **brevity
      code** remplace des situations complètes par **un mot convenu**. Les
      termes publics les plus célèbres :

      | Terme | Sens |
      | --- | --- |
      | **bogey** | contact radar non identifié |
      | **bandit** | appareil identifié **hostile** |
      | **tally** | ennemi en vue |
      | **visual** | équipier (ami) en vue |
      | **blind** | équipier perdu de vue |
      | **no joy** | ennemi non repéré |
      | **feet wet / feet dry** | passage au-dessus de l'eau / de la terre |
      | **winchester** | plus de munitions |
      | **bingo** | carburant au seuil du retour |
      | **splash** | cible détruite |

      La paire structurante : **bogey** (inconnu) n'est pas **bandit**
      (hostile confirmé) — et **tally** (je vois l'ennemi) n'est pas
      **visual** (je vois mon équipier). Deux confusions qui, en vrai,
      coûtent des vies — et en QCM, des points.
    aRetenir:
      - "Bogey = contact non identifié ; bandit = hostile confirmé — l'identification change tout."
      - "Tally = ennemi en vue ; visual = AMI en vue ; blind = équipier perdu de vue ; no joy = ennemi non trouvé."
      - "Feet wet/dry = passage mer/terre ; winchester = plus de munitions ; bingo = carburant du retour."
      - Le brevity code répond au même besoin que la phraséologie civile — dire beaucoup en peu de mots, sans ambiguïté.
  sections:
    - id: pourquoi-un-code
      title: Pourquoi un code de brièveté ?
      body: |
        Une interception se joue en secondes, sur des fréquences saturées
        où parlent plusieurs patrouilles. Dire *« I can see an unknown
        aircraft ahead of me »* prend trois secondes de trop — **tally**
        (ou **contact**, au radar) dit la même chose en une syllabe,
        **sans ambiguïté possible**.

        C'est la même logique que la phraséologie civile (« wilco »,
        « unable ») poussée à l'extrême du combat. Les codes sont
        **normalisés à l'OTAN** pour que patrouilles françaises,
        britanniques et américaines se comprennent instantanément en
        exercice comme en opération — l'interopérabilité passe par le
        vocabulaire.
    - id: culture-et-limites
      title: Culture — et limites de la fiche
      strate: maitriser
      body: |
        Ces termes publics irriguent les récits d'opérations, les
        documentaires et le cinéma (« *Splash one!* ») — les connaître,
        c'est comprendre ce que raconte un pilote quand il débriefe une
        mission devant une caméra, et suivre les publications défense
        anglophones.

        Deux limites honnêtes : le brevity code complet compte des
        **centaines** de termes, dont l'emploi précis s'apprend en
        **unité**, pas dans les livres ; et certains usages restent
        naturellement **non publics**. Cette fiche s'en tient aux termes
        largement documentés en source ouverte — l'objectif est la
        **culture**, pas la procédure : aucun jury n'attend d'un candidat
        qu'il « parle brevity », mais comprendre *bingo*, *tally* ou
        *feet wet* dans un récit situe immédiatement le candidat parmi
        ceux qui vivent déjà dans cet univers.
  pieges:
    - "Bogey (non identifié) ≠ bandit (hostile confirmé) — la confusion la plus grave du combat aérien."
    - "Tally concerne l'ENNEMI, visual concerne l'AMI — les intervertir inverse la situation tactique."
    - "No joy = « je ne vois pas l'ennemi » — pas une expression de tristesse."
    - Le brevity code s'apprend réellement en unité — cette fiche donne la culture, pas la procédure.
