content:
  essentiel:
    body: |
      La propulsion en deux colonnes :

      | Français | Anglais |
      | --- | --- |
      | moteur à pistons | **piston engine** |
      | turbopropulseur | **turboprop** |
      | réacteur | **jet engine** |
      | hélice | **propeller** (fam. *prop*) |
      | poussée | **thrust** |
      | puissance | **power** |
      | manette des gaz | **throttle** |
      | post-combustion | **afterburner** |
      | démarrage | **start-up** |
      | panne moteur | **engine failure** |

      Et le **carburant** : *fuel* (carburant), *to refuel* (ravitailler),
      *fuel tank* (réservoir), *fuel flow* (débit), *endurance* (autonomie),
      *drop tank* (réservoir largable), *air-to-air refuelling* ou l'américain
      *aerial refueling* (ravitaillement en vol).

      Distinction utile : un moteur à hélice délivre de la **power**
      (puissance, en ch/kW) ; un réacteur délivre du **thrust** (poussée, en
      kN ou livres) — les QCM jouent sur les deux.
    aRetenir:
      - "Trois motorisations — piston engine, turboprop, jet engine ; l'hélice se dit propeller."
      - "Thrust = poussée (réacteurs) ; power = puissance (moteurs à hélice)."
      - "Carburant — fuel, to refuel, fuel flow, endurance ; le ravitaillement en vol = air-to-air refuelling."
      - "Afterburner = post-combustion — le surcroît de poussée des avions de combat."
  sections:
    - id: du-piston-au-reacteur
      title: Du piston au réacteur
      body: |
        Les phrases types que les textes de QCM affectionnent :

        - *the engine drives the propeller* — le moteur entraîne l'hélice ;
        - *the pilot advances the throttle* — le pilote pousse la manette ;
        - *the jet produces 75 kN of thrust* — le réacteur délivre 75 kN
          de poussée ;
        - *engine start-up / engine shutdown* — mise en route / coupure ;
        - *the engine flamed out* — le réacteur s'est éteint (*flameout* =
          extinction réacteur) ;
        - *to windmill* — tourner en moulinet (hélice ou réacteur éteint).

        Le PC-21 des écoles françaises est un **turboprop** ; le Rafale un
        **twin-engine jet** (biréacteur) ; le Caïman un **twin-turbine
        helicopter** — décrire les appareils du site en anglais est un
        excellent exercice.
    - id: le-carburant-en-situation
      title: Le carburant en situation
      strate: maitriser
      body: |
        Le carburant parle à la radio comme dans les manuels :

        - *fuel remaining : two hours* — autonomie restante (toujours en
          **temps**) ;
        - *fuel leak* — fuite de carburant ; *fuel starvation* — panne
          d'alimentation ; *to run out of fuel* — tomber en panne sèche ;
        - *tanker* — l'avion ravitailleur ; *boom* et *probe-and-drogue* —
          les deux systèmes de ravitaillement en vol (perche rigide
          américaine / panier souple, utilisé par les Rafale) ;
        - *bingo fuel* — dans l'aviation militaire, le seuil de carburant
          imposant le retour (un mot d'argot opérationnel passé dans
          l'usage).

        La chaîne carburant-autonomie-ravitaillement structure la moitié
        des récits d'opérations aériennes en anglais — la maîtriser, c'est
        comprendre les textes des épreuves de compréhension.
  pieges:
    - "Thrust (poussée, réacteur) et power (puissance, hélice) ne sont pas interchangeables."
    - "Propeller = hélice ; ne pas le confondre avec propulsion ni avec rotor (hélicoptère)."
    - "L'autonomie carburant s'exprime en temps (fuel remaining : two hours), jamais en litres à la radio."
    - "Flameout = extinction réacteur en vol — un mot précis que les QCM aiment tester."
