title: Le moteur et le carburant en anglais
slug: le-moteur-et-le-carburant
summary: >-
  Thrust, throttle, propeller, afterburner — l'anglais de la propulsion, du
  moteur à pistons au réacteur, et le vocabulaire du carburant (refuel, fuel
  flow, endurance) indispensable aux QCM comme à la radio.
objectifs:
  - Nommer en anglais les types de moteurs (piston engine, turboprop, jet engine) et leurs éléments.
  - Employer le vocabulaire du carburant (fuel, refuel, fuel flow, endurance).
  - Distinguer thrust (poussée) et power (puissance) selon la motorisation.
