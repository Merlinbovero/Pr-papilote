summary: >-
  Actually ne veut pas dire actuellement, a journey n'est pas une journée et
  to control n'est pas toujours contrôler — le bêtisier des faux amis, garni
  de ceux propres à l'aviation, avec les prépositions de mouvement en bonus.
objectifs:
  - Déjouer les faux amis généraux les plus testés (actually, journey, to assist, library).
  - Maîtriser les faux amis propres à l'aéronautique (elevator, cabin, to arrest).
  - Employer les prépositions de mouvement (to, into, over, above, through, on board).
