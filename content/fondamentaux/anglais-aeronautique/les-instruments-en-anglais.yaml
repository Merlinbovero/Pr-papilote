content:
  essentiel:
    body: |
      Les **six instruments de base**, dans les deux langues :

      | Français | Anglais |
      | --- | --- |
      | anémomètre (badin) | **airspeed indicator (ASI)** |
      | altimètre | **altimeter** |
      | horizon artificiel | **attitude indicator (AI)** |
      | conservateur de cap | **heading indicator** |
      | variomètre | **vertical speed indicator (VSI)** |
      | indicateur de virage | **turn coordinator** |

      L'avionique moderne ajoute : **HUD** (*head-up display*,
      visualisation tête haute), **MFD** (*multi-function display*),
      **autopilot** (pilote automatique), **transponder**, **GPS/INS**
      (navigation par satellite/inertielle).

      Et les **alarmes** : *stall warning* (alarme de décrochage), *master
      caution* (alarme générale ambre), *master warning* (alarme rouge),
      *gear warning* (alarme train) — les mots qui réclament une réaction
      immédiate.
    aRetenir:
      - "Les six instruments — airspeed indicator, altimeter, attitude indicator, heading indicator, VSI, turn coordinator."
      - "Attitude indicator = horizon artificiel — « attitude » signifie assiette, pas humeur."
      - "HUD = head-up display (tête haute) ; MFD = multi-function display."
      - "Stall warning = alarme de décrochage ; master caution/warning = alarmes générales ambre/rouge."
  sections:
    - id: lire-le-tableau-de-bord
      title: Lire le tableau de bord en anglais
      body: |
        Les phrases types des manuels et des tests :

        - *the airspeed indicator reads 120 knots* — le badin indique
          120 kt ;
        - *set the altimeter to 1013* — calez l'altimètre à 1013 ;
        - *check your attitude on the AI* — vérifiez l'assiette à
          l'horizon ;
        - *the VSI shows a 500 feet per minute descent* — le variomètre
          indique 500 ft/min de descente ;
        - *engage / disengage the autopilot* — enclencher/déconnecter le
          pilote automatique.

        Le verbe **to read** (indiquer, pour un instrument) et le verbe
        **to set** (caler, régler) sont les deux verbes du tableau de
        bord — les retenir résout la moitié des questions.
    - id: le-cockpit-moderne
      title: Le cockpit moderne et ses alarmes
      strate: maitriser
      body: |
        Le cockpit tout écran (*glass cockpit*) a son vocabulaire :
        *display* (écran), *symbology* (symbologie), *HOTAS* (*hands on
        throttle and stick* — mains sur manette et manche), *touchscreen*
        (écran tactile) — l'environnement du PC-21 comme du Rafale.

        Les alarmes se hiérarchisent : *advisory* (information),
        *caution* (ambre — attention requise), *warning* (rouge — action
        immédiate). D'où les boutons *master caution* et *master warning*
        au sommet du tableau de bord. S'ajoutent les alarmes vocales :
        *« pull up »* (ressource !), *« stall »*, *« gear »* — l'avion
        parle anglais, même dans les armées francophones.
  pieges:
    - "Attitude indicator = horizon artificiel : attitude signifie assiette — pas l'état d'esprit du pilote."
    - "To read = indiquer (pour un instrument) ; to set = caler/régler — les deux verbes du tableau de bord."
    - "Caution (ambre, attention) et warning (rouge, action immédiate) ne sont pas synonymes."
    - "HUD = head-up display — la visualisation tête haute, pas un casque."
