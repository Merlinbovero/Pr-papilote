content:
  essentiel:
    body: |
      L'aviation est un monde de règles — et les règles anglaises passent
      par les **modaux** :

      | Modal | Sens | Exemple |
      | --- | --- | --- |
      | **must** | obligation forte | *you must comply with ATC instructions* |
      | **must not** | **interdiction** | *you must not enter the runway* |
      | **have to** | obligation (externe) | *pilots have to hold a valid licence* |
      | **don't have to** | **absence d'obligation** | *you don't have to report downwind* (si non demandé) |
      | **should** | conseil, recommandation | *you should check the weather* |
      | **may** | permission, éventualité | *icing may occur* |
      | **can** | capacité | *the PC-21 can simulate a radar* |

      Le piège central : **must not** (interdit) n'est **pas** la négation
      logique de must — c'est **don't have to** qui exprime « pas
      obligé ». Les QCM exploitent cette dissymétrie sans relâche.
    aRetenir:
      - "Must = obligation ; must not = INTERDICTION ; don't have to = pas obligé — la dissymétrie clé."
      - "Should = conseil (moins fort que must) ; may = permission ou éventualité ; can = capacité."
      - "Dans les textes réglementaires, shall = obligation (l'équivalent juridique de must)."
      - Un modal est suivi de la base verbale sans to — must comply, jamais must to comply.
  sections:
    - id: la-dissymetrie-must-have-to
      title: La dissymétrie must / have to
      body: |
        À l'affirmatif, *must* et *have to* se recouvrent largement
        (l'obligation). À la **négation**, tout diverge :

        - *You **must not** cross the runway.* — **interdiction** : ne
          traversez pas ;
        - *You **don't have to** call the tower here.* — **pas
          d'obligation** : l'appel n'est pas requis (aérodrome non
          contrôlé, par exemple).

        Confondre les deux inverse le sens de la phrase — c'est pourquoi
        cette paire est le distracteur favori des épreuves. Moyen
        mnémotechnique : *must not* = **mur** — infranchissable ;
        *don't have to* = **option**.
    - id: shall-may-et-les-textes
      title: Shall, may et la langue des textes
      strate: maitriser
      body: |
        Les textes réglementaires (OACI, manuels de vol) ont leur propre
        code :

        - **shall** — l'obligation juridique : *« the pilot shall maintain
          a listening watch »* — dans un règlement, shall = must ;
        - **should** — la recommandation (non contraignante) ;
        - **may** — la faculté : *« the aircraft may be equipped with… »*

        Cette hiérarchie shall/should/may structure toute la documentation
        aéronautique internationale — la reconnaître permet de lire un
        texte OACI en sachant ce qui est **imposé**, **conseillé** ou
        **permis**. Dernier rappel de forme : un modal se construit sans
        *to* ni *-s* — *he must comply* (jamais *musts* ni *must to*).
  pieges:
    - "Must not = interdiction ; don't have to = absence d'obligation — les confondre inverse le sens."
    - "Modal + base verbale sans to — « must to comply » et « should to check » sont les distracteurs types."
    - "Dans un règlement, shall = obligation — pas un simple futur."
    - "May exprime la permission OU l'éventualité (« icing may occur ») — le contexte décide."
