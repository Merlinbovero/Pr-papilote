type: concept
title: Les modaux — obligation, permission, conseil
slug: les-modaux
summary: >-
  Must, have to, should, may, can — les modaux portent le sens réglementaire
  de l'anglais aéronautique : l'obligation, l'interdiction, la permission et
  le conseil, du manuel de vol aux QCM.
objectifs:
  - Distinguer must (obligation forte), should (conseil) et may (permission/éventualité).
  - Employer les négations correctement (must not = interdiction ; don't have to = absence d'obligation).
  - Reconnaître shall dans les textes réglementaires.
