summary: >-
  Took off, has landed, was climbing when — les QCM d'anglais vivent des
  temps. Le prétérit du récit, le present perfect du bilan, le past
  continuous de l'action interrompue, et les irréguliers du vol.
objectifs:
  - Choisir entre prétérit (récit daté) et present perfect (bilan sans date).
  - Employer le past continuous pour l'action en cours interrompue.
  - Mémoriser les verbes irréguliers du vol (take/took, fly/flew, rise/rose).
