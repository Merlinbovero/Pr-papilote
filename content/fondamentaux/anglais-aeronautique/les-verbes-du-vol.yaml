summary: >-
  Take off, climb, level off, descend, land, go around — la colonne
  vertébrale de l'anglais aéronautique, ce sont ses verbes. Le vol complet en
  verbes, du roulage à l'arrêt moteur, avec leurs pièges (faux amis,
  particules).
objectifs:
  - Restituer les verbes de chaque phase du vol (taxi, take off, climb, cruise, descend, land).
  - Employer les particules correctement (take off, level off, touch down, go around).
  - Déjouer les faux amis et confusions classiques des QCM.
