summary: >-
  L'échelle d'une carte est le rapport entre une distance sur la carte et la
  distance réelle. Au 1/500 000 (carte OACI/VFR), 1 cm vaut 5 km. On mesure une
  distance en la reportant sur l'échelle graphique (km ou milles marins).
objectifs:
  - Définir l'échelle d'une carte (rapport distance carte / distance réelle) et l'interpréter (1/500 000 donne 1 cm pour 5 km).
  - Mesurer une distance sur une carte à l'aide de l'échelle graphique (kilomètres, milles marins).
  - Distinguer grande et petite échelle et situer la carte OACI/VFR au 1/500 000.
