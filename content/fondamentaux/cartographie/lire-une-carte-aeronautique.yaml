summary: >-
  La carte OACI au 1/500 000 est l'outil du vol à vue — projection conforme,
  relief et altitudes, espaces aériens, obstacles : savoir la lire, c'est déjà
  préparer sa navigation.
objectifs:
  - Connaître la carte OACI 1/500 000 et sa règle de conversion (1 cm = 5 km).
  - Lire le relief (courbes de niveau, teintes, altitudes) et les obstacles.
  - Repérer les informations de navigation (espaces, zones, déclinaison, aérodromes).
