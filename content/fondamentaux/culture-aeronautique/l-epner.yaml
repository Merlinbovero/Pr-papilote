title: L'EPNER — l'école des pilotes d'essais
slug: l-epner
summary: >-
  À Istres, au sein de DGA Essais en vol, l'EPNER forme depuis 1946 les
  équipages d'essais français et étrangers — l'une des rares écoles de pilotes
  d'essais au monde, et un horizon de carrière que tout candidat pilote
  devrait connaître.
