summary: >-
  De Spoutnik à la Station spatiale internationale, d'Ariane à Thomas
  Pesquet — les jalons spatiaux au programme du BIA, et la place singulière
  de la France, troisième puissance à avoir lancé son propre satellite.
objectifs:
  - Situer les jalons majeurs (Spoutnik 1957, Gagarine 1961, Apollo 11 1969, Ariane 1979, ISS).
  - Connaître la place de la France (3e puissance spatiale en 1965, CNES, Kourou) et de l'Europe (ESA, Ariane).
  - Comprendre pourquoi l'espace concerne aussi les armées (satellites, Espace dans l'AAE).
