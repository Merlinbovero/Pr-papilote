title: Les pionniers et l'Aéropostale
slug: les-pionniers-et-l-aeropostale
summary: >-
  Blériot au-dessus de la Manche, Mermoz sur l'Atlantique Sud, Guillaumet
  dans les Andes, Saint-Exupéry au clair de lune — les figures que tout jury
  attend, et l'épopée de la Ligne qui a inventé l'esprit d'équipage.
objectifs:
  - Situer les grandes premières (Blériot 1909, Lindbergh 1927, Mermoz 1930).
  - Raconter l'épopée de l'Aéropostale et ses figures (Mermoz, Guillaumet, Saint-Exupéry).
  - Relier ces récits aux valeurs attendues d'un candidat pilote (courage, méthode, esprit d'équipage).
