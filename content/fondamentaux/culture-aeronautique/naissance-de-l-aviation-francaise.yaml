summary: >-
  De l'Éole de Clément Ader aux nationalisations de 1936 — un demi-siècle qui
  fait de la France une grande nation aéronautique, forge les noms que l'on
  croise encore (Blériot, Breguet, Dassault) et explique le drame de 1940.
objectifs:
  - Situer les jalons fondateurs (Ader 1890, pionniers-industriels, essor de 14-18).
  - Comprendre le creux de l'entre-deux-guerres et les nationalisations de 1936.
  - Relier les noms des pionniers aux traditions et à l'industrie d'aujourd'hui.
