id: fondamentaux.facteurs-humains.culture-de-securite-et-rex
type: concept
title: La culture de sécurité et le retour d'expérience (REX)
slug: culture-de-securite-et-rex
summary: >-
  L'aviation est devenue sûre en apprenant méthodiquement de ses accidents. En
  France, le BEA mène des enquêtes de sécurité — pour comprendre et prévenir, pas
  pour punir. C'est le retour d'expérience (REX) et la « culture juste » : on
  cherche les causes, jamais un coupable, et on ne spécule pas.
objectifs:
  - Expliquer pourquoi l'aviation apprend de ses accidents (retour d'expérience) plutôt que de les oublier.
  - Distinguer l'enquête de sécurité (BEA, comprendre et prévenir) de l'enquête judiciaire (établir des responsabilités).
  - Comprendre la « culture juste » et la règle de prudence — on cherche des causes, pas un coupable, et on ne spécule pas tant que l'enquête n'a pas conclu.
