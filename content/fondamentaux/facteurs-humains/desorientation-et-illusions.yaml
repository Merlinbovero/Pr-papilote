summary: >-
  Sans références visuelles, le corps perçoit mal l'attitude de l'avion : c'est la
  désorientation spatiale, due à une oreille interne trompeuse. Des illusions
  (accélération, spirale, leans) contredisent la réalité. La parade : croire les instruments, pas ses sensations.
objectifs:
  - Définir la désorientation spatiale et expliquer le rôle trompeur de l'oreille interne sans références visuelles.
  - Décrire des illusions sensorielles classiques (accélération, spirale, leans, illusions visuelles).
  - Énoncer la parade — faire confiance aux instruments plutôt qu'à ses sensations.
