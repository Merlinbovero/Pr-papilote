content:
  essentiel:
    body: |
      Sans **références visuelles extérieures** — de nuit, dans les nuages —, le
      corps humain n'est **pas fiable** pour percevoir l'attitude de l'avion.
      C'est la **désorientation spatiale**.

      En cause : notre **oreille interne** (le système **vestibulaire**), qui
      renseigne le cerveau sur les accélérations et l'équilibre. Elle est faite
      pour la marche, pas pour le vol : lors de virages prolongés ou
      d'accélérations, elle envoie des informations **trompeuses**. Le pilote
      « sent » une attitude qui n'est **pas** la vraie.

      Ces **illusions sensorielles** sont responsables de nombreux accidents. La
      seule parade est de **faire confiance aux instruments** — l'horizon
      artificiel en tête — **et non à ses sensations**.
    aRetenir:
      - Sans références visuelles extérieures, le corps perçoit mal l'attitude de l'avion — c'est la désorientation spatiale.
      - L'oreille interne (système vestibulaire) envoie des informations trompeuses en vol (virages, accélérations).
      - Les illusions sensorielles provoquent de nombreux accidents, même chez les pilotes expérimentés.
      - La parade est de croire les instruments (horizon artificiel), pas ses sensations.
  sections:
    - id: pourquoi-on-se-desoriente
      title: Pourquoi on se désoriente
      body: |
        Au sol, notre équilibre s'appuie sur trois sources : la **vue**,
        l'**oreille interne** et les **sensations du corps** (muscles, appuis).
        Tant qu'on **voit** l'horizon, tout concorde.

        Mais en vol **sans visibilité**, la vue ne joue plus. Restent l'oreille
        interne et les sensations — or elles se **trompent**. Le système
        **vestibulaire** (des **canaux** sensibles aux rotations et des capteurs
        sensibles à la **gravité** et aux **accélérations**) confond facilement
        une accélération avec une inclinaison, ou « oublie » un virage lent et
        régulier.

        Le cerveau, privé de la vue, **croit** ces fausses informations et se
        construit une image **erronée** de l'attitude de l'avion.
    - id: les-illusions-classiques
      title: Les illusions classiques
      body: |
        Quelques illusions reviennent souvent.

        - **L'illusion d'accélération** : au décollage, une forte accélération
          est ressentie comme un **cabré** (nez qui monte). Le réflexe — piquer —
          est **dangereux** près du sol.
        - **La « spirale »** : après un virage **prolongé**, l'oreille interne
          « oublie » la rotation. En redressant, le pilote a l'impression de
          **tourner dans l'autre sens** et tend à **réengager** le virage —
          l'avion descend alors en spirale.
        - **Les « leans »** : une sensation d'**inclinaison** persistante, alors
          que l'avion est à plat.
        - **Des illusions visuelles** existent aussi à l'atterrissage (piste en
          pente, de nuit, par mauvaise visibilité), faussant l'appréciation de la
          hauteur.

        Toutes ont un point commun : les **sensations** contredisent la
        **réalité**.
      figures:
        - schemaId: illusion-acceleration
          alt: Un avion qui accélère à plat sur la piste, tandis que le pilote ressent à tort une assiette cabrée, nez qui monte.
          caption: À l'accélération, le pilote ressent un cabré alors que l'avion est à plat — pousser sur le manche serait dangereux.
          width: 460
          height: 240
    - id: la-parade-croire-les-instruments
      title: La parade — croire les instruments
      strate: maitriser
      body: |
        Face à des sensations trompeuses, il n'existe qu'une **règle**, simple à
        énoncer mais difficile à appliquer : **faire confiance aux instruments**,
        pas à son ressenti.

        L'**horizon artificiel**, le badin, l'altimètre et le variomètre donnent
        l'attitude et la trajectoire **réelles**. En vol sans visibilité, on les
        **lit** et on leur **obéit**, même quand le corps « crie » le contraire.
        C'est tout l'objet du vol aux **instruments (IFR)** et de l'entraînement
        associé.

        Le piège est que l'illusion peut être si **puissante** qu'un pilote, même
        **conscient** du risque, en vient à croire ses sensations plutôt que ses
        instruments. D'où l'importance d'un **entraînement** régulier et d'une
        **discipline** stricte du regard sur les instruments.
      figures:
        - schemaId: croire-instruments
          alt: Des sensations trompeuses figurées par un point d'interrogation opposées à un horizon artificiel qui indique la vérité.
          caption: En cas de doute, l'instrument dit la vérité — on croit l'horizon artificiel, pas ses sensations.
          width: 460
          height: 240
  pieges:
    - La désorientation ne touche pas que les débutants — même un pilote expérimenté peut succomber à une illusion.
    - Une accélération est ressentie comme un cabré — c'est une illusion, il ne faut pas piquer par réflexe.
    - En vol sans visibilité, on obéit aux instruments et non à ses sensations, même si elles semblent évidentes.
