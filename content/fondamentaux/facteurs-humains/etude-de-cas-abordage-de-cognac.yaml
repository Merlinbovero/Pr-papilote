summary: >-
  Deux Rafale s'abordent en meeting devant le public — pilotes indemnes,
  avions gravement endommagés. Le rapport BEA-É A-2022-12-A décortique une
  chaîne exemplaire de facteurs humains : migration des pratiques, sentiment
  de simplicité, effet public, conscience de situation erronée.
objectifs:
  - Restituer les faits de l'abordage du 22 mai 2022 à Cognac (rapport BEA-É A-2022-12-A).
  - Identifier dans un cas réel les grands facteurs humains et organisationnels.
  - En tirer des enseignements transposables (préparation, communication, portes de sortie).
