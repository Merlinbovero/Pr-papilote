id: fondamentaux.facteurs-humains.hypoxie-et-altitude
type: concept
title: L'hypoxie et l'altitude
slug: hypoxie-et-altitude
summary: >-
  En altitude, la pression baisse : la proportion d'oxygène reste 21 % mais sa
  pression partielle diminue, d'où l'hypoxie. Insidieuse, elle altère le jugement
  et donne une fausse euphorie. Le temps utile de conscience chute ; on se protège par l'oxygène et la pressurisation.
objectifs:
  - Expliquer pourquoi l'altitude réduit l'oxygène disponible (baisse de la pression partielle d'oxygène).
  - Décrire l'hypoxie et son caractère insidieux (jugement altéré, euphorie trompeuse).
  - Énoncer les protections (temps utile de conscience, oxygène de complément, pressurisation).
