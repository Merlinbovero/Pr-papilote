title: L'aptitude médicale du personnel navigant
slug: l-aptitude-medicale-du-navigant
summary: >-
  Avant tout vol militaire, il y a une visite — l'expertise médicale en
  CEMPN. Où elle se passe, ce qu'on y examine, ce que signifie le profil
  SIGYCOP, et comment aborder sereinement l'étape la plus redoutée des
  candidats des trois concours.
objectifs:
  - Savoir où se passe l'expertise initiale (CPEMPN de Percy pour EOPN/ALAT, CEMPN de Toulon pour EOPAN).
  - Connaître le contenu type de la visite (examens, trois consultations spécialisées).
  - Comprendre le principe du profil médical SIGYCOP et qui décide de l'aptitude.
