summary: >-
  La chaîne Pitot-statique alimente les instruments : le tube de Pitot capte la
  pression totale (face au vent), la prise statique la pression statique ; leur
  différence est la pression dynamique (vitesse). Altimètre et variomètre utilisent la statique, l'anémomètre les deux.
objectifs:
  - Distinguer la pression totale (tube de Pitot) et la pression statique (prise statique) et définir la pression dynamique.
  - Indiquer quels instruments utilisent la pression statique et lequel utilise aussi la pression totale.
  - Expliquer les risques d'obstruction (givrage) et le rôle du réchauffage Pitot.
