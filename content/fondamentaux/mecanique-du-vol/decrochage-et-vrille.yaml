summary: >-
  La vrille est un décrochage asymétrique auto-entretenu — une aile décroche plus
  que l'autre et l'avion part en autorotation, descendant en tire-bouchon nez bas.
  On en sort en arrêtant la rotation (palonnier opposé) puis en réduisant l'incidence.
objectifs:
  - Définir la vrille comme un décrochage asymétrique auto-entretenu (autorotation).
  - Expliquer l'entrée en vrille (une aile décroche avant l'autre en vol dissymétrique à basse vitesse).
  - Énoncer le principe de sortie (arrêter la rotation au palonnier opposé, puis réduire l'incidence) et le rôle de la prévention.
