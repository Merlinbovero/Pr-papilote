title: L'équilibre et le centrage
slug: equilibre-et-centrage
summary: >-
  Un avion est en équilibre longitudinal quand les moments autour de son centre
  de gravité s'annulent — la portance de l'aile étant compensée par la déportance
  de l'empennage. Le centrage doit rester entre une limite avant et une arrière.
objectifs:
  - Définir le centre de gravité comme le point autour duquel l'avion pivote et où s'applique le poids.
  - Expliquer l'équilibre longitudinal (la portance de l'aile crée un moment piqueur compensé par la déportance de l'empennage).
  - Définir le centrage et énoncer les effets d'un centrage trop avant ou trop arrière.
