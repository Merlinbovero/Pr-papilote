summary: >-
  Piston, turbopropulseur, turboréacteur — trois façons de produire la force
  qui fait avancer un aéronef. Comprendre qui fait quoi, à quel régime et à
  quelle vitesse, c'est décoder tout le parc aérien, du Cap 10 au Rafale.
objectifs:
  - Distinguer les trois grandes familles de propulsion (piston, turbopropulseur, turboréacteur).
  - Expliquer le principe commun — accélérer de l'air vers l'arrière pour créer une force vers l'avant.
  - Associer chaque famille à son domaine d'emploi et à des appareils connus.
