summary: >-
  Un rotor est une aile qui tourne — et tout découle de là : pas collectif
  pour monter, pas cyclique pour se déplacer, rotor de queue pour contrer le
  couple. Le socle pour comprendre Gazelle, Tigre, Caïman et le métier ALAT.
objectifs:
  - Expliquer comment un rotor crée la portance (pales = ailes tournantes).
  - Distinguer les commandes (collectif, cyclique, palonniers) et leurs effets.
  - Comprendre le rôle du rotor anticouple et la notion d'autorotation.
