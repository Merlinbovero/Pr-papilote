summary: >-
  Un avion tourne en s'inclinant : la portance penche et fournit une composante
  horizontale qui fait tourner. Pour tenir l'altitude, la portance doit
  augmenter, d'où un facteur de charge supérieur à 1 (2 g à 60° d'inclinaison).
objectifs:
