summary: >-
  L'atmosphère standard (ISA) est le modèle de référence de l'aéronautique —
  15 °C, 1013,25 hPa et 1,225 kg/m³ au niveau moyen de la mer, puis −2 °C par
  1000 ft. Elle sert à comparer, calibrer et standardiser.
objectifs:
  - Énoncer les conditions ISA au niveau moyen de la mer (15 °C, 1013,25 hPa, 1,225 kg/m³).
  - Décrire la variation de la température avec l'altitude (−2 °C par 1000 ft jusqu'à la tropopause).
  - Calculer la température ISA à une altitude donnée.
  - Expliquer pourquoi l'ISA sert de référence (comparer, calibrer, standardiser).
