title: Le vent
slug: le-vent
summary: >-
  Le vent est le déplacement horizontal de l'air, des hautes vers les basses
  pressions. On le décrit par sa direction (d'où il vient, en degrés) et sa
  vitesse (en nœuds). Il déplace la masse d'air — vitesse propre et vitesse sol diffèrent.
objectifs:
  - Définir le vent (déplacement horizontal de l'air dû aux différences de pression) et le décrire par sa direction et sa vitesse.
  - Expliquer la convention de direction (le vent est nommé d'où il vient) et son unité (le nœud).
  - Distinguer vitesse propre et vitesse sol, et expliquer les effets d'un vent de face, arrière et de travers.
