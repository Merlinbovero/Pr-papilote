title: Masses d'air et fronts
slug: masses-d-air-et-fronts
summary: >-
  La météo des latitudes tempérées est un combat de masses d'air — quand l'air
  chaud et l'air froid se rencontrent, un front naît. Savoir lire fronts
  chauds, fronts froids et occlusions, c'est prévoir le temps qui vient.
objectifs:
  - Définir une masse d'air et ses caractéristiques (température, humidité, origine).
  - Distinguer front chaud et front froid (pente, nuages, phénomènes associés).
  - Décrire le cycle d'une perturbation (naissance, occlusion, traîne).
