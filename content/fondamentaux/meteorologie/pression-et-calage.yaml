summary: >-
  L'altimètre mesure une pression et la traduit en altitude selon l'ISA ; il faut
  lui donner un calage. Le QNH donne l'altitude (mer), le QFE la hauteur
  (aérodrome), le calage standard 1013 hPa les niveaux de vol. 1 hPa vaut ~28 ft.
objectifs:
  - Expliquer que l'altimètre mesure une pression convertie en altitude et qu'il nécessite un calage.
  - Distinguer les calages QNH (altitude/mer), QFE (hauteur/aérodrome) et standard 1013 hPa (niveaux de vol).
  - Énoncer la règle de sécurité « du fort vers le faible, attention danger » et l'ordre de grandeur 1 hPa vaut environ 28 ft.
