summary: >-
  Le cap est la direction du nez de l'avion (en degrés depuis le nord), la route
  sa trajectoire réelle au sol. Le vent de travers crée un écart entre les deux,
  la dérive, que le pilote corrige en pointant vers le vent. Le nord magnétique diffère du nord vrai.
objectifs:
  - Définir le cap (direction du nez, en degrés depuis le nord) et la route (trajectoire réelle au sol).
  - Définir la dérive comme l'angle entre le cap et la route, dû au vent de travers, et expliquer sa correction.
  - Distinguer le nord vrai et le nord magnétique et nommer la déclinaison magnétique.
