summary: >-
  La déclinaison magnétique est l'angle entre le nord vrai (carte) et le nord
  magnétique (boussole) ; elle dépend du lieu et du temps. Elle convertit le cap
  vrai en cap magnétique — Est on retranche, Ouest on ajoute. La déviation donne le cap compas.
objectifs:
  - Définir la déclinaison magnétique (angle nord vrai / nord magnétique) et sa variation dans l'espace et le temps.
  - Convertir un cap vrai en cap magnétique selon le sens de la déclinaison (Est on retranche, Ouest on ajoute).
  - Distinguer la déclinaison de la déviation et situer le cap compas.
