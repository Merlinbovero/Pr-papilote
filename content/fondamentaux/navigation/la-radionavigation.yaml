summary: >-
  Quand l'estime ne suffit plus, la radio prend le relais — le VOR donne une
  direction, le DME une distance, le GPS une position. Les trois lettres qui
  structurent la navigation moderne, au programme du BIA et des QCM.
objectifs:
  - Expliquer ce qu'apporte chaque moyen (VOR = radial, DME = distance, GPS = position).
  - Comprendre le principe d'une balise au sol interrogée par l'avion.
  - Situer la radionavigation par rapport à la navigation à l'estime.
