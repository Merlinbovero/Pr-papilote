content:
  essentiel:
    body: |
      Trois lois énoncées par **Isaac Newton** au XVIIᵉ siècle décrivent le
      mouvement des corps. Elles ne sont pas une fin en soi au BIA, mais elles
      **éclairent toute la mécanique du vol** — d'où leur place ici, en socle.

      - **1ʳᵉ loi — principe d'inertie** : livré à lui-même (résultante des
        forces nulle), un corps conserve sa vitesse — immobile il reste
        immobile, en mouvement il garde une vitesse constante en ligne droite.
      - **2ᵉ loi — relation fondamentale** : la résultante des forces est égale
        à la masse multipliée par l'accélération, **ΣF = m·a**. Une résultante
        non nulle **modifie** le mouvement (accélère, freine, incurve).
      - **3ᵉ loi — action-réaction** : toute action produit une réaction égale
        et opposée. Deux corps en interaction exercent l'un sur l'autre des
        forces de **même intensité, même direction, sens opposés**.
    aRetenir:
      - 1ʳᵉ loi (inertie) — résultante nulle ⇔ vitesse constante (ΣF = 0 ⇔ V = cste).
      - 2ᵉ loi — ΣF = m·a ; une résultante non nulle modifie le mouvement.
      - 3ᵉ loi (action-réaction) — forces égales, opposées, sur deux corps différents.
      - En vol stabilisé (palier, montée ou descente à vitesse constante), la résultante des forces est nulle.
  sections:
    - id: premiere-loi-inertie
      title: Première loi — le principe d'inertie
      body: |
        Un corps sur lequel **aucune force ne s'exerce**, ou dont les forces se
        **compensent** (résultante nulle), conserve son état : au repos il reste
        au repos, en mouvement il poursuit à **vitesse constante en ligne
        droite** (mouvement rectiligne uniforme, MRU).

        Autrement dit :

        **ΣF = 0 ⇔ vitesse constante**

        C'est exactement la situation d'un avion en **vol stabilisé** : en
        palier, en montée ou en descente à vitesse constante, la somme des
        forces qui s'exercent sur lui est **nulle**. Les quatre forces du vol
        (poids, portance, traction, traînée) s'équilibrent alors deux à deux.
      figures:
        - schemaId: newton-inertie-equilibre
          alt: Un avion en palier à vitesse constante ; portance et poids s'équilibrent, traction et traînée aussi, la résultante est nulle.
          caption: En vol stabilisé, ΣF = 0 — les quatre forces s'équilibrent, la vitesse reste constante.
          width: 460
          height: 260
    - id: deuxieme-loi-fondamentale
      title: Deuxième loi — force et accélération
      body: |
        Lorsque la résultante des forces **n'est pas nulle**, le mouvement
        **change**. La deuxième loi le quantifie :

        **ΣF = m·a**

        où **m** est la masse (en kg) et **a** l'accélération (en m/s²). Plus la
        résultante est grande, plus l'accélération est grande ; plus le corps est
        lourd, moins il accélère pour une même force.

        On retrouve d'ailleurs la première loi comme cas particulier : si
        **ΣF = 0**, alors **a = 0**, donc la vitesse ne change pas.

        En vol, « accélérer » ne veut pas seulement dire aller plus vite : mettre
        l'avion **en virage** ou le faire **monter** revient aussi à modifier son
        vecteur vitesse — donc à lui appliquer une résultante non nulle.
    - id: troisieme-loi-action-reaction
      title: Troisième loi — action et réaction
      body: |
        Quand un corps A exerce une force sur un corps B, alors **B exerce sur A
        une force égale et opposée** : même intensité, même direction, sens
        contraires. Les deux forces s'appliquent sur **deux corps différents** —
        elles ne s'annulent donc pas entre elles.

        C'est le principe même de la **propulsion** : l'hélice (ou le réacteur)
        **pousse l'air vers l'arrière** ; en retour, l'air **pousse l'avion vers
        l'avant**. C'est cette réaction que le pilote recherche.
      figures:
        - schemaId: newton-action-reaction
          alt: Une hélice pousse l'air vers l'arrière ; en réaction, l'air pousse l'avion vers l'avant.
          caption: "Action – réaction : l'hélice pousse l'air en arrière, l'air pousse l'avion en avant."
          width: 460
          height: 240
    - id: pour-aller-plus-loin
      title: Pour aller plus loin — référentiels
      strate: maitriser
      body: |
        Les lois de Newton ne sont vraies que dans un **référentiel galiléen**
        (non accéléré). Pour l'étude du vol à notre échelle, on considère le sol
        (ou l'air au repos) comme un tel référentiel — une approximation
        largement suffisante au niveau BIA.

        On raisonne alors sur le **centre de gravité** de l'avion : tout se passe
        comme si les forces s'y appliquaient et comme si toute la masse y était
        concentrée.
  pieges:
    - « Résultante nulle » ne veut pas dire « aucune force » — les forces peuvent être nombreuses mais se compenser (cas du vol stabilisé).
    - Les deux forces de la 3ᵉ loi s'exercent sur deux corps différents ; elles ne s'annulent pas l'une l'autre.
    - Accélérer, au sens de Newton, ce n'est pas seulement aller plus vite — c'est toute modification du vecteur vitesse (virage, montée comprise).
