summary: >-
  La force (un vecteur, en newtons) et la pression (une force répartie sur une
  surface, en pascals) sont les deux grandeurs qui gouvernent le vol. Cette
  fiche les définit et introduit leurs unités.
objectifs:
  - Distinguer une force (vecteur — intensité, direction, sens, point d'application) d'une simple valeur numérique.
  - Énoncer et appliquer la relation pression = force / surface (p = F / S).
  - Associer les unités correctes — le newton à la force, le pascal et l'hectopascal à la pression.
