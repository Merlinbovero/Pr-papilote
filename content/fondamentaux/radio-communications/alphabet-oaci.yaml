summary: >-
  L'alphabet phonétique OACI épelle chaque lettre par un mot-code clair (Alfa,
  Bravo… Zulu) pour éviter les confusions à la radio. Les orthographes officielles
  sont Alfa et Juliett ; les chiffres se disent un par un (« niner » pour 9).
