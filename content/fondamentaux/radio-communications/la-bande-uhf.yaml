title: La bande UHF aéronautique
slug: la-bande-uhf
summary: >-
  La bande radio 225–400 MHz, en modulation d'amplitude, est réservée à
  l'aviation militaire et à certaines liaisons gouvernementales. C'est le
  standard des communications vocales des avions de combat.
objectifs:
  - Situer la bande UHF aéronautique (225–400 MHz) et son usage — les communications militaires air-sol et air-air.
  - Comprendre pourquoi le militaire dispose de sa propre bande, distincte de la VHF civile.
  - Connaître la propagation à vue directe (comme la VHF) et l'usage pour le contrôle de l'espace aérien supérieur.
