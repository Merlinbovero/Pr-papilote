type: concept
title: La bande VHF aéronautique
slug: la-bande-vhf
summary: >-
  La bande radio 118–137 MHz, en modulation d'amplitude, est le principal moyen
  de communication vocale entre aéronefs et organismes au sol dans l'aviation
  civile. Sa portée « à vue » conditionne les échanges.
objectifs:
  - Situer la bande VHF aéronautique (118–137 MHz) et son usage principal — la phonie civile air-sol.
  - Comprendre la propagation « à vue directe » (portée liée à l'altitude, pas de suivi de la courbure terrestre).
  - Connaître la modulation d'amplitude (AM) et l'espacement des canaux (25 puis 8,33 kHz en Europe).
