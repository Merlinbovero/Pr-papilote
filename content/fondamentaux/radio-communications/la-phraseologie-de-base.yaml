title: La phraséologie de base
slug: la-phraseologie-de-base
summary: >-
  À la radio, chaque mot compte — la phraséologie normalise qui parle, à qui,
  et avec quels mots : structure d'un message, collationnement, expressions
  conventionnelles et prononciation des nombres.
objectifs:
  - Structurer un message radio (qui j'appelle, qui je suis, où je suis, ce que je demande).
  - Employer les expressions conventionnelles à bon escient (roger, wilco, affirme, négatif…).
  - Comprendre le rôle du collationnement et de la fréquence de détresse 121,5 MHz.
