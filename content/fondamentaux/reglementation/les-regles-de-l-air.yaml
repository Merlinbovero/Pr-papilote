title: Les règles de l'air
slug: les-regles-de-l-air
summary: >-
  Qui a priorité ? À quelle hauteur survoler ? À quel niveau croiser ? Les
  règles de l'air (SERA) organisent la cohabitation de tous les aéronefs —
  priorités, règle semi-circulaire et hauteurs minimales.
objectifs:
  - Appliquer les règles de priorité entre aéronefs (face à face, convergence, dépassement, atterrissage).
  - Utiliser la règle semi-circulaire pour choisir un niveau de croisière selon la route magnétique.
  - Connaître les hauteurs minimales de survol en VFR.
