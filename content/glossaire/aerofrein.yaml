id: terme.aerofrein
title: Aérofrein
definition: >-
  Surface dont le rôle est d'augmenter la traînée pour ralentir l'avion, sans
  chercher à modifier la portance. On en trouve sur les planeurs, les avions de
  chasse et certains transports.
