title: ALAVIA
definition: >-
  Amiral commandant la force de l'aéronautique navale. Autorité organique qui
  prépare l'ensemble des bases et des aéronefs de la Marine (état-major à
  Toulon). C'est l'autorité de référence pour l'aéronautique navale.
