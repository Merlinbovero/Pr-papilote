id: terme.allongement
title: Allongement
definition: >-
  Grandeur sans dimension mesurant l'élancement d'une aile : λ = envergure² /
  surface (b²/S). Un grand allongement (aile longue et fine) réduit la traînée
  induite et améliore la finesse.
