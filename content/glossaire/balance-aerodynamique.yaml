id: terme.balance-aerodynamique
title: Balance aérodynamique
definition: >-
  Dispositif qui mesure les forces exercées par l'air sur une maquette placée
  dans la veine d'essai — notamment la portance et la traînée — pour en déduire
  les coefficients aérodynamiques (Cz, Cx).
