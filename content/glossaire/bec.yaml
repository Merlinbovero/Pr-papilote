id: terme.bec
title: Bec (de bord d'attaque)
definition: >-
  Dispositif mobile au bord d'attaque qui, en s'avançant, crée une fente
  réénergisant la couche limite et retarde le décollement : l'aile atteint une
  incidence plus forte avant de décrocher.
