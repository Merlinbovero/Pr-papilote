schemaVersion: 1
id: terme.cambrure
title: Cambrure
definition: >-
  Courbure de la ligne moyenne d'un profil (la ligne à égale distance de
  l'extrados et de l'intrados). Un profil symétrique n'a aucune cambrure ; plus
  un profil est cambré, plus il est porteur.
