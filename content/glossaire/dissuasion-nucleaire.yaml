id: terme.dissuasion-nucleaire
title: Dissuasion nucléaire
definition: >-
  Stratégie visant à décourager toute agression majeure par la menace de
  représailles nucléaires. Sa composante aéroportée est assurée par le Rafale B
  (missile ASMP/A), au sein des Forces aériennes stratégiques ; la Marine y
  participe aussi.
