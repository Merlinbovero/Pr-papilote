id: terme.effet-gyroscopique
title: Effet gyroscopique
definition: >-
  Comportement de l'hélice en rotation comme un gyroscope : une action sur un axe
  se manifeste, par précession, 90° plus loin. Sensible lors des changements
  d'assiette.
english: gyroscopic effect
