title: FAS
definition: >-
  Forces aériennes stratégiques — le commandement de l'armée de l'Air et de
  l'Espace qui porte la composante aéroportée de la dissuasion nucléaire
  (Rafale armés du missile ASMP-A et ravitailleurs), en alerte depuis 1964
  (Mirage IV). Pilier de la dissuasion avec la FOST.
