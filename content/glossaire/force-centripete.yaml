id: terme.force-centripete
title: Force centripète
definition: >-
  Force dirigée vers le centre d'une trajectoire courbe, nécessaire pour courber
  cette trajectoire. En virage, elle est fournie par la composante horizontale de
  la portance inclinée.
english: centripetal force
