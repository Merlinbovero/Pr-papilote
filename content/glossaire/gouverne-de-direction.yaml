id: terme.gouverne-de-direction
title: Gouverne de direction
definition: >-
  Surface mobile au bord de fuite de la dérive (empennage vertical), agissant sur
  le lacet. Actionnée au palonnier, elle fait pivoter le nez à gauche ou à droite.
english: rudder
synonyms: [direction]
