id: terme.polaire
title: Polaire d'Eiffel
definition: >-
  Courbe expérimentale traçant le coefficient de portance Cz en fonction du
  coefficient de traînée Cx, chaque point correspondant à une incidence. Elle
  révèle les points remarquables de l'aile.
