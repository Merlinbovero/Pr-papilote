id: terme.profil-biconvexe
title: Profil biconvexe
definition: >-
  Profil dont l'extrados et l'intrados sont tous deux convexes. Symétrique (ligne
  moyenne droite, voltige et empennages) ou dissymétrique (extrados plus courbé,
  le profil le plus répandu).
