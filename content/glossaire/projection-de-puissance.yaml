id: terme.projection-de-puissance
title: Projection de puissance
definition: >-
  Capacité à porter la force militaire loin et dans la durée depuis la mer, au
  moyen du groupe aéronaval centré sur le porte-avions. Elle frappe dans la masse
  et s'affranchit de l'autorisation d'États tiers.
english: Power projection
