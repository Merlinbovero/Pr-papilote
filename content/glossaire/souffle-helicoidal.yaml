id: terme.souffle-helicoidal
title: Souffle hélicoïdal
definition: >-
  Nappe d'air envoyée en spirale par l'hélice autour du fuselage. En frappant la
  dérive d'un côté, elle provoque un lacet. Le sens dépend du sens de rotation de
  l'hélice.
english: helical slipstream
