title: Soufflerie
definition: >-
  Installation produisant un courant d'air contrôlé pour étudier l'action de
  l'air sur une maquette immobile (relativité du mouvement). On distingue les
  souffleries à circuit ouvert (type Eiffel) et fermé (type Prandtl).
