id: terme.winglet
title: Winglet
definition: >-
  Surface dressée en bout d'aile qui gêne la formation du tourbillon marginal et
  réduit la traînée induite. Le gain de consommation est de l'ordre de quelques
  pour cent (Airbus annonce ~4 % pour ses Sharklets).
