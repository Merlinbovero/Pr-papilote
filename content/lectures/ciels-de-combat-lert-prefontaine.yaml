summary: |-
  « Ciels de combat » réunit plus d'une centaine de témoignages inédits
  d'équipages de chasse de l'Armée de l'air et de l'espace, recueillis et mis
  en forme par le pilote Benjamin Vinot Préfontaine et le journaliste Frédéric
  Lert. Des récits vécus qui vont de la formation initiale à l'arrivée en
  unité, des entraînements et qualifications jusqu'aux missions réelles en
  opérations extérieures — Balkans, Afrique, Afghanistan, Libye, Mali — sur
  Jaguar, Mirage F1, Mirage 2000, Super-Étendard et Rafale.

  Ce n'est pas un manuel de sélection, mais un livre qui donne à comprendre le
  métier de l'intérieur : la préparation, la cohésion d'équipage, la charge
  mentale, l'engagement opérationnel. Une lecture de motivation et de culture
  du milieu précieuse pour qui prépare l'EOPN et veut savoir ce qui attend
  réellement un pilote de chasse.
takeaways:
  - Recueil de plus de cent témoignages vécus d'équipages de chasse de l'Armée de l'air et de l'espace.
  - Coordonné par le pilote Benjamin Vinot Préfontaine et le journaliste Frédéric Lert (Éditions Nimrod, 2021).
  - Il couvre tout le parcours — formation, unité opérationnelle, entraînements, puis opérations extérieures réelles.
  - Une lecture de motivation et de culture du milieu pour la préparation à l'EOPN, pas un manuel technique.
