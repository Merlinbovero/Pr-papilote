summary: >-
  Barrages, détection de cibles, double tâche — ces tests mesurent la
  vigilance, la précision sous cadence et la capacité à mener deux activités
  de front sans s'effondrer : le quotidien d'un cockpit.
objectifs:
  - Reconnaître les formats (barrages, détection, poursuite de cible, double tâche).
  - Comprendre ce qui est mesuré (vigilance soutenue, partage attentionnel, résistance à la saturation).
  - Adopter les bonnes stratégies (rythme régulier, priorisation, balayage systématique).
