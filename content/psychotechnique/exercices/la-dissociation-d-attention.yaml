summary: >-
  Surveiller plusieurs paramètres à la fois, chacun avec sa propre règle —
  l'attention répartie est au cœur du pilotage et des sélections. On ne fixe
  jamais un seul cadran — on balaie les quatre ou cinq en boucle, sans jamais
  décrocher.
objectifs:
  - Comprendre ce qu'est l'attention répartie (ou dissociée) et pourquoi elle est déterminante en vol.
  - Appliquer simultanément plusieurs règles différentes (min, max, plage) à plusieurs cadrans.
  - Tenir un balayage régulier et complet sous contrainte de temps, sans se fixer sur un seul paramètre.
