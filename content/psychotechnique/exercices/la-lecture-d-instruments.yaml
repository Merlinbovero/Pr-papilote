summary: >-
  Six cadrans, dix secondes, une question — où est l'avion ? L'épreuve de
  lecture d'instruments teste la capacité à extraire vite une situation de
  vol de plusieurs sources : l'aptitude cockpit par excellence.
objectifs:
  - Comprendre le principe de l'épreuve (lire plusieurs cadrans, en déduire la situation).
  - Mobiliser la lecture des instruments de base (altimètre, anémomètre, horizon, compas, variomètre, bille).
  - Acquérir la méthode de balayage et éviter les pièges de lecture.
