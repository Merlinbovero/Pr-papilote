summary: >-
  Retenir des paires — un indicatif et un nombre, un code et une fréquence —
  puis restituer l'association dans un sens comme dans l'autre. La mémoire qui
  relie, distincte de la mémoire qui liste.
objectifs:
  - Distinguer la mémoire associative (relier deux éléments) de la mémoire de liste (retenir une suite).
  - Construire des images mentales qui lient chaque paire pour la rendre durable.
  - Restituer une association dans les deux sens (indicatif → nombre et nombre → indicatif).
