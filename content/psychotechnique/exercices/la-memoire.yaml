summary: >-
  Chiffres, formes, paramètres, cartes — les tests de mémoire mesurent la
  capacité à encoder vite et à restituer juste. Trois leviers font la
  différence : le regroupement, les associations et la répétition mentale.
objectifs:
  - Reconnaître les formats classiques (empans de chiffres, formes, tableaux de paramètres, cartes).
  - Appliquer les techniques d'encodage (regroupement, association, verbalisation).
  - Gérer la mémoire sous double tâche — retenir pendant qu'on fait autre chose.
