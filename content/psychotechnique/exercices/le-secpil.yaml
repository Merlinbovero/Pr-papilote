summary: >-
  L'épreuve psychomotrice éliminatoire des sélections EOPN : suivre deux cibles à
  la fois (manche et palonnier), puis y ajouter un calcul mental. Ce n'est pas la
  précision d'une tâche qui compte, mais la capacité à tenir plusieurs commandes
  en même temps — l'attention partagée du pilote.
objectifs:
  - Comprendre ce que mesure le SECPIL — la coordination psychomotrice et l'attention partagée, pas les connaissances.
  - Connaître la structure de l'épreuve — trois tâches (manche, palonnier, calcul) ajoutées progressivement en quatre phases.
  - Retenir la bonne stratégie — répartir son attention, ne jamais abandonner une tâche pour perfectionner l'autre, et progresser sur la durée.
