summary: >-
  L'épreuve reine du raisonnement logique — compléter le dernier domino d'une
  série. Tout repose sur une règle à découvrir (progression, symétrie,
  alternance) et sur une convention clé — après 6, on repart à 0.
objectifs:
  - Connaître la convention cyclique des dominos (0 à 6, puis retour à 0).
  - Reconnaître les grands types de règles (progression, répétition, symétrie, lecture en lignes/colonnes).
  - Appliquer une méthode systématique pour trouver la règle sous contrainte de temps.
