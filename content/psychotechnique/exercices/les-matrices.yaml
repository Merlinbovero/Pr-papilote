title: Les matrices logiques
slug: les-matrices
summary: >-
  Une grille de 3×3 figures, une case vide — trouver la figure manquante.
  Les matrices testent le raisonnement pur, sans mots ni chiffres : la
  méthode consiste à isoler les règles une par une (forme, nombre, rotation).
objectifs:
  - Reconnaître les règles usuelles des matrices (progression, rotation, addition, superposition).
  - Appliquer la méthode ligne-par-ligne puis colonne-par-colonne.
  - Gérer le temps et éliminer les distracteurs.
