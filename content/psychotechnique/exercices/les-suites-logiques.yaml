title: Les suites logiques
slug: les-suites-logiques
summary: >-
  Compléter une suite de nombres ou de lettres en découvrant sa règle —
  progression arithmétique ou géométrique, écarts croissants, suites
  entrelacées, rangs alphabétiques. Un répertoire de règles + une méthode.
objectifs:
  - Reconnaître les grands types de suites (arithmétiques, géométriques, à écarts variables, entrelacées).
  - Traiter les suites de lettres en raisonnant sur les rangs alphabétiques.
  - Appliquer la méthode des différences pour découvrir une règle cachée.
