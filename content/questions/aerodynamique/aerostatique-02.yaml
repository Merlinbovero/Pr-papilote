id: q.aerodynamique.aerostatique-02
kind: qcm
theme: aerostatique
statement: >-
  Comment le pilote d'une montgolfière fait-il monter son ballon ?
choices:
  - "En chauffant l'air de l'enveloppe au brûleur"
  - "En larguant du gaz"
  - "En orientant l'enveloppe face au vent"
  - "En accélérant l'hélice"
correctChoices: [0]
explanation: >-
  L'air chauffé est moins dense — l'enveloppe pèse alors moins que l'air
  qu'elle déplace et la poussée d'Archimède l'emporte. Pour descendre, on
  laisse l'air refroidir.
