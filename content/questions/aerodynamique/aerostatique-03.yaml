statement: >-
  Un hélicoptère est un aérostat puisqu'il peut rester immobile en l'air.
answer: false
explanation: >-
  Le vol stationnaire ne change rien à la classification — le rotor crée une
  portance (voilure tournante) : l'hélicoptère est un aérodyne, plus lourd
  que l'air.
