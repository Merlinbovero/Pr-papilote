kind: vrai-faux
theme: proprietes-air
statement: >-
  Par forte chaleur, la distance de décollage d'un avion s'allonge.
answer: true
explanation: >-
  Par forte chaleur, l'air est moins dense : l'aile produit moins de portance et
  le moteur moins de poussée. La distance de décollage s'allonge.
