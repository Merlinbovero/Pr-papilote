schemaVersion: 1
id: q.aerodynamique.allongement-01
kind: qcm
theme: allongement
statement: >-
  Comment définit-on l'allongement λ d'une aile ?
choices:
  - "λ = envergure² / surface"
  - "λ = surface / envergure"
  - "λ = corde × envergure"
  - "λ = envergure × surface"
correctChoices: [0]
explanation: >-
  L'allongement vaut λ = b²/S (envergure au carré divisée par la surface). Pour
  une aile rectangulaire, cela revient au rapport envergure / corde.
evaluates: [fondamentaux.aerodynamique.l-allongement-et-les-winglets]
difficulty: 2
competencies: [connaissances-aeronautiques]
concours: [eopan, eopn, alat]
status: publie
