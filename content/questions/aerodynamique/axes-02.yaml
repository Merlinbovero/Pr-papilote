schemaVersion: 1
id: q.aerodynamique.axes-02
kind: qcm
theme: axes-gouvernes
statement: >-
  Autour de quel axe se fait le tangage ?
choices:
  - "L'axe transversal (d'une aile à l'autre)"
  - "L'axe longitudinal (du nez à la queue)"
  - "L'axe vertical"
  - "L'axe de lacet"
correctChoices: [0]
explanation: >-
  Le tangage est la rotation autour de l'axe transversal : le nez monte (cabré)
  ou descend (piqué).
evaluates: [fondamentaux.aerodynamique.les-axes-et-les-gouvernes]
difficulty: 2
competencies: [connaissances-aeronautiques]
concours: [eopan, eopn, alat]
status: publie
