theme: bilans-de-forces
statement: >-
  Pourquoi la montée « coûte-t-elle » de la puissance ?
choices:
  - "La traction doit vaincre la traînée et soutenir une part du poids"
  - "La portance disparaît"
  - "La traînée devient nulle"
  - "Le poids augmente réellement"
correctChoices: [0]
explanation: >-
  En montée, la trajectoire est inclinée vers le haut : la traction doit vaincre
  la traînée et soutenir une composante du poids, d'où un besoin de puissance
  accru.
