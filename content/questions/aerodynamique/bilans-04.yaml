statement: >-
  De quoi dépend l'angle de plané d'un avion sans moteur ?
choices:
  - "De sa finesse"
  - "De sa couleur"
  - "De la puissance moteur"
  - "Du nombre de passagers uniquement"
correctChoices: [0]
explanation: >-
  L'angle de plané dépend directement de la finesse : plus elle est grande, plus
  l'angle est faible et la distance parcourue grande.
