id: q.aerodynamique.bilans-05
kind: qcm
theme: bilans-de-forces
statement: >-
  Comment définit-on le facteur de charge n ?
choices:
  - "n = portance / poids"
  - "n = poids / portance"
  - "n = traction / traînée"
  - "n = portance × poids"
correctChoices: [0]
explanation: >-
  Le facteur de charge est le rapport de la portance au poids : n = 1 en palier,
  et davantage en virage ou en ressource.
