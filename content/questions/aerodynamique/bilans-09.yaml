schemaVersion: 1
id: q.aerodynamique.bilans-09
kind: calcul
theme: bilans-de-forces
statement: >-
  En virage à 60° d'inclinaison, la vitesse de décrochage en palier est de
  100 km/h. Quelle est la nouvelle vitesse de décrochage ? (n = 2, √2 ≈ 1,41)
answerValue: 141
tolerance: 2
unit: km/h
explanation: >-
  La vitesse de décrochage est multipliée par √n = √2 ≈ 1,41 : 100 × 1,41 =
  141 km/h.
evaluates: [fondamentaux.aerodynamique.les-bilans-de-forces]
difficulty: 3
competencies: [raisonnement-logique]
concours: [eopan, eopn, alat]
status: publie
