statement: >-
  Les structures d'un avion sont limitées en facteur de charge (les « g »).
answer: true
explanation: >-
  Un facteur de charge élevé sollicite fortement la structure : chaque avion a
  des limites de facteur de charge à ne pas dépasser (utilitaire, voltige…).
