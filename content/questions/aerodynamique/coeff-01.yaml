statement: >-
  Quelle relation générale donne la portance ou la traînée ?
choices:
  - "F = ½·ρ·S·V²·C"
  - "F = m·a"
  - "F = ρ·S·V"
  - "F = C / (ρ·S·V²)"
correctChoices: [0]
explanation: >-
  Portance et traînée suivent la même forme : F = ½·ρ·S·V²·C, avec C = Cz pour la
  portance et C = Cx pour la traînée.
