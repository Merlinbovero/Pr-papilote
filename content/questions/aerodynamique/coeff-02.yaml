statement: >-
  Que résument les coefficients Cz et Cx ?
choices:
  - "L'effet du profil et de l'angle d'incidence"
  - "La surface et l'envergure de l'aile"
  - "La masse de l'avion"
  - "La puissance du moteur"
correctChoices: [0]
