theme: couche-limite
statement: >-
  Qu'est-ce que la couche limite ?
choices:
  - "La fine pellicule d'air ralentie par la viscosité au contact de l'aile"
  - "La couche de nuages sous l'avion"
  - "La limite entre deux masses d'air froides et chaudes"
  - "L'altitude maximale de vol"
correctChoices: [0]
explanation: >-
  Au contact de l'aile, la viscosité ralentit l'air : il se forme une très fine
  couche où la vitesse passe de zéro à celle de l'écoulement libre.
