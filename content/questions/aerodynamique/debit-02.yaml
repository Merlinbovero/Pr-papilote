schemaVersion: 1
id: q.aerodynamique.debit-02
kind: qcm
theme: continuite
statement: >-
  Dans un conduit où l'air est peu compressible, que dit la loi de continuité ?
choices:
  - "Le produit section × vitesse (S·V) reste constant"
  - "La vitesse reste constante partout"
  - "La section reste constante partout"
  - "La pression reste constante partout"
correctChoices: [0]
explanation: >-
  Le débit se conserve : en air peu compressible, S·V = constante. Si la section
  change, la vitesse change en sens inverse.
evaluates: [fondamentaux.aerodynamique.conservation-du-debit]
difficulty: 2
competencies: [connaissances-aeronautiques]
concours: [eopan, eopn, alat]
status: publie
