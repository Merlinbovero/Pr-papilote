kind: vrai-faux
theme: couche-limite
statement: >-
  Le décollement de la couche limite à forte incidence est l'origine du
  décrochage.
answer: true
explanation: >-
  Quand la couche limite décolle de l'extrados, la portance s'effondre : c'est le
  mécanisme même du décrochage.
