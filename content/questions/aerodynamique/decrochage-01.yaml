statement: >-
  Qu'est-ce que le décrochage aérodynamique ?
choices:
  - "La perte de portance au-delà de l'angle d'incidence critique"
  - "Une panne du moteur en vol"
  - "Une perte de vitesse au roulage"
  - "Une descente volontaire et contrôlée"
correctChoices: [0]
explanation: >-
  Le décrochage est la perte brutale de portance qui survient quand l'incidence
  dépasse l'angle critique : l'écoulement décolle de l'extrados.
