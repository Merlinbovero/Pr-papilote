schemaVersion: 1
id: q.aerodynamique.decrochage-03
kind: qcm
theme: decrochage
statement: >-
  Quelle est la première action pour sortir d'un décrochage ?
choices:
  - "Réduire l'angle d'incidence (rendre la main)"
  - "Tirer sur le manche"
  - "Couper les gaz uniquement"
  - "Incliner fortement l'avion"
correctChoices: [0]
distractorNotes:
  "1": "Tirer augmente l'incidence et aggrave le décrochage."
explanation: >-
  On réduit l'angle d'incidence (« rendre la main ») pour recoller l'écoulement ;
  la gestion de la puissance vient ensuite.
