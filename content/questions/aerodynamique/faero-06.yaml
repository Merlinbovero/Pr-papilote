schemaVersion: 1
id: q.aerodynamique.faero-06
kind: qcm
theme: force-aerodynamique
statement: >-
  Quelle relation lie la résultante F_R à la portance F_z et à la traînée F_x ?
choices:
  - "F_R² = F_z² + F_x²"
  - "F_R = F_z + F_x"
  - "F_R = F_z − F_x"
  - "F_R = F_z × F_x"
correctChoices: [0]
explanation: >-
  Portance et traînée sont perpendiculaires : la résultante est l'hypoténuse du
  triangle rectangle, d'où F_R² = F_z² + F_x².
evaluates: [fondamentaux.aerodynamique.la-force-aerodynamique]
difficulty: 3
