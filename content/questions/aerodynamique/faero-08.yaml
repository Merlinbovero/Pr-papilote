kind: vrai-faux
theme: force-aerodynamique
statement: >-
  Comme la portance est bien plus grande que la traînée, la résultante
  aérodynamique est presque perpendiculaire au vent relatif.
answer: true
explanation: >-
  La portance dépasse souvent la traînée d'un facteur 10 ou plus : la résultante
  penche donc très peu vers l'arrière et reste presque perpendiculaire au vent
  relatif.
