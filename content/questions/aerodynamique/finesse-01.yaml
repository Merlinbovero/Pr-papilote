id: q.aerodynamique.finesse-01
kind: qcm
theme: finesse
statement: >-
  Comment définit-on la finesse d'une aile ?
choices:
  - "Le rapport portance / traînée (Cz/Cx)"
  - "Le rapport traînée / portance"
  - "Le produit portance × traînée"
  - "La différence portance − traînée"
correctChoices: [0]
explanation: >-
  La finesse est le rapport de la portance à la traînée, soit Cz/Cx ; c'est un
  nombre sans unité mesurant l'efficacité aérodynamique.
