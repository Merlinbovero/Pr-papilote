id: q.aerodynamique.finesse-02
kind: calcul
theme: finesse
statement: >-
  Une aile a Cz = 0,8 et Cx = 0,05. Quelle est sa finesse ?
answerValue: 16
tolerance: 0.2
explanation: >-
  Finesse = Cz / Cx = 0,8 / 0,05 = 16. L'aile produit 16 fois plus de portance
  que de traînée.
