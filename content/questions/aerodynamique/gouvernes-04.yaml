statement: >-
  Que comprend l'empennage d'un avion classique ?
choices:
  - "Un empennage horizontal (profondeur) et un empennage vertical (direction)"
  - "Seulement les ailerons"
  - "Les volets et les becs"
  - "Le train d'atterrissage"
correctChoices: [0]
explanation: >-
  L'empennage regroupe l'empennage horizontal (portant la gouverne de profondeur)
  et l'empennage vertical, ou dérive (portant la gouverne de direction).
