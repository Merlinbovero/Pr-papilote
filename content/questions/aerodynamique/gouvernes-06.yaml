statement: >-
  En vol coordonné, un virage combine ailerons (roulis) et un peu de palonnier
  (lacet).
answer: true
explanation: >-
  On incline l'avion aux ailerons pour virer, et l'on ajoute un peu de palonnier
  pour garder le vol coordonné (sans glisser ni déraper).
