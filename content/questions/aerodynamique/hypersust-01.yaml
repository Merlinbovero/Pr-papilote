  Quel est le rôle principal d'un dispositif hypersustentateur ?
choices:
  - "Augmenter le Cz max pour voler plus lentement sans décrocher"
  - "Augmenter la vitesse de croisière"
  - "Réduire la portance en descente"
  - "Refroidir le moteur"
correctChoices: [0]
