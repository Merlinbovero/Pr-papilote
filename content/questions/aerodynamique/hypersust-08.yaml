kind: vrai-faux
theme: hypersustentateurs
statement: >-
  Les volets augmentent la portance mais aussi la traînée.
answer: true
explanation: >-
  L'augmentation de cambrure accroît la portance et la traînée. Cette traînée est
  utile à l'atterrissage (freiner, descendre plus pentu), d'où une sortie
  modérée au décollage.
