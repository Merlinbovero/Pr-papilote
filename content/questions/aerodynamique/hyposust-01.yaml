statement: >-
  Que fait un dispositif hyposustentateur ?
choices:
  - "Il réduit la portance ou augmente la traînée"
  - "Il augmente le Cz max"
  - "Il abaisse la vitesse de décrochage"
  - "Il refroidit les freins"
