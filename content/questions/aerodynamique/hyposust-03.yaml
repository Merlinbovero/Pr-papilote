statement: >-
  À quoi servent les spoilers au toucher des roues à l'atterrissage ?
choices:
  - "À plaquer l'avion au sol pour rendre le freinage efficace"
  - "À augmenter la portance"
  - "À accélérer l'avion"
  - "À réduire la traînée"
correctChoices: [0]
explanation: >-
  Déployés symétriquement au toucher, les spoilers détruisent la portance et
  reportent le poids sur les roues : le freinage devient efficace.
