id: q.aerodynamique.hyposust-06
kind: vrai-faux
theme: hyposustentateurs
statement: >-
  Hypersustentateurs et hyposustentateurs ont des effets opposés sur la portance.
answer: true
explanation: >-
  Les hypersustentateurs (volets, becs) font porter plus à basse vitesse ; les
  hyposustentateurs (spoilers, aérofreins) réduisent la portance ou freinent :
  leurs effets sont opposés.
