statement: >-
  Le couple de renversement fait tendre l'avion à rouler…
choices:
  - "dans le sens opposé à la rotation de l'hélice"
  - "dans le même sens que l'hélice"
  - "vers le haut"
  - "il ne provoque aucun roulis"
correctChoices: [0]
explanation: >-
  Par la 3e loi de Newton, l'avion subit un couple opposé à celui qui entraîne
  l'hélice : il tend à rouler dans le sens contraire.
