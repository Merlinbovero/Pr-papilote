theme: effets-moteur
statement: >-
  Les effets moteur n'existent que sur les avions à hélice, pas sur les seuls
  planeurs.
answer: true
explanation: >-
  Ces effets proviennent de l'hélice (souffle, couple, gyroscopie, traction
  asymétrique) : un planeur sans moteur ne les subit pas.
