statement: >-
  Le point de finesse maximale coïncide avec le point de Cz maximal.
answer: false
explanation: >-
  Non : le Cz maximal est au sommet de la polaire, tandis que la finesse maximale
  est au point de tangente depuis l'origine, à une incidence plus faible.
