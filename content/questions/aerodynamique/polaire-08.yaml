statement: >-
  Voler à la finesse maximale permet de parcourir la plus grande distance pour
  une perte d'altitude donnée.
answer: true
explanation: >-
  La finesse maximale est le meilleur rapport portance/traînée : en vol plané,
  c'est l'incidence qui donne la plus grande distance par unité d'altitude perdue.
