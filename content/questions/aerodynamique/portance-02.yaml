  Comment la portance varie-t-elle avec la vitesse ?
choices:
  - "Elle croît avec le carré de la vitesse"
  - "Elle est proportionnelle à la vitesse"
  - "Elle diminue quand la vitesse augmente"
  - "Elle ne dépend pas de la vitesse"
