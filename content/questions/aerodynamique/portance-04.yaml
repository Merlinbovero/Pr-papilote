statement: >-
  Parmi ces éléments, lequel ne fait PAS varier la portance ?
choices:
  - "La couleur de l'aile"
  - "La vitesse"
  - "L'angle d'incidence"
  - "La densité de l'air"
correctChoices: [0]
explanation: >-
  La portance dépend de la vitesse, de l'angle d'incidence, de la surface et de
  la densité de l'air — jamais de la couleur de l'aile.
