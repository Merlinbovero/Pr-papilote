theme: pression
statement: >-
  Calculez la pression dynamique (en Pa) d'un air à 20 m/s, avec ρ = 1,225 kg/m³.
answerValue: 245
tolerance: 1
unit: Pa
explanation: >-
  q = ½·ρ·V² = ½ × 1,225 × 20² = ½ × 1,225 × 400 = 245 Pa.
