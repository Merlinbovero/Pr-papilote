id: q.aerodynamique.pression-08
kind: vrai-faux
theme: pression
statement: >-
  À vitesse égale, la pression dynamique diminue quand on monte en altitude.
answer: true
explanation: >-
  q = ½·ρ·V² dépend de ρ. En altitude l'air est moins dense (ρ plus faible),
  donc à vitesse vraie égale la pression dynamique est plus faible.
