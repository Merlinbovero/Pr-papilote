id: q.aerodynamique.profil-02
kind: qcm
theme: profil-aile
statement: >-
  Qu'est-ce que la corde d'un profil ?
choices:
  - "La ligne droite reliant le bord d'attaque au bord de fuite"
  - "La surface supérieure du profil"
  - "La courbure du profil"
  - "L'épaisseur maximale du profil"
correctChoices: [0]
explanation: >-
  La corde est la ligne droite qui joint le bord d'attaque au bord de fuite,
  même si le profil, lui, est courbe.
