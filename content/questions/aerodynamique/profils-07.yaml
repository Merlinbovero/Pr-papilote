statement: >-
  À quoi sert un profil supercritique ?
choices:
  - "À retarder les effets de la compressibilité sur les avions rapides"
  - "À augmenter la traînée pour freiner"
  - "À voler très lentement"
  - "À supprimer la portance"
correctChoices: [0]
explanation: >-
  Le profil supercritique, à extrados aplati, retarde les effets de la
  compressibilité : c'est le profil des avions de transport rapides.
