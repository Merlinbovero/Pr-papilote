schemaVersion: 1
id: q.aerodynamique.soufflerie-01
kind: qcm
theme: soufflerie
statement: >-
  Sur quel principe repose l'étude d'une maquette en soufflerie ?
choices:
  - "La relativité du mouvement entre l'air et l'objet"
  - "La poussée d'Archimède"
  - "La conservation de la masse uniquement"
  - "L'effet gyroscopique"
correctChoices: [0]
explanation: >-
  Un objet fixe dans un air en mouvement subit les mêmes forces qu'un objet
  mobile dans un air immobile : c'est la relativité du mouvement (le vent
  relatif), fondement de la soufflerie.
evaluates: [fondamentaux.aerodynamique.les-souffleries]
difficulty: 1
competencies: [connaissances-aeronautiques]
concours: [eopan, eopn, alat]
status: publie
