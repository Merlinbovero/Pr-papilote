statement: >-
  Où se situe approximativement le foyer d'un profil en régime subsonique ?
choices:
  - "Au quart de la corde (~25 %) à partir du bord d'attaque"
  - "Au bord de fuite"
  - "Au centre de gravité"
  - "À la moitié de l'envergure"
correctChoices: [0]
explanation: >-
  Le foyer se situe approximativement au quart de la corde (~25 %) à partir du
  bord d'attaque, à peu près quel que soit le profil. C'est un ordre de grandeur.
