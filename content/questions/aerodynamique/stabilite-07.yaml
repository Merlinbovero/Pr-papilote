kind: vrai-faux
theme: stabilite-centrage
statement: >-
  Une grande marge statique rend l'avion plus stable mais moins maniable.
answer: true
explanation: >-
  Plus le centre de gravité est en avant du foyer (grande marge statique), plus
  l'avion est stable — mais plus il est « lourd » à la profondeur, donc moins
  maniable.
