theme: trainee
statement: >-
  Qu'est-ce que la traînée induite ?
choices:
  - "Le prix de la portance (tourbillons de bout d'aile)"
  - "Le frottement de l'air sur la surface"
  - "La traînée due à la forme du fuselage"
  - "La traînée créée par le moteur"
correctChoices: [0]
explanation: >-
  La traînée induite est le prix de la portance : en portant, l'aile crée des
  tourbillons de bout d'aile. Elle est d'autant plus forte que la vitesse est faible.
