statement: >-
  La devise du 1er RHC est « Primus primorum » — le premier des premiers.
answer: true
explanation: >-
  Vrai. « Primus primorum » est la devise du 1er RHC de Phalsbourg, héritier
  des groupes d'aviation d'observation d'artillerie (1945-1949) et de
  l'Indochine.
