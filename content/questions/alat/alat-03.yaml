statement: >-
  On devient pilote de l'ALAT par un concours unique, comparable à l'EOPN de l'armée de l'air.
answer: false
explanation: >-
  Faux. On rejoint d'abord l'Armée de terre (comme officier, via Saint-Cyr, ou
  comme sous-officier), puis on choisit l'arme ALAT et l'on suit la formation à
  l'EALAT — il n'y a pas de concours unique de type EOPN.
