statement: >-
  Quel est le rôle du NH90 Caïman TTH dans l'ALAT ?
choices:
  - Hélicoptère de manœuvre et d'assaut (héliportage des combattants)
  - Hélicoptère d'attaque antichar
  - Hélicoptère de lutte anti-sous-marine
  - Avion de patrouille maritime
correctChoices: [0]
explanation: >-
  Le Caïman TTH est l'hélicoptère de manœuvre et d'assaut de l'ALAT : poser
  d'assaut, infiltration, évacuation sanitaire. L'attaque revient au Tigre, et
  la lutte anti-sous-marine à la version NFH de la Marine.
