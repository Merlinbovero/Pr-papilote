statement: >-
  Le Caïman TTH de l'armée de Terre et le Caïman NFH de la Marine sont deux versions du même hélicoptère NH90.
answer: true
explanation: >-
  Vrai. Le NH90 se décline en TTH (Tactical Transport Helicopter, manœuvre —
  armée de Terre) et NFH (NATO Frigate Helicopter, lutte anti-sous-marine et
  secours en mer — Marine nationale).
