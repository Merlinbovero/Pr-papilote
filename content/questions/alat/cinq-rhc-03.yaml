statement: >-
  Un régiment d'hélicoptères de combat ne met en œuvre qu'un seul type d'hélicoptère.
answer: false
explanation: >-
  Faux. Un RHC combine plusieurs types d'hélicoptères — combat (Tigre), manœuvre
  (Caïman, Cougar), reconnaissance (Gazelle) — pour couvrir toutes les missions
  de l'aérocombat.
