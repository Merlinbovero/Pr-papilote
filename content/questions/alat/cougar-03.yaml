statement: >-
  Le parc Cougar de l'armée de Terre a été entièrement rénové entre 2011 et 2015.
answer: true
explanation: >-
  Vrai. La rénovation (2011-2015) a apporté un tableau de bord numérique, une
  caméra thermique et des détecteurs de radars et de départs missiles — sans
  faire du Cougar un appareil neuf (livré dès 1988).
