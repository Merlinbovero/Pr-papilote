statement: >-
  Quel dispositif caractéristique équipe la queue de l'hélicoptère Gazelle ?
choices:
  - Le fenestron (rotor anticouple caréné)
  - Un second rotor principal
  - Une turbine à réaction
  - Des ailes fixes
