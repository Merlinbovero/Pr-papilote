statement: >-
  Le fenestron de la Gazelle est son rotor principal.
answer: false
explanation: >-
  Faux. Le fenestron est le rotor anticouple (de queue), simplement caréné dans
  un anneau — pas le rotor principal qui assure la sustentation.
