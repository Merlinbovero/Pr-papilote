statement: >-
  Que représente l'opération Daguet (1991) pour l'ALAT ?
choices:
  - 132 hélicoptères déployés — deuxième force aéromobile de la coalition
  - Sa première opération avec des avions de chasse
  - La création de l'aviation d'observation d'artillerie
  - Son retrait définitif des opérations extérieures
correctChoices: [0]
explanation: >-
  Lors de la guerre du Golfe, l'ALAT déploie 132 hélicoptères (88 Gazelle et
  38 Puma) — la deuxième force aéromobile de la coalition, validation en vraie
  grandeur du modèle aéromobile français.
