statement: >-
  Dans « cleared to land runway 22, wind 240 degrees 8 knots », le vent doit être collationné.
answer: false
explanation: >-
  Faux. La clairance (cleared to land + piste) se collationne ; le vent est
  une information, il ne se répète pas. Hiérarchie du read back : clairances
  oui, informations non.
