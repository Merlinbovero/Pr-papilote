theme: anglais-phraseologie
statement: >-
  Le contrôleur vous annonce « number two ». Que comprenez-vous ?
choices:
  - Un avion me précède dans la séquence d'arrivée
  - Je dois passer sur la fréquence n°2
  - Je dois voler à 2 000 pieds
  - Mon transpondeur doit afficher 2
correctChoices: [0]
explanation: >-
  « Number one/two/three » indique le rang dans la séquence d'arrivée :
  number two = un avion vous précède ; ouvrez l'œil et régulez votre
  espacement.
