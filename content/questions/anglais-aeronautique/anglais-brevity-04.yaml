statement: >-
  Que signifie « feet wet » ?
choices:
  - L'aéronef passe au-dessus de l'eau
  - Le pilote a les pieds mouillés dans le cockpit
  - L'avion amerrit
  - La piste est inondée
correctChoices: [0]
explanation: >-
  Feet wet = passage au-dessus de l'eau ; feet dry = au-dessus de la terre.
  Deux codes essentiels pour l'aéronavale — un Rafale Marine quittant la côte
  annonce « feet wet ».
