statement: >-
  « No joy » exprime la déception du pilote après une mission ratée.
answer: false
explanation: >-
  Faux. No joy signifie « ennemi non repéré » — l'inverse de tally. Le
  brevity code condense des situations tactiques, pas des émotions.
