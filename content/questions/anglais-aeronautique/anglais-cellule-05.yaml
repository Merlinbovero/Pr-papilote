statement: >-
  Comment se nomme la crosse d'appontage en anglais ?
choices:
  - Tailhook (ou arrestor hook)
  - Fish hook
  - Tail wheel
  - Catch bar
correctChoices: [0]
explanation: >-
  La crosse d'appontage se dit tailhook ou arrestor hook — un mot essentiel
  pour les futurs pilotes de l'aéronavale, dont le cursus chasse passe par
  les États-Unis.
