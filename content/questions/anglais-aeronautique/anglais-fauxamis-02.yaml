schemaVersion: 1
id: q.anglais-aeronautique.anglais-fauxamis-02
kind: qcm
theme: anglais-grammaire
statement: >-
  Que signifie « I hope to pass the exam » ?
choices:
  - J'espère réussir l'examen
  - J'espère passer l'examen (m'y présenter)
  - J'espère éviter l'examen
  - J'espère surveiller l'examen
correctChoices: [0]
explanation: >-
  To pass an exam = le réussir ; s'y présenter = to take an exam. Le faux ami
  le plus cruel pour un candidat à un concours.
evaluates: [fondamentaux.anglais-aeronautique.les-faux-amis]
difficulty: 1
competencies: [anglais-aeronautique]
concours: [eopan, eopn, alat]
status: publie
