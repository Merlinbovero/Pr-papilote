statement: >-
  Que signifie « the altimeter reads 3,000 feet » ?
choices:
  - L'altimètre indique 3 000 pieds
  - L'altimètre doit être réglé à 3 000 pieds
  - L'altimètre est en panne à 3 000 pieds
  - Le pilote lit un manuel à 3 000 pieds
correctChoices: [0]
explanation: >-
  To read = indiquer, pour un instrument ; to set = caler/régler. « Set the
  altimeter to 1013 » = calez l'altimètre à 1013.
