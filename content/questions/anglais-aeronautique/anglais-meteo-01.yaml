id: q.anglais-aeronautique.anglais-meteo-01
kind: association
theme: anglais-vocabulaire
statement: >-
  Associez chaque code de quantité de nuages à sa signification.
pairs:
  - left: FEW
    right: 1 à 2 octas
  - left: SCT (scattered)
    right: 3 à 4 octas
  - left: BKN (broken)
    right: 5 à 7 octas
  - left: OVC (overcast)
    right: 8 octas (ciel couvert)
explanation: >-
  Les quantités de nuages s'expriment en octas (huitièmes de ciel) : FEW
  (1-2), scattered (3-4), broken (5-7), overcast (8/8).
evaluates: [fondamentaux.anglais-aeronautique.la-meteo-en-anglais]
difficulty: 2
competencies: [anglais-aeronautique, meteorologie]
concours: [eopan, eopn, alat]
