statement: >-
  Comment dit-on « givrage » en anglais ?
choices:
  - Icing
  - Freezing rain
  - Snowing
  - Frosting
correctChoices: [0]
explanation: >-
  Icing = givrage (l'accrétion de glace sur l'avion). Freezing rain (FZRA)
  est la pluie verglaçante — une cause de givrage, pas le phénomène lui-même.
