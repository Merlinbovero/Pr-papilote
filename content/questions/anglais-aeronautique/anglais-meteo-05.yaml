theme: anglais-vocabulaire
statement: >-
  Dans un METAR, que signifie « TS » ?
choices:
  - Thunderstorm — orage
  - Très stable
  - Turbulence sévère
  - Test du système
correctChoices: [0]
explanation: >-
  TS = thunderstorm (orage), souvent associé au CB (cumulonimbus) — le nuage
  à éviter absolument. FG = fog, BR = mist, RA = rain, SN = snow.
