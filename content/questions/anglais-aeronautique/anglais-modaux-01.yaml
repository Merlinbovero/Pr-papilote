schemaVersion: 1
id: q.anglais-aeronautique.anglais-modaux-01
kind: qcm
theme: anglais-grammaire
statement: >-
  Que signifie « you must not enter the runway » ?
choices:
  - Il est interdit de pénétrer sur la piste
  - Vous n'êtes pas obligé de pénétrer sur la piste
  - Vous devriez éviter la piste si possible
  - Vous pouvez entrer sur la piste
correctChoices: [0]
explanation: >-
  Must not = interdiction. « Pas obligé » se dit don't have to — la
  dissymétrie clé des modaux, que les QCM testent sans relâche.
evaluates: [fondamentaux.anglais-aeronautique.les-modaux]
difficulty: 1
competencies: [anglais-aeronautique]
concours: [eopan, eopn, alat]
status: publie
