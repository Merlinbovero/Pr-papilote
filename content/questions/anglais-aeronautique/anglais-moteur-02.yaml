kind: qcm
theme: anglais-vocabulaire
statement: >-
  Que signifie « flameout » ?
choices:
  - L'extinction d'un réacteur en vol
  - Un incendie moteur
  - La post-combustion
  - Un feu d'artifice de meeting
correctChoices: [0]
explanation: >-
  Flameout = extinction réacteur (la flamme s'éteint dans la chambre de
  combustion). L'incendie moteur se dit engine fire — deux urgences très
  différentes.
