theme: anglais-vocabulaire
statement: >-
  Dans l'aviation militaire, que signifie « bingo fuel » ?
choices:
  - Le seuil de carburant qui impose le retour
  - Un plein complet gratuit
  - Une panne sèche
  - Le carburant de la post-combustion
correctChoices: [0]
explanation: >-
  Bingo fuel désigne le seuil de carburant au-dessous duquel la mission doit
  s'interrompre pour rentrer — un mot d'argot opérationnel passé dans l'usage
  courant.
