id: q.anglais-aeronautique.anglais-notam-01
kind: qcm
theme: anglais-comprehension
statement: >-
  Que signifie le NOTAM « RWY 04/22 CLSD DUE WIP » ?
choices:
  - Piste 04/22 fermée pour cause de travaux
  - Piste 04/22 glissante à cause de la pluie
  - Piste 04/22 réservée aux hélicoptères
  - Piste 04/22 rallongée de 22 mètres
correctChoices: [0]
explanation: >-
  RWY = runway (piste), CLSD = closed (fermée), DUE = due to (en raison de),
  WIP = work in progress (travaux). Trois abréviations, un message complet.
evaluates: [fondamentaux.anglais-aeronautique.lire-un-notam]
difficulty: 1
competencies: [anglais-aeronautique]
concours: [eopan, eopn, alat]
