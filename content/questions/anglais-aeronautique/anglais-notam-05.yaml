id: q.anglais-aeronautique.anglais-notam-05
kind: vrai-faux
theme: anglais-comprehension
statement: >-
  Les heures indiquées dans les NOTAM sont exprimées en heure locale.
answer: false
explanation: >-
  Faux. Comme toute l'aéronautique, les NOTAM utilisent l'heure UTC (le
  « Z » de zoulou). Confondre UTC et heure locale peut faire arriver sur une
  piste fermée.
