statement: >-
  Comment énonce-t-on la fréquence 118,2 selon la convention OACI ?
choices:
  - ONE ONE EIGHT DAY-SEE-MAL TWO
  - One hundred eighteen point two
  - Eleven eight two
  - ONE ONE EIGHT COMMA TWO
correctChoices: [0]
explanation: >-
  Les nombres s'énoncent chiffre par chiffre et la virgule se dit
  DAY-SEE-MAL (decimal) : 118,2 = ONE ONE EIGHT DAY-SEE-MAL TWO.
