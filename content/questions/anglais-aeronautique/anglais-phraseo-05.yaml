statement: >-
  À la réception d'un « go around », on collationne d'abord, puis on remet les gaz.
answer: false
explanation: >-
  Faux. « Go around » est un ordre immédiat : on remet les gaz d'abord, on
  collationne ensuite. La manœuvre prime sur la radio — aviate, navigate,
  communicate.
