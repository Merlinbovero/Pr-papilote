statement: >-
  La phrase « We have landed at 10:15 » est grammaticalement correcte.
answer: false
explanation: >-
  Faux. Une heure précise impose le prétérit : « We landed at 10:15 ». Le
  present perfect ne se combine jamais avec une date ou une heure — LA faute
  type des QCM.
