id: q.anglais-aeronautique.anglais-urgences-04
kind: vrai-faux
theme: anglais-phraseologie
statement: >-
  Annoncer « minimum fuel » équivaut à déclarer une détresse carburant.
answer: false
explanation: >-
  Faux. « Minimum fuel » est une information : la réserve devient tendue. La
  détresse carburant se déclare « MAYDAY, MAYDAY, MAYDAY, fuel » —
  l'atterrissage ne peut alors plus attendre.
