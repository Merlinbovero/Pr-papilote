kind: qcm
theme: anglais-vocabulaire
statement: >-
  Quel est le prétérit du verbe « to take off » ?
choices:
  - took off
  - taked off
  - taken off
  - takes off
correctChoices: [0]
explanation: >-
  Take est irrégulier : take / took / taken. « We took off at noon » — les
  prétérits irréguliers (take→took, fly→flew, rise→rose) sont un classique
  des questions de grammaire.
