kind: calcul
theme: lecture-de-carte
statement: >-
  Sur une carte OACI au 1/500 000, deux aérodromes sont distants de 7 cm. Quelle est la distance réelle en kilomètres ?
answerValue: 35
tolerance: 0
unit: "km"
explanation: >-
  Au 1/500 000, 1 cm = 5 km. Donc 7 cm = 35 km.
