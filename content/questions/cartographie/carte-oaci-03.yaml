statement: >-
  Sur la carte OACI, les altitudes des sommets et obstacles sont indiquées en mètres.
answer: false
explanation: >-
  Faux. Les altitudes portées sur la carte OACI (sommets, obstacles) sont en
  pieds — la confusion mètres/pieds est un piège classique de préparation de
  navigation.
