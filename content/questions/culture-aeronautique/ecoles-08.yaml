theme: grandes-ecoles
statement: >-
  Qui a fondé la première école d'ingénieurs aéronautiques au monde, à
  Paris en 1909 ?
choices:
  - "Le colonel Roche"
  - "Clément Ader"
  - "Marcel Dassault"
  - "Paul Painlevé"
correctChoices: [0]
explanation: >-
  Le colonel Roche, officier du génie polytechnicien, crée l'École
  supérieure d'aéronautique en 1909 — Painlevé y enseignait la mécanique du
  vol. Roche remettra son école à l'État en 1930.
