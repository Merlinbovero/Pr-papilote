statement: >-
  Quel constructeur, dont les usines furent nationalisées en 1936, est
  devenu après-guerre le grand nom des avions de chasse français ?
choices:
  - "Marcel Bloch, devenu Marcel Dassault"
  - "Louis Blériot"
  - "Henry Potez"
  - "Gabriel Voisin"
