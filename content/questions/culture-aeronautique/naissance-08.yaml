kind: qcm
theme: naissance-aviation
statement: >-
  Que devient l'industrie aéronautique française à la fin de la Première
  Guerre mondiale ?
choices:
  - "Elle s'effondre — de 90 000 salariés en 1918 à 3 700 en 1921"
  - "Elle continue de croître grâce à l'aviation civile"
  - "Elle est rachetée par les États-Unis"
  - "Elle est immédiatement nationalisée"
correctChoices: [0]
explanation: >-
  La paix provoque un arrêt brutal des commandes militaires — seules
  survivent les sociétés qui se reconvertissent dans l'aviation civile,
  comme les lignes Latécoère.
