statement: >-
  D'où partaient les lignes Latécoère, à l'origine de l'Aéropostale ?
choices:
  - "De Toulouse"
  - "De Paris"
  - "De Marseille"
  - "De Bordeaux"
correctChoices: [0]
explanation: >-
  Les lignes Latécoère partent de Toulouse dès 1918-1919, vers Casablanca
  puis Dakar et l'Amérique du Sud — d'où l'ancrage toulousain durable de
  l'aéronautique française.
