statement: >-
  Quel est le rôle de l'Atlantique 2 (ATL2) dans l'aéronautique navale ?
choices:
  - La patrouille maritime — surveiller de vastes zones et traquer les sous-marins
  - La chasse embarquée depuis le porte-avions
  - Le guet aérien au-dessus du groupe aéronaval
  - Le secours en mer par hélitreuillage
