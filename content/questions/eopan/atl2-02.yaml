statement: >-
  L'Atlantique 2 décolle et apponte depuis le porte-avions Charles de Gaulle.
answer: false
explanation: >-
  Faux. L'Atlantique 2 est un grand avion basé à terre (Lann-Bihoué) — il n'est
  pas embarqué sur le porte-avions, contrairement au Rafale M, au Hawkeye ou au
  Caïman.
