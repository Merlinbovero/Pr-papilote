schemaVersion: 1
id: q.eopan.cap-10-01
kind: qcm
theme: appareils-aeronavale
statement: >-
  En catégorie acrobatique (voltige), quels facteurs de charge limites le
  Cap 10 B supporte-t-il, volets rentrés ?
choices:
  - "+6 g / −4,5 g"
  - "+4,4 g / −1,8 g"
  - "+2 g / −2 g"
  - "+9 g / −6 g"
correctChoices: [0]
distractorNotes:
  "1": "Ce sont les facteurs limites en catégorie utilitaire, pas en voltige."
  "3": "Ces valeurs correspondent à un chasseur de combat, pas à un avion-école en bois."
explanation: >-
  Le Cap 10 B est certifié en deux catégories. En catégorie acrobatique, il est
  limité à +6 g / −4,5 g (contre +4,4 / −1,8 en utilitaire) : c'est un vrai
  voltigeur, mais les limites dépendent de la catégorie du vol.
evaluates: [eopan.appareils.cap-10]
