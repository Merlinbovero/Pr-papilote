schemaVersion: 1
id: q.eopan.catapultage-04
kind: vrai-faux
theme: operations-embarquees
statement: >-
  Une fois catapulté, l'avion est propulsé en vol par la seule force de la catapulte.
answer: false
explanation: >-
  Faux. La catapulte donne seulement à l'avion sa vitesse d'envol ; ce sont
  ensuite ses moteurs (à pleine puissance) et ses ailes qui le maintiennent en
  vol.
evaluates: [eopan.procedures.catapultage]
