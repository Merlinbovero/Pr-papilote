statement: >-
  Répondre « je ne sais pas » à une question du jury est éliminatoire.
answer: false
explanation: >-
  Faux. Reconnaître honnêtement une limite — idéalement en expliquant comment
  on chercherait la réponse — vaut mieux qu'inventer. Un pilote doit savoir
  reconnaître ses limites ; le jury le sait.
