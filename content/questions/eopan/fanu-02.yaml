statement: >-
  Quelles sont les trois forces de la dissuasion nucléaire française ?
choices:
  - "FOST (SNLE), FAS (Rafale Air) et FANu (Rafale Marine)"
  - "Armée de Terre, Marine et Armée de l'Air"
  - "FAS, gendarmerie et douanes"
  - "Légion, marine et aviation légère"
correctChoices: [0]
explanation: >-
  La dissuasion repose sur deux composantes (océanique et aéroportée) servies
  par trois forces : la FOST (sous-marins), les FAS (Rafale de l'armée de l'Air)
  et la FANu (Rafale Marine sur porte-avions).
