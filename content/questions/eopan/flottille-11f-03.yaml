statement: >-
  Chaque année, les trois flottilles de chasse embarquent toutes ensemble sur le porte-avions.
answer: false
explanation: >-
  Faux. Les trois flottilles alternent : deux sont tournées vers les
  déploiements du porte-avions tandis que la troisième reste à Landivisiau
  pour transformer les jeunes pilotes sur Rafale Marine.
