statement: >-
  Dans l'aéronautique navale, l'unité équivalente à l'escadron de l'Armée de l'Air s'appelle la flottille.
answer: true
explanation: >-
  Vrai. La flottille est l'unité opérationnelle de l'aéronautique navale —
  l'équivalent de l'escadron dans l'Armée de l'Air et de l'Espace. Un piège de
  vocabulaire classique entre les deux armées.
