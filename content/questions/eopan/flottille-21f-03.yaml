statement: >-
  Les flottilles 21F et 23F partagent le même bâtiment à Lann-Bihoué.
answer: true
explanation: >-
  Vrai. Les deux flottilles de patrouille maritime sont voisines — chacune
  occupe une moitié d'un même bâtiment — et fonctionnent en pôle
  inter-flottilles (moyens mutualisés, alertes partagées).
