statement: >-
  La flottille 4F est une flottille de chasse équipée de Rafale Marine.
answer: false
explanation: >-
  Faux. La 4F est la flottille de guet aérien (E-2C Hawkeye) — sa mission est la
  détection et la coordination, pas le combat. Les flottilles de chasse sont les
  11F, 12F et 17F.
