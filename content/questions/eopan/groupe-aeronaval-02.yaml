kind: vrai-faux
theme: groupe-aeronaval
statement: >-
  Le porte-avions Charles de Gaulle se déploie généralement seul, sans escorte.
answer: false
explanation: >-
  Faux. Un porte-avions est une cible de très grande valeur : il ne navigue
  jamais seul. Il est toujours le cœur d'un groupe aéronaval qui le protège dans
  les trois dimensions (air, surface, sous la mer).
