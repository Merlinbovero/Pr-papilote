statement: >-
  Le Charles de Gaulle est le premier navire de surface français à propulsion nucléaire.
answer: true
explanation: >-
  Vrai. Admis au service actif en 2001, le Charles de Gaulle est le premier
  navire de surface français à propulsion nucléaire — mais pas le premier
  porte-avions français (le Béarn, 1927).
