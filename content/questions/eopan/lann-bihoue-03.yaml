statement: >-
  Les avions de la BAN de Lann-Bihoué embarquent en permanence sur le porte-avions.
answer: false
explanation: >-
  Faux. Les appareils de Lann-Bihoué (Hawkeye, Atlantique 2, Falcon 50M) opèrent
  principalement depuis la terre. Seul le Hawkeye embarque ponctuellement sur le
  porte-avions lors des déploiements.
