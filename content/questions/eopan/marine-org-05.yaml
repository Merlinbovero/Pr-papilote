statement: >-
  Le chef d'état-major de la Marine (CEMM) commande directement les opérations militaires.
answer: false
explanation: >-
  Faux. Le CEMM prépare une marine prête au combat et la met à disposition du
  chef d'état-major des armées (CEMA), qui, lui, commande l'emploi des forces en
  opérations.
