statement: >-
  Au moins un SNLE est en permanence à la mer.
answer: true
explanation: >-
  Vrai. La crédibilité de la dissuasion océanique repose sur la présence
  permanente d'au moins un sous-marin nucléaire lanceur d'engins à la mer,
  invisible et prêt.
