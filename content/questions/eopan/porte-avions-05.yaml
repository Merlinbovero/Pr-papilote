statement: >-
  La France possède deux porte-avions en service, basés à Toulon et à Brest.
answer: false
explanation: >-
  Faux. La France ne possède qu'un seul porte-avions en service, le Charles de
  Gaulle, basé à Toulon. C'est l'unique porte-avions français depuis le retrait
  du Foch.
