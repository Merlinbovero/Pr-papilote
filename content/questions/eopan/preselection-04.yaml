statement: >-
  Que se passe-t-il pour les élèves retenus à l'issue de la présélection ?
choices:
  - "Ils sont orientés vers une filière (chasse, patrouille maritime, hélicoptères)"
  - "Ils choisissent librement leur filière"
  - "Ils partent directement en flottille opérationnelle"
  - "Ils repassent le concours d'entrée"
correctChoices: [0]
explanation: >-
  L'orientation se fait après la présélection, selon les résultats, les
  aptitudes et les besoins de la Marine — puis commencent les écoles de
  formation proprement dites.
