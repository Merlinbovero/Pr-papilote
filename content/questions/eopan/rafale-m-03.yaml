statement: >-
  Il existe une version biplace embarquée du Rafale dans la Marine nationale.
answer: false
explanation: >-
  Faux. Tous les Rafale de la Marine sont des monoplaces (Rafale M). La version
  biplace (Rafale B) n'existe que dans l'Armée de l'Air et de l'Espace.
