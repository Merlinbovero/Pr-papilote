statement: >-
  Aux Malouines en 1982, ce sont des Super-Étendard français qui ont tiré des Exocet.
answer: false
explanation: >-
  Faux. Les Super-Étendard engagés aux Malouines appartenaient à la marine
  argentine. Leurs tirs d'Exocet AM39 ont marqué l'histoire navale — mais la
  France n'était pas belligérante.
