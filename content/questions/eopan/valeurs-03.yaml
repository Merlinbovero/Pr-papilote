statement: >-
  Dans la culture de la Marine, l'esprit d'équipage est une valeur secondaire.
answer: false
explanation: >-
  Faux. L'esprit d'équipage — cohésion, solidarité, don de soi — est au cœur de
  la culture Marine : « être marin, c'est faire partie d'un équipage ».
