statement: >-
  L'A400M est un avion de combat armé de missiles.
answer: false
explanation: >-
  Faux. L'A400M est un avion de transport militaire — il n'est pas armé, mais il
  est essentiel à la projection des forces (transport, largage, ravitaillement en
  vol, évacuation sanitaire).
