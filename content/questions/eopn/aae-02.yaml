statement: >-
  Quelle est la mission première de l'Armée de l'air et de l'Espace ?
choices:
  - Surveiller et protéger l'espace aérien français
  - Défendre les côtes depuis la mer
  - Assurer la sécurité routière
  - Former les marins
correctChoices: [0]
explanation: >-
  La mission première de l'AAE est de surveiller et protéger l'espace aérien
  français (posture permanente de sûreté aérienne), en plus de la dissuasion, de
  la projection et des missions spatiales.
