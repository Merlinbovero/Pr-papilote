  Pour un jeune pilote breveté à Cognac et affecté sur Rafale, la première étape est l'ETR 3/4 « Aquitaine » à Saint-Dizier.
answer: true
explanation: >-
  Vrai. La transformation opérationnelle Rafale (~5 mois) se fait à l'ETR 3/4
  « Aquitaine » de la BA 113 — souvent la première affectation du jeune
  chasseur avant son escadron.
