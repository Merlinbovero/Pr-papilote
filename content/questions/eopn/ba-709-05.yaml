statement: >-
  La vocation d'école de la base de Cognac remonte aux années 1960.
answer: true
explanation: >-
  Vrai. Le terrain date de 1938, et la base devient BA 709 en 1961 en
  accueillant une école de pilotage élémentaire venue de Marrakech — la
  vocation école ne l'a plus quittée.
