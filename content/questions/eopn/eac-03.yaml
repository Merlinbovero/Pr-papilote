statement: >-
  L'École de l'aviation de chasse a été créée en 1943.
answer: true
explanation: >-
  Vrai. Créée en 1943 au sein des forces françaises reconstituées en Afrique
  du Nord, l'EAC a fêté ses 80 ans en 2023. Elle porte le nom de Christian
  Martell, as des Forces aériennes françaises libres.
