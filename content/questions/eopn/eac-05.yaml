explanation: >-
  Les PC-21 de Cognac sont mis en œuvre par les escadrons d'instruction en vol
  1/13 « Artois » et 2/12 « Picardie », héritiers de traditions de chasse.
  L'ETR « Aquitaine » et l'EC « Champagne » assurent, eux, la transformation.
