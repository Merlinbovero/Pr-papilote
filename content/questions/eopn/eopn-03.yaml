kind: vrai-faux
theme: concours-eopn
statement: >-
  L'EOPN recrute uniquement des pilotes.
answer: false
explanation: >-
  Faux. L'EOPN recrute l'ensemble du personnel navigant : les pilotes (chasse,
  transport, hélicoptère) mais aussi les navigateurs officiers systèmes d'armes
  (NOSA).
