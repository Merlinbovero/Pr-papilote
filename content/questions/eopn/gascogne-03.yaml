statement: >-
  L'escadron 1/91 « Gascogne » et l'escadron 1/4 « Gascogne » sont deux unités différentes.
answer: false
explanation: >-
  Faux. C'est le même escadron : le 1/91 « Gascogne » a été renuméroté 1/4 en
  2016 lors de la recréation de la 4e escadre de chasse. Les numéros changent,
  les traditions continuent.
