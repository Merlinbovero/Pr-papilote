statement: >-
  La mission du « Gascogne » étant de ne jamais tirer son missile, l'escadron s'entraîne peu.
answer: false
explanation: >-
  Faux. La crédibilité de la dissuasion repose sur un entraînement permanent
  et évalué (exercices Poker). Le paradoxe assumé : s'entraîner sans relâche à
  une mission dont la réussite est de n'être jamais exécutée.
