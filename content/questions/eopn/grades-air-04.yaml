kind: vrai-faux
theme: grades-air
statement: >-
  Les grades de sous-officiers de l'armée de l'Air sont identiques à ceux de l'armée de Terre.
answer: true
explanation: >-
  Vrai. Sergent, sergent-chef, adjudant, adjudant-chef et major — l'échelle
  des sous-officiers est la même dans l'Air et la Terre. La Marine, elle,
  utilise des appellations différentes.
