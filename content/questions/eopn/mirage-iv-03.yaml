statement: >-
  Le Mirage IV a été largement exporté, notamment en Australie et en Israël.
answer: false
explanation: >-
  Malgré l'intérêt de l'Australie, d'Israël et de la Grande-Bretagne, le
  Mirage IV ne fut jamais exporté — on ne vend pas le vecteur de sa
  dissuasion nationale.
