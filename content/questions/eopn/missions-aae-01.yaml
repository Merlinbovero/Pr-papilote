statement: >-
  Quelles sont les trois fonctions stratégiques de l'armée de l'Air et de l'Espace ?
choices:
  - Protéger, dissuader, intervenir
  - Explorer, transporter, commercer
  - Observer, bombarder, occuper
  - Former, réparer, ravitailler
correctChoices: [0]
explanation: >-
  L'AAE articule son action autour de trois fonctions stratégiques : protéger
  (PPS-A, police du ciel), dissuader (FAS) et intervenir (projection de
  puissance) — auxquelles s'ajoute depuis 2020 la dimension spatiale.
