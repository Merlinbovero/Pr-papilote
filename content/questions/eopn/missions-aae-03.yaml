statement: >-
  Les Forces aériennes stratégiques (FAS) sont, avec la FOST, un pilier de la dissuasion nucléaire française.
answer: true
explanation: >-
  Vrai. Les FAS (Rafale + ASMP-A + ravitailleurs) portent la composante
  aéroportée de la dissuasion, aux côtés de la FOST (SNLE) et de la FANu de
  la Marine.
