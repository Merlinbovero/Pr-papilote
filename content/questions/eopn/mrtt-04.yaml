statement: >-
  Le MRTT Phénix peut ravitailler deux chasseurs simultanément.
answer: true
explanation: >-
  Avec 110 tonnes de carburant et ses points de ravitaillement multiples
  (perche rigide et nacelles souples), le Phénix sert deux chasseurs à la
  fois — français ou alliés.
