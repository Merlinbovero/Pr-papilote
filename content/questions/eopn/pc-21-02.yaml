id: q.eopn.pc-21-02
kind: vrai-faux
theme: formation-chasse
statement: >-
  Le PC-21 est un avion à réaction.
answer: false
explanation: >-
  Faux. Le PC-21 est un turbopropulseur (PT6A-68B de 1 600 ch, hélice à cinq
  pales). C'est son avionique — qui simule radar, armements et liaisons d'un
  avion d'armes — qui prépare au chasseur, pas sa motorisation.
