statement: >-
  Le PC-21 (Cognac) et le PC-7 MKX (programme Mentor 2) sont le même avion pour la même étape de formation.
answer: false
explanation: >-
  Faux. Le PC-21 assure la spécialisation chasse à Cognac depuis 2018 ; le
  PC-7 MKX (marché Mentor 2 notifié fin 2024) est destiné à la formation
  initiale à Salon-de-Provence — deux Pilatus, deux étapes différentes du
  cursus.
