statement: >-
  Quel démonstrateur a validé la formule du Rafale avant le lancement du
  programme ?
choices:
  - "Le Rafale A (ACX), premier vol le 4 juillet 1986"
  - "Le Mirage 4000"
  - "Le Mirage G8 à géométrie variable"
  - "Le Super Mirage ACF"
correctChoices: [0]
explanation: >-
  L'avion expérimental ACX, baptisé Rafale A, vole le 4 juillet 1986 et
  valide en 867 vols les composites, les commandes de vol numériques et même
  l'aptitude à l'embarquement — le lancement industriel suit en janvier 1988.
