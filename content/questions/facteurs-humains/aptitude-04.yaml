statement: >-
  Quelles sont les trois consultations spécialisées de la visite initiale
  en CEMPN ?
choices:
  - "Médecine interne, ORL, ophtalmologie"
  - "Cardiologie, dermatologie, dentaire"
  - "Psychiatrie, radiologie, chirurgie"
  - "Médecine du sport, nutrition, kinésithérapie"
correctChoices: [0]
explanation: >-
  Aux examens (sang, urines, ECG, biométrie, audiogramme, tests visuels)
  s'ajoutent trois consultations distinctes — médecine interne, ORL et
  ophtalmologie : la vue et l'audition concentrent les exigences pilote.
