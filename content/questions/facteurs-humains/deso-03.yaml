statement: >-
  Au décollage, une forte accélération peut être ressentie comme un cabré (nez
  qui monte).
answer: true
explanation: >-
  C'est l'illusion d'accélération : l'oreille interne interprète l'accélération
  comme une assiette cabrée. Piquer par réflexe serait dangereux près du sol.
