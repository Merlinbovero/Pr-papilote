id: q.instruments.alt-04
kind: qcm
theme: altimetre
statement: >-
  À quoi sert la fenêtre de Kollsman sur un altimètre ?
choices:
  - "À afficher le calage (la pression de référence)"
  - "À régler l'heure"
  - "À mesurer la vitesse"
  - "À indiquer le cap"
correctChoices: [0]
explanation: >-
  La fenêtre de Kollsman affiche la pression de référence choisie (QNH, QFE ou
  1013 hPa) : c'est le calage à partir duquel l'altimètre compte.
