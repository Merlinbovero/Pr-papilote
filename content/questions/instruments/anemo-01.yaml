statement: >-
  Que mesure l'anémomètre (badin) ?
choices:
  - "La vitesse de l'avion par rapport à l'air"
  - "L'altitude de l'avion"
  - "La vitesse par rapport au sol, directement"
  - "La température extérieure"
correctChoices: [0]
explanation: >-
  L'anémomètre mesure la vitesse par rapport à l'air (la vitesse indiquée, Vi/IAS)
  à partir de la pression dynamique fournie par la chaîne Pitot-statique.
