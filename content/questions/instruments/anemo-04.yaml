statement: >-
  Que représente le trait rouge sur le cadran du badin ?
choices:
  - "La vitesse à ne jamais dépasser (VNE)"
  - "La vitesse de décrochage"
  - "La plage d'utilisation des volets"
  - "La vitesse de croisière recommandée"
