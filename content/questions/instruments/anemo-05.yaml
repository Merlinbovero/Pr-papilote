statement: >-
  En altitude, la vitesse propre est supérieure à la vitesse indiquée.
answer: true
explanation: >-
  La densité de l'air diminuant avec l'altitude, la vitesse propre (réelle dans
  l'air) devient supérieure à la vitesse indiquée lue au badin.
