id: q.instruments.compas-05
kind: qcm
theme: compas-conservateur
statement: >-
  Pourquoi le compas et le conservateur de cap sont-ils complémentaires ?
choices:
  - "Le compas sert de référence stable dans la durée, le conservateur d'une lecture stable en manœuvre"
  - "Ils indiquent tous deux l'altitude"
  - "L'un mesure la vitesse, l'autre le cap"
  - "Ils ne servent qu'au sol"
correctChoices: [0]
explanation: >-
  Le compas donne la référence (nord magnétique) mais oscille en manœuvre ; le
  conservateur reste stable mais dérive. On recale le conservateur sur le compas.
evaluates: [fondamentaux.instruments.compas-et-conservateur]
difficulty: 3
competencies: [connaissances-aeronautiques]
concours: [eopan, eopn, alat]
status: publie
