statement: >-
  Tirer sur le manche agit sur la gouverne de profondeur et tend à faire monter
  le nez de l'avion.
answer: true
explanation: >-
  Le manche commande la profondeur : le tirer braque la gouverne de profondeur
  de façon à lever le nez (tangage à cabrer) ; le pousser abaisse le nez.
