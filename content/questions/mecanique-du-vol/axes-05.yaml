statement: >-
  La gouverne de direction sert à faire tourner l'avion, exactement comme le
  volant d'une voiture.
answer: false
explanation: >-
  La gouverne de direction contrôle le lacet (le pivotement du nez à plat) et
  sert surtout à garder un vol symétrique. Un virage s'amorce d'abord en
  inclinant l'avion aux ailerons (roulis), pas au palonnier.
