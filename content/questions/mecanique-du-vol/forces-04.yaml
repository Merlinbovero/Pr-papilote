theme: quatre-forces
statement: >-
  Un avion en palier à vitesse constante est en équilibre, même s'il avance vite.
answer: true
explanation: >-
  Équilibre ne signifie pas immobilité : la résultante des forces est nulle,
  l'avion avance à vitesse constante sans accélérer ni changer d'altitude.
