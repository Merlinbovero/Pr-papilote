statement: >-
  En cas de panne moteur, un hélicoptère tombe verticalement sans recours.
answer: false
explanation: >-
  L'autorotation — le rotor entraîné en moulinet par le flux d'air de la
  descente — permet un atterrissage contrôlé ; c'est l'équivalent du vol
  plané, entraîné en permanence à l'école et en unité.
