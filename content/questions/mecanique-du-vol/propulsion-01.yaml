id: q.mecanique-du-vol.propulsion-01
kind: qcm
theme: propulsion
statement: >-
  Sur quel principe physique repose toute propulsion aéronautique ?
choices:
  - "L'action-réaction (3e loi de Newton) — accélérer de l'air vers l'arrière"
  - "La poussée d'Archimède"
  - "L'effet Venturi"
  - "La force centrifuge"
correctChoices: [0]
explanation: >-
  Hélice ou réacteur, le principe est le même — accélérer une masse d'air
  vers l'arrière crée une force égale et opposée vers l'avant.
evaluates: [fondamentaux.mecanique-du-vol.la-propulsion]
difficulty: 1
