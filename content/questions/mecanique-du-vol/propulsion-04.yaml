statement: >-
  La postcombustion s'utilise en croisière pour économiser du carburant.
answer: false
explanation: >-
  C'est l'inverse — la postcombustion offre un surcroît brutal de poussée au
  prix d'une consommation énorme : on l'utilise par brefs instants
  (décollage, combat), jamais en croisière.
