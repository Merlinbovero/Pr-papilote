id: q.mecanique-du-vol.vrille-05
kind: vrai-faux
theme: decrochage-vrille
statement: >-
  La meilleure protection contre la vrille est de ne pas décrocher, surtout en
  vol dissymétrique à basse vitesse.
answer: true
explanation: >-
  Une vrille naît presque toujours d'un décrochage en vol dissymétrique à basse
  vitesse. La prévention — voler coordonné, surveiller vitesse et incidence,
  éviter les virages lents à basse hauteur — est la parade la plus sûre.
