theme: atmosphere-standard
statement: >-
  L'atmosphère standard (ISA) décrit la météo réelle du jour.
answer: false
explanation: >-
  L'ISA est un modèle de référence, pas la météo réelle : l'atmosphère du jour
  s'en écarte presque toujours (on parle par exemple d'ISA+10 ou ISA−5).
