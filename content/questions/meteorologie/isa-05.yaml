schemaVersion: 1
id: q.meteorologie.isa-05
kind: qcm
theme: atmosphere-standard
statement: >-
  À quoi sert principalement l'atmosphère standard (ISA) ?
choices:
  - "De référence commune pour les performances et l'altimétrie"
  - "À prévoir la pluie"
  - "À mesurer la force du vent"
  - "À calculer la consommation de carburant"
correctChoices: [0]
explanation: >-
  L'ISA est une référence partagée : les manuels de performances y sont établis,
  l'altimètre se règle et se lit par rapport à elle, et elle permet de comparer
  deux avions ou deux jours dans les mêmes conditions.
evaluates: [fondamentaux.meteorologie.atmosphere-standard]
difficulty: 2
competencies: [meteorologie]
concours: [eopan, eopn, alat]
status: publie
