id: q.meteorologie.nuages-01
kind: qcm
theme: les-nuages
statement: >-
  De quoi un nuage est-il fait ?
choices:
  - "De gouttelettes d'eau ou de cristaux de glace"
  - "De vapeur d'eau invisible"
  - "De poussières sèches"
  - "D'air simplement réchauffé"
correctChoices: [0]
explanation: >-
  Un nuage est fait de minuscules gouttelettes d'eau ou de cristaux de glace,
  issus de la condensation de la vapeur d'eau. La vapeur, elle, est invisible.
