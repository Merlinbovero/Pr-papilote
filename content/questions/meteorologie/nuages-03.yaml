id: q.meteorologie.nuages-03
kind: association
theme: les-nuages
statement: >-
  Associez chaque préfixe de nuage à sa signification.
pairs:
  - left: "cirro-"
    right: "Étage supérieur (cristaux de glace)"
  - left: "alto-"
    right: "Étage moyen"
  - left: "nimbo- / -nimbus"
    right: "Nuage porteur de pluie"
explanation: >-
  Le préfixe cirro- désigne l'étage supérieur (cristaux de glace), alto- l'étage
  moyen, et nimbo- ou -nimbus un nuage porteur de pluie. Cumulo- signifie « en amas ».
