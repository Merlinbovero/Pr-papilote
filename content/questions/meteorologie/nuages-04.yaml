statement: >-
  Les nuages cumuliformes sont bourgeonnants et signalent un air instable.
answer: true
explanation: >-
  Les nuages cumuliformes, à développement vertical et d'aspect bourgeonnant,
  naissent de la convection et signalent un air instable. Les stratiformes,
  étalés en couches, signalent au contraire un air stable.
