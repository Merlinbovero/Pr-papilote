statement: >-
  Le cumulonimbus est le nuage de l'orage.
answer: true
explanation: >-
  Le cumulonimbus concentre tous les dangers — orage, grêle, givrage,
  turbulence sévère, rafales : le seul nuage qu'un pilote évite
  systématiquement.
