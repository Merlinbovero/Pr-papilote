id: q.meteorologie.nuages-07
kind: qcm
theme: nuages
statement: >-
  Quels nuages annoncent l'approche d'un front chaud, très haut dans le
  ciel ?
choices:
  - "Les cirrus"
  - "Les stratus"
  - "Les cumulonimbus"
  - "Les brouillards"
correctChoices: [0]
explanation: >-
  Les cirrus, filaments de glace vers 10 000 m, sont les éclaireurs du
  front chaud — le voile s'épaissira ensuite (cirrostratus, altostratus)
  jusqu'à la pluie du nimbostratus.
