statement: >-
  Les nuages stratiformes donnent des averses brèves et violentes.
answer: false
explanation: >-
  C'est l'inverse — les nuages en COUCHES (stratiformes) donnent des
  précipitations continues et modérées ; les averses brèves et violentes
  viennent des nuages à développement vertical (cumuliformes).
