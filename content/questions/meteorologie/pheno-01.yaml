theme: phenomenes-dangereux
statement: >-
  Quel nuage concentre à lui seul la plupart des dangers météorologiques du vol ?
choices:
  - "Le cumulonimbus"
  - "Le cirrus"
  - "Le stratus"
  - "L'altocumulus"
correctChoices: [0]
explanation: >-
  Le cumulonimbus réunit turbulence sévère, givrage, grêle, foudre, cisaillement
  et visibilité réduite. C'est le nuage d'orage, à contourner largement.
