statement: >-
  On peut traverser un cumulonimbus sans danger à condition de voler assez vite.
answer: false
explanation: >-
  On ne traverse jamais un cumulonimbus : il concentre turbulence violente,
  givrage, grêle, foudre et cisaillement. On le contourne toujours largement.
