theme: temperature-humidite
statement: >-
  Qu'est-ce que le point de rosée ?
choices:
  - "La température à laquelle l'air se sature et la vapeur commence à se condenser"
  - "La température maximale de la journée"
  - "L'altitude de la base des nuages"
  - "La pression standard au sol"
correctChoices: [0]
explanation: >-
  Le point de rosée est la température à laquelle un air refroidi atteint la
  saturation (100 %) : en dessous, l'excès de vapeur se condense en gouttelettes.
