statement: >-
  Un faible écart entre la température et le point de rosée indique un air proche
  de la saturation, propice au brouillard.
answer: true
explanation: >-
  Plus l'écart entre la température et le point de rosée est petit, plus l'air est
  proche de la saturation : brouillard et nuages bas deviennent probables.
