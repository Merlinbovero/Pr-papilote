kind: vrai-faux
theme: temperature-humidite
statement: >-
  Plus l'air est chaud, plus il peut contenir de vapeur d'eau.
answer: true
explanation: >-
  La capacité de l'air en vapeur d'eau croît avec la température — d'où la
  condensation (rosée, brouillard, nuages) quand l'air se refroidit jusqu'au
  point de rosée.
