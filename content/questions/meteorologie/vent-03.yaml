statement: >-
  Un vent de face augmente la vitesse de l'avion par rapport au sol.
answer: false
explanation: >-
  Un vent de face réduit la vitesse sol (il freine la progression sur le sol).
  C'est le vent arrière qui, lui, augmente la vitesse sol.
