statement: >-
  Qu'est-ce que le cap d'un avion ?
choices:
  - "La direction vers laquelle pointe le nez de l'avion"
  - "La trajectoire réellement suivie au sol"
  - "La vitesse de l'avion"
  - "L'altitude de l'avion"
correctChoices: [0]
explanation: >-
  Le cap est la direction vers laquelle pointe le nez de l'avion, en degrés
  (0 à 360°) dans le sens horaire à partir du nord.
