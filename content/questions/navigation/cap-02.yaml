theme: cap-route-derive
statement: >-
  Qu'est-ce que la route d'un avion ?
choices:
  - "La trajectoire réellement suivie par rapport au sol"
  - "La direction du nez de l'avion"
  - "La vitesse propre de l'avion"
  - "Le cap corrigé de la déclinaison"
correctChoices: [0]
explanation: >-
  La route est la trace au sol de l'avion : le chemin qu'il parcourt réellement
  au-dessus de la Terre, qui diffère du cap dès qu'il y a du vent.
