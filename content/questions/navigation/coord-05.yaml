theme: terre-coordonnees
statement: >-
  Une minute d'arc de latitude vaut environ un mille marin (1852 m).
answer: true
explanation: >-
  Par convention, une minute d'arc de latitude, mesurée le long d'un méridien,
  correspond à un mille marin, soit 1852 m — l'unité de distance de la navigation.
