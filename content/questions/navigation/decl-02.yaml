statement: >-
  La déclinaison magnétique dépend du lieu et évolue lentement dans le temps.
answer: true
explanation: >-
  La déclinaison varie d'un endroit à l'autre (les cartes la publient par des
  lignes isogones) et change lentement au fil des années, car le pôle Nord
  magnétique se déplace.
