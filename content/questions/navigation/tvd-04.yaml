id: q.navigation.tvd-04
kind: vrai-faux
theme: temps-vitesse-distance
statement: >-
  Pour calculer un temps de trajet, on utilise la vitesse sol, pas la vitesse
  propre.
answer: true
explanation: >-
  La progression réelle au-dessus du sol dépend de la vitesse sol, qui tient
  compte du vent. Un vent de face allonge le temps de vol, un vent arrière le raccourcit.
