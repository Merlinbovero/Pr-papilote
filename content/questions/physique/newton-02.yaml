kind: vrai-faux
theme: forces
statement: >-
  En vol stabilisé (palier à vitesse constante), la résultante des forces qui
  s'exercent sur l'avion est nulle.
answer: true
explanation: >-
  Vol stabilisé = mouvement rectiligne uniforme. D'après la première loi de
  Newton, cela équivaut à une résultante des forces nulle : les quatre forces
  s'équilibrent deux à deux.
