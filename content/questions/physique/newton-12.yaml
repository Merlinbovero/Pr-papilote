statement: >-
  Une résultante de 2000 N s'exerce sur un corps de masse 1000 kg. Quelle est
  son accélération ?
choices:
  - "2 m/s²"
  - "0,5 m/s²"
  - "2000 m/s²"
  - "9,81 m/s²"
correctChoices: [0]
explanation: >-
  D'après ΣF = m·a, on a a = ΣF / m = 2000 / 1000 = 2 m/s².
