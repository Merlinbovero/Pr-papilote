theme: forces
statement: >-
  Soumis à une même résultante des forces, un corps plus lourd subit une
  accélération plus faible.
answer: true
explanation: >-
  Vrai : d'après a = ΣF / m, pour une même force plus la masse est grande plus
  l'accélération est petite. C'est la traduction de l'inertie.
