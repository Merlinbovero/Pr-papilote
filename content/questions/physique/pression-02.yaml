id: q.physique.pression-02
kind: qcm
theme: force-pression
statement: >-
  Comment définit-on la pression ?
choices:
  - "Une force divisée par une surface (p = F / S)"
  - "Une force multipliée par une surface"
  - "Une masse divisée par un volume"
  - "Une force divisée par un temps"
correctChoices: [0]
explanation: >-
  La pression est une force rapportée à une surface : p = F / S. Son unité SI
  est le pascal (Pa), égal à un newton par mètre carré.
