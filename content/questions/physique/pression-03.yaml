statement: >-
  La masse et le poids d'un corps désignent la même chose.
answer: false
explanation: >-
  La masse (en kilogrammes) est la quantité de matière ; le poids (en newtons)
  est une force. Sur la Lune, la masse est identique mais le poids plus faible.
