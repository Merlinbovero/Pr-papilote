id: q.psychotechnique.attention-01
kind: qcm
theme: attention-multitache
statement: >-
  Que mesure réellement un test de barrage ?
choices:
  - La vigilance soutenue — tenir précision et cadence jusqu'à la dernière ligne
  - La force physique
  - La créativité
  - La culture générale
correctChoices: [0]
explanation: >-
  Sur des centaines de signes quasi identiques, le barrage mesure la
  vigilance qui dure : la performance des premières lignes ne vaut rien si
  elle s'effondre à la vingtième.
evaluates: [psychotechnique.exercices.l-attention-et-le-multitache]
difficulty: 1
competencies: [attention-concentration]
