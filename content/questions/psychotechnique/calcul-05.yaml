id: q.psychotechnique.calcul-05
kind: qcm
theme: calcul-mental
statement: >-
  Un prix augmente de 10 % puis baisse de 10 %. Que vaut-il par rapport au prix initial ?
choices:
  - 99 % du prix initial
  - 100 % du prix initial
  - 101 % du prix initial
  - 90 % du prix initial
correctChoices: [0]
explanation: >-
  Les évolutions successives se multiplient : ×1,1 puis ×0,9 = ×0,99, soit
  99 % du prix initial. Les pourcentages successifs ne s'additionnent pas.
evaluates: [psychotechnique.exercices.le-calcul-mental]
difficulty: 3
competencies: [calcul-mental, raisonnement-logique]
concours: [eopan, eopn, alat]
status: publie
