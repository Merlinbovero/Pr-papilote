schemaVersion: 1
id: q.psychotechnique.dominos-04
kind: qcm
theme: dominos
statement: >-
  Soit la suite (haut|bas) : 2|5, 4|3, 6|1, ?|?. Quel est le dernier domino ?
choices:
  - 1|6
  - 8|0
  - 0|0
  - 2|5
correctChoices: [0]
explanation: >-
  Haut : 2, 4, 6 → +2 → 8, soit 1 après le cycle (6 + 2 = 1). Bas : 5, 3, 1 →
  −2 → −1, soit 6 (0 − 1 = 6 sur le cycle). Réponse 1|6 — deux progressions
  indépendantes, toutes deux cycliques.
evaluates: [psychotechnique.exercices.les-dominos]
difficulty: 3
competencies: [raisonnement-logique]
concours: [eopan, eopn, alat]
status: publie
