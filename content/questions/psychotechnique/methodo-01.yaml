id: q.psychotechnique.methodo-01
kind: qcm
theme: methodologie-psychotechnique
statement: >-
  Que mesurent avant tout les tests psychotechniques des sélections de pilote ?
choices:
  - Des aptitudes (logique, calcul, spatial, mémoire, attention)
  - Des connaissances scolaires à réviser
  - La culture aéronautique du candidat
  - La condition physique
correctChoices: [0]
explanation: >-
  Les tests psychotechniques mesurent des aptitudes, pas des connaissances :
  on s'y entraîne comme à un sport. Elles prédisent la capacité à apprendre
  vite et à traiter l'information sous pression.
evaluates: [psychotechnique.methodologie.reussir-les-tests-psychotechniques]
