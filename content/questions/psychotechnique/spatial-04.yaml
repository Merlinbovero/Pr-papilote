id: q.psychotechnique.spatial-04
kind: vrai-faux
theme: vision-spatiale
statement: >-
  Dans un problème d'orientation « vu de dessus », la gauche du pilote est toujours la gauche du lecteur.
answer: false
explanation: >-
  Faux. La gauche et la droite sont celles du mobile : si le mobile descend
  vers le bas de la page, sa gauche est la droite du lecteur. Il faut
  s'imaginer DANS le mobile.
