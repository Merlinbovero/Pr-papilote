schemaVersion: 1
id: q.psychotechnique.spatial-05
kind: qcm
theme: vision-spatiale
statement: >-
  Quelle méthode fiabilise la comparaison entre un modèle et une figure tournée ?
choices:
  - Choisir un repère asymétrique et vérifier le sens de parcours du contour
  - Compter les pixels de chaque figure
  - Comparer les figures d'un seul coup d'œil global
  - Mesurer les figures avec une règle
correctChoices: [0]
explanation: >-
  S'accrocher à un détail asymétrique du modèle et noter le sens de parcours
  (horaire/antihoraire) : une rotation conserve ce sens, un miroir l'inverse.
  Le coup d'œil global se fait piéger par les miroirs.
evaluates: [psychotechnique.exercices.la-vision-spatiale]
difficulty: 2
competencies: [vision-spatiale]
concours: [eopan, eopn, alat]
status: publie
