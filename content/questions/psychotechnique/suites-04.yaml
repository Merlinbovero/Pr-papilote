statement: >-
  Quel est le terme suivant de la suite 3, 6, 12, 24, … ?
answerValue: 48
tolerance: 0
explanation: >-
  Chaque terme est le double du précédent (×2) : c'est une suite géométrique.
  Le terme suivant est 24 × 2 = 48.
