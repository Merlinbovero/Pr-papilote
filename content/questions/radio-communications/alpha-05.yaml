statement: >-
  Comment prononce-t-on le chiffre 9 à la radio ?
choices:
  - "« niner »"
  - "« nine »"
  - "« neuf »"
  - "« nein »"
correctChoices: [0]
explanation: >-
  Le chiffre 9 se prononce « niner », pour éviter la confusion avec l'allemand
  « nein » (qui signifie « non »).
