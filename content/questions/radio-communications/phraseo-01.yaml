schemaVersion: 1
id: q.radio-communications.phraseo-01
kind: ordre
theme: phraseologie
statement: >-
  Remettez dans l'ordre les éléments d'un premier message radio.
items:
  - "Qui j'appelle (la station)"
  - "Qui je suis (mon indicatif)"
  - "Où je suis / mes intentions"
  - "Ce que je demande"
explanation: >-
  La structure normalisée : la station appelée, puis son propre indicatif,
  puis sa position et ses intentions, puis la demande. Toujours dans cet
  ordre.
evaluates: [fondamentaux.radio-communications.la-phraseologie-de-base]
difficulty: 1
competencies: [connaissances-aeronautiques]
concours: [eopan, eopn, alat]
status: publie
