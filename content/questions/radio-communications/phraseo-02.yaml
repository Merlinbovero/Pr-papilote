id: q.radio-communications.phraseo-02
kind: qcm
theme: phraseologie
statement: >-
  Que signifie « wilco » à la radio ?
choices:
  - Message compris, je vais exécuter
  - Message reçu (sans engagement)
  - Oui
  - Attendez
correctChoices: [0]
explanation: >-
  Wilco (will comply) = compris ET j'exécuterai. Roger = seulement reçu ;
  affirme = oui ; stand-by = attendez. Chacun a un sens précis.
