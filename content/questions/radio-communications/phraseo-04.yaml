id: q.radio-communications.phraseo-04
kind: qcm
theme: phraseologie
statement: >-
  Quelle est la fréquence internationale de détresse en aéronautique ?
choices:
  - 121,5 MHz
  - 118,0 MHz
  - 112,5 MHz
  - 130,0 MHz
correctChoices: [0]
explanation: >-
  121,5 MHz est la fréquence internationale de détresse, veillée en
  permanence. Un message MAYDAY s'y transmet (ou sur la fréquence en cours)
  et impose le silence radio.
