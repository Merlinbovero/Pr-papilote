schemaVersion: 1
id: q.radio-communications.phraseo-05
kind: qcm
theme: phraseologie
statement: >-
  Quelle est la différence entre « PAN PAN » et « MAYDAY » ?
choices:
  - PAN PAN signale une urgence, MAYDAY une détresse avec danger grave et imminent
  - MAYDAY est la version anglaise de PAN PAN
  - PAN PAN est réservé aux hélicoptères
  - Aucune — les deux sont interchangeables
correctChoices: [0]
explanation: >-
  PAN PAN (×3) = urgence, sécurité dégradée sans danger immédiat. MAYDAY (×3)
  = détresse, danger grave et imminent, assistance immédiate requise et
  silence radio imposé.
evaluates: [fondamentaux.radio-communications.la-phraseologie-de-base]
difficulty: 2
competencies: [connaissances-aeronautiques]
concours: [eopan, eopn, alat]
status: publie
