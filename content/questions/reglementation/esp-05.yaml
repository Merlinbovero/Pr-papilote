statement: >-
  Le vol à vue (VFR) est autorisé dans un espace de classe A.
answer: false
explanation: >-
  Non : la classe A est réservée aux vols aux instruments (IFR). Le vol à vue
  (VFR) n'y est pas admis. Il devient possible à partir de la classe B.
