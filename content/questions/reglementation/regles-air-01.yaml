kind: qcm
theme: regles-de-l-air
statement: >-
  Deux avions se rapprochent face à face. Que doivent-ils faire ?
choices:
  - Chacun s'écarte à droite
  - Chacun s'écarte à gauche
  - Le plus rapide s'écarte
  - Le plus gros a priorité
correctChoices: [0]
explanation: >-
  En face à face, les DEUX aéronefs obliquent à droite — comme sur la route.
  C'est la règle SERA de base du « voir et éviter ».
