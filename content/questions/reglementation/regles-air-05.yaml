statement: >-
  Un avion a priorité sur un planeur en cas de routes convergentes.
answer: false
explanation: >-
  Faux. Les moins manœuvrants ont priorité : ballons, puis planeurs, puis
  dirigeables, puis avions. Un avion s'écarte donc d'un planeur.
