<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .ink { stroke: currentColor; fill: none; stroke-width: 2; }
    .tick { stroke: currentColor; fill: none; stroke-width: 1.5; }
    .accent { stroke: #3b82f6; fill: none; stroke-width: 2; }
    .accent-t { fill: #3b82f6; font-weight: 600; }
  </style>
  <text class="title" x="150" y="24" text-anchor="middle">Convertir une vitesse</text>
  <text x="90" y="44" text-anchor="middle">km/h</text>
  <text x="210" y="44" text-anchor="middle">kt</text>
  <!-- Axes -->
  <line class="ink" x1="90" y1="60" x2="90" y2="220" />
  <line class="ink" x1="210" y1="60" x2="210" y2="220" />
  <!-- Ticks km/h (0..300) et kt (0..162) à la même hauteur -->
  <g>
    <line class="tick" x1="84" y1="220" x2="90" y2="220" /><text x="78" y="224" text-anchor="end">0</text>
    <line class="tick" x1="84" y1="167" x2="90" y2="167" /><text x="78" y="171" text-anchor="end">100</text>
    <line class="tick" x1="84" y1="113" x2="90" y2="113" /><text x="78" y="117" text-anchor="end">200</text>
    <line class="tick" x1="84" y1="60" x2="90" y2="60" /><text x="78" y="64" text-anchor="end">300</text>
    <line class="tick" x1="210" y1="220" x2="216" y2="220" /><text x="222" y="224">0</text>
    <line class="tick" x1="210" y1="167" x2="216" y2="167" /><text x="222" y="171">54</text>
    <line class="tick" x1="210" y1="113" x2="216" y2="113" /><text x="222" y="117">108</text>
    <line class="tick" x1="210" y1="60" x2="216" y2="60" /><text x="222" y="64">162</text>
  </g>
  <!-- Ligne d'égalité : 185 km/h ≈ 100 kt -->
  <line class="accent" x1="90" y1="121" x2="210" y2="121" stroke-dasharray="5 4" />
  <text class="accent-t" x="150" y="115" text-anchor="middle">185 km/h ≈ 100 kt</text>
</svg>
