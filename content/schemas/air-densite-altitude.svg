<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .ink { stroke: currentColor; fill: none; stroke-width: 2; }
    .muted { stroke: #94a3b8; fill: none; stroke-width: 1.5; }
    .accent { stroke: #3b82f6; fill: none; stroke-width: 2; }
    .dot { fill: currentColor; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="180" y="24" text-anchor="middle">La densité diminue avec l'altitude</text>
  <!-- Flèche altitude -->
  <line class="accent" x1="70" y1="225" x2="70" y2="46" marker-end="url(#ac)" />
  <text class="lbl" x="70" y="40" text-anchor="middle">altitude</text>
  <!-- Colonne d'air -->
  <rect class="muted" x="140" y="46" width="120" height="179" stroke-dasharray="5 4" />
  <!-- Molécules : rares en haut, denses en bas -->
  <g class="dot">
    <circle cx="172" cy="66" r="2.5" /><circle cx="230" cy="80" r="2.5" /><circle cx="200" cy="96" r="2.5" />
    <circle cx="156" cy="116" r="2.5" /><circle cx="212" cy="126" r="2.5" /><circle cx="182" cy="140" r="2.5" /><circle cx="240" cy="150" r="2.5" />
    <circle cx="152" cy="170" r="2.5" /><circle cx="182" cy="168" r="2.5" /><circle cx="212" cy="176" r="2.5" /><circle cx="242" cy="172" r="2.5" />
    <circle cx="160" cy="188" r="2.5" /><circle cx="196" cy="190" r="2.5" /><circle cx="226" cy="192" r="2.5" />
    <circle cx="152" cy="206" r="2.5" /><circle cx="182" cy="206" r="2.5" /><circle cx="212" cy="209" r="2.5" /><circle cx="242" cy="206" r="2.5" />
    <circle cx="168" cy="218" r="2.5" /><circle cx="204" cy="219" r="2.5" />
  </g>
  <line class="ink" x1="120" y1="225" x2="280" y2="225" />
  <text class="lbl" x="272" y="70">air raréfié</text>
  <text class="lbl" x="272" y="210">air dense</text>
  <text class="lbl" x="120" y="242">sol</text>
</svg>
