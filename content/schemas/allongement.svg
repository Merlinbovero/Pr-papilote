<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 11px; }
    .accent { fill: #3b82f6; font-size: 11px; }
    .ink { stroke: currentColor; fill: none; stroke-width: 2; }
    .dim { stroke: #3b82f6; fill: none; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="al-s" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
    <marker id="al-e" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="210" y="20" text-anchor="middle">L'allongement de l'aile (vue de dessus)</text>

  <!-- Grand allongement : aile longue et étroite (planeur) -->
  <rect class="ink" x="30" y="70" width="150" height="12" rx="3" fill="currentColor" fill-opacity="0.10" />
  <line class="dim" x1="30" y1="58" x2="180" y2="58" marker-start="url(#al-e)" marker-end="url(#al-s)" />
  <text class="accent" x="105" y="52" text-anchor="middle">grande envergure b</text>
  <text class="lbl" x="105" y="104" text-anchor="middle">grand allongement — planeur</text>
  <text class="lbl" x="105" y="118" text-anchor="middle">peu de traînée induite</text>

  <!-- Petit allongement : aile courte et large (chasseur) -->
  <rect class="ink" x="270" y="150" width="80" height="34" rx="3" fill="currentColor" fill-opacity="0.10" />
  <line class="dim" x1="270" y1="140" x2="350" y2="140" marker-start="url(#al-e)" marker-end="url(#al-s)" />
  <text class="accent" x="310" y="134" text-anchor="middle">envergure b</text>
  <text class="lbl" x="310" y="200" text-anchor="middle">petit allongement — chasseur</text>
  <text class="lbl" x="310" y="214" text-anchor="middle">plus maniable et robuste</text>

  <text class="lbl" x="150" y="200" text-anchor="middle">λ = b² / S</text>
</svg>
