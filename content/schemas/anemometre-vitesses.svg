<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .box { stroke: currentColor; fill: none; stroke-width: 2; }
    .flow { stroke: #3b82f6; fill: none; stroke-width: 2.2; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 11px; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="230" y="26" text-anchor="middle">Les trois vitesses</text>
  <!-- Vi -->
  <rect class="box" x="16" y="78" width="120" height="60" rx="5" />
  <text class="lbl" x="76" y="104" text-anchor="middle">Vitesse indiquée</text>
  <text class="sub" x="76" y="120" text-anchor="middle">Vi / IAS — lue au badin</text>
  <!-- flèche + densité -->
  <line class="flow" x1="140" y1="108" x2="168" y2="108" marker-end="url(#ac)" />
  <text class="accent-t" x="154" y="98" text-anchor="middle">+ densité</text>
  <!-- Vp -->
  <rect class="box" x="170" y="78" width="120" height="60" rx="5" />
  <text class="lbl" x="230" y="104" text-anchor="middle">Vitesse propre</text>
  <text class="sub" x="230" y="120" text-anchor="middle">Vp / TAS — dans l'air</text>
  <!-- flèche + vent -->
  <line class="flow" x1="294" y1="108" x2="322" y2="108" marker-end="url(#ac)" />
  <text class="accent-t" x="308" y="98" text-anchor="middle">+ vent</text>
  <!-- Vs -->
  <rect class="box" x="324" y="78" width="120" height="60" rx="5" />
  <text class="lbl" x="384" y="104" text-anchor="middle">Vitesse sol</text>
  <text class="sub" x="384" y="120" text-anchor="middle">Vs / GS — au sol</text>
  <text class="sub" x="230" y="166" text-anchor="middle">on lit la Vi, on corrige de la densité (Vp), puis du vent (Vs)</text>
</svg>
