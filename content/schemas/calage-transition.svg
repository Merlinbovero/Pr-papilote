<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .plane { stroke: currentColor; fill: none; stroke-width: 2; }
    .ground { stroke: currentColor; fill: none; stroke-width: 2; }
    .axis { stroke: #3b82f6; fill: none; stroke-width: 2; }
    .transition { stroke: #3b82f6; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 12px; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="230" y="24" text-anchor="middle">Altitude de transition</text>
  <!-- Axe altitude -->
  <line class="axis" x1="60" y1="232" x2="60" y2="44" marker-end="url(#ac)" />
  <text class="lbl" x="60" y="38" text-anchor="middle">altitude</text>
  <!-- Sol -->
  <line class="ground" x1="60" y1="232" x2="430" y2="232" />
  <text class="sub" x="430" y="248" text-anchor="end">sol</text>
  <!-- Ligne de transition -->
  <line class="transition" x1="60" y1="132" x2="430" y2="132" />
  <text class="accent-t" x="426" y="124" text-anchor="end">altitude de transition</text>
  <!-- Zone basse : altitudes / QNH -->
  <path class="plane" d="M120,196 C127,192 147,191 159,196 C147,201 127,201 120,196 Z" />
  <path class="plane" d="M125,194 L120,185 L132,194 Z" />
  <text class="lbl" x="210" y="190" text-anchor="start">on vole en ALTITUDES</text>
  <text class="sub" x="210" y="206" text-anchor="start">calage QNH</text>
  <!-- Zone haute : niveaux de vol / 1013 -->
  <path class="plane" d="M120,90 C127,86 147,85 159,90 C147,95 127,95 120,90 Z" />
  <path class="plane" d="M125,88 L120,79 L132,88 Z" />
  <text class="lbl" x="210" y="84" text-anchor="start">on vole en NIVEAUX DE VOL</text>
  <text class="sub" x="210" y="100" text-anchor="start">calage standard 1013 hPa</text>
</svg>
