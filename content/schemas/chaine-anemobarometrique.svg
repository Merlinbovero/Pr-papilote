<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 280" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .box { stroke: currentColor; fill: none; stroke-width: 2; }
    .boxA { stroke: #3b82f6; fill: none; stroke-width: 2; }
    .ps { stroke: #94a3b8; fill: none; stroke-width: 1.8; }
    .pt { stroke: #3b82f6; fill: none; stroke-width: 2.2; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 11px; }
  </style>
  <defs>
    <marker id="am" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8" />
    </marker>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="230" y="24" text-anchor="middle">La chaîne anémobarométrique</text>
  <!-- Sources -->
  <rect class="box" x="24" y="62" width="150" height="46" rx="5" />
  <text class="lbl" x="99" y="84" text-anchor="middle">Tube de Pitot</text>
  <text class="sub" x="99" y="100" text-anchor="middle">pression totale (Pt)</text>
  <rect class="box" x="24" y="168" width="150" height="46" rx="5" />
  <text class="lbl" x="99" y="190" text-anchor="middle">Prise statique</text>
  <text class="sub" x="99" y="206" text-anchor="middle">pression statique (Ps)</text>
  <!-- Instruments -->
  <rect class="box" x="300" y="50" width="140" height="38" rx="5" />
  <text class="lbl" x="370" y="73" text-anchor="middle">Altimètre</text>
  <rect class="box" x="300" y="108" width="140" height="38" rx="5" />
  <text class="lbl" x="370" y="131" text-anchor="middle">Variomètre</text>
  <rect class="boxA" x="300" y="176" width="140" height="46" rx="5" />
  <text class="lbl" x="370" y="199" text-anchor="middle">Anémomètre</text>
  <text class="accent-t" x="370" y="214" text-anchor="middle">Pt − Ps</text>
  <!-- Liaisons statique (Ps) -->
  <path class="ps" d="M174,182 L240,182 L240,69 L300,69" marker-end="url(#am)" />
  <path class="ps" d="M174,190 L228,190 L228,127 L300,127" marker-end="url(#am)" />
  <path class="ps" d="M174,200 L300,200" marker-end="url(#am)" />
  <!-- Liaison totale (Pt) -->
  <path class="pt" d="M174,85 L260,85 L260,190 L300,190" marker-end="url(#ac)" />
  <text class="sub" x="230" y="262" text-anchor="middle">statique → altimètre, variomètre, anémomètre · totale → anémomètre</text>
</svg>
