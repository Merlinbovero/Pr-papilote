<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .cloud { stroke: currentColor; fill: none; stroke-width: 2; }
    .ground { stroke: currentColor; fill: none; stroke-width: 2; }
    .plane { stroke: currentColor; fill: none; stroke-width: 2; }
    .traj { stroke: #94a3b8; fill: none; stroke-width: 1.5; stroke-dasharray: 5 4; }
    .wind { stroke: #3b82f6; fill: none; stroke-width: 2.5; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 12px; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="230" y="24" text-anchor="middle">Le cisaillement — la microrafale</text>
  <!-- Nuage -->
  <path class="cloud" d="M186,64 C176,50 196,40 212,46 C218,32 244,32 250,48 C268,42 282,56 272,68 Z" />
  <!-- Rafale descendante -->
  <line class="wind" x1="230" y1="72" x2="230" y2="168" marker-end="url(#ac)" />
  <text class="accent-t" x="238" y="120" text-anchor="start">rafale descendante</text>
  <!-- Étalement au sol -->
  <line class="wind" x1="222" y1="184" x2="150" y2="184" marker-end="url(#ac)" />
  <line class="wind" x1="238" y1="184" x2="310" y2="184" marker-end="url(#ac)" />
  <!-- Sol / piste -->
  <line class="ground" x1="40" y1="210" x2="420" y2="210" />
  <line class="ground" x1="60" y1="210" x2="150" y2="210" stroke-width="4" />
  <!-- Trajectoire d'approche -->
  <line class="traj" x1="400" y1="96" x2="120" y2="206" />
  <!-- Avion en approche -->
  <path class="plane" d="M300,150 C293,146 273,145 262,150 C273,155 293,155 300,150 Z" />
  <path class="plane" d="M295,148 L300,139 L288,148 Z" />
  <text class="sub" x="230" y="238" text-anchor="middle">vent de face, puis vent arrière — la portance chute près du sol</text>
</svg>
