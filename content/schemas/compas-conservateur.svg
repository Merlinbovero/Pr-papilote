<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 240" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .dial { stroke: currentColor; fill: none; stroke-width: 2; }
    .card { font-size: 13px; font-weight: 700; }
    .idx { fill: #3b82f6; }
    .flow { stroke: #3b82f6; fill: none; stroke-width: 2.5; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 12px; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="230" y="24" text-anchor="middle">Compas et conservateur de cap</text>
  <!-- Compas -->
  <circle class="dial" cx="108" cy="118" r="60" />
  <text class="card" x="108" y="82" text-anchor="middle">N</text>
  <circle cx="108" cy="118" r="3" fill="currentColor" />
  <path class="idx" d="M108,58 L102,46 L114,46 Z" />
  <text class="lbl" x="108" y="196" text-anchor="middle">compas magnétique</text>
  <text class="sub" x="108" y="212" text-anchor="middle">instable en manœuvre</text>
  <!-- Conservateur -->
  <circle class="dial" cx="352" cy="118" r="60" />
  <text class="card" x="352" y="82" text-anchor="middle">N</text>
  <circle cx="352" cy="118" r="3" fill="currentColor" />
  <path class="idx" d="M352,58 L346,46 L358,46 Z" />
  <rect class="dial" x="340" y="170" width="24" height="12" rx="2" />
  <text class="lbl" x="352" y="200" text-anchor="middle">conservateur de cap</text>
  <text class="sub" x="352" y="216" text-anchor="middle">stable, mais dérive</text>
  <!-- Recalage -->
  <line class="flow" x1="176" y1="118" x2="284" y2="118" marker-end="url(#ac)" />
  <text class="accent-t" x="230" y="108" text-anchor="middle">recalage</text>
  <text class="sub" x="230" y="140" text-anchor="middle">on recale sur le compas</text>
</svg>
