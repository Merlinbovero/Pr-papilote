<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .dial { stroke: currentColor; fill: none; stroke-width: 2; }
    .rose { stroke: currentColor; fill: none; stroke-width: 1.2; }
    .card { font-size: 16px; font-weight: 700; }
    .idx { fill: #3b82f6; }
    .lead { stroke: #94a3b8; fill: none; stroke-width: 1; }
  </style>
  <text class="title" x="150" y="26" text-anchor="middle">Le compas magnétique</text>
  <!-- Cadran -->
  <circle class="dial" cx="150" cy="166" r="106" />
  <circle class="rose" cx="150" cy="166" r="88" />
  <!-- Cardinaux -->
  <text class="card" x="150" y="106" text-anchor="middle">N</text>
  <text class="card" x="214" y="172" text-anchor="middle">E</text>
  <text class="card" x="150" y="234" text-anchor="middle">S</text>
  <text class="card" x="86" y="172" text-anchor="middle">W</text>
  <!-- Pivot -->
  <circle cx="150" cy="166" r="4" fill="currentColor" />
  <!-- Ligne de foi (repère) -->
  <path class="idx" d="M150,74 L143,60 L157,60 Z" />
  <!-- Étiquettes -->
  <line class="lead" x1="206" y1="130" x2="266" y2="104" />
  <text class="lbl" x="270" y="100" text-anchor="start">rose aimantée</text>
  <line class="lead" x1="150" y1="66" x2="70" y2="66" />
  <text class="lbl" x="66" y="62" text-anchor="end">ligne de foi</text>
  <text class="sub" x="150" y="288" text-anchor="middle">indique le cap magnétique</text>
</svg>
