<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 240" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .ink { stroke: currentColor; fill: none; stroke-width: 2; }
    .flow { stroke: #3b82f6; fill: none; stroke-width: 2.5; }
    .qm { font-size: 34px; font-weight: 700; fill: #94a3b8; }
    .horizon { stroke: #ffffff; fill: none; stroke-width: 2; }
    .plane { stroke: #eab308; fill: none; stroke-width: 3; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 12px; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
    <clipPath id="mini"><circle cx="342" cy="112" r="48" /></clipPath>
  </defs>
  <text class="title" x="230" y="26" text-anchor="middle">Croire les instruments, pas ses sensations</text>
  <!-- Sensations trompeuses -->
  <circle class="ink" cx="110" cy="112" r="48" />
  <text class="qm" x="110" y="124" text-anchor="middle">? !</text>
  <text class="lbl" x="110" y="180" text-anchor="middle">sensations</text>
  <text class="sub" x="110" y="196" text-anchor="middle">(oreille interne) trompeuses</text>
  <!-- Flèche -->
  <line class="flow" x1="166" y1="112" x2="286" y2="112" marker-end="url(#ac)" />
  <text class="accent-t" x="226" y="102" text-anchor="middle">en cas de doute</text>
  <!-- Instrument : horizon artificiel -->
  <g clip-path="url(#mini)">
    <rect x="290" y="60" width="104" height="52" fill="#3b82f6" />
    <rect x="290" y="112" width="104" height="52" fill="#b45309" />
    <line class="horizon" x1="290" y1="112" x2="396" y2="112" />
  </g>
  <circle class="ink" cx="342" cy="112" r="48" />
  <line class="plane" x1="320" y1="112" x2="336" y2="112" />
  <line class="plane" x1="348" y1="112" x2="364" y2="112" />
  <circle cx="342" cy="112" r="3" fill="#eab308" />
  <text class="lbl" x="342" y="180" text-anchor="middle">instrument</text>
  <text class="sub" x="342" y="196" text-anchor="middle">(la vérité)</text>
</svg>
