<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .step { fill: none; stroke: #3b82f6; stroke-width: 2; }
    .lbl { font-size: 12px; font-weight: 600; }
    .sub { font-size: 10px; fill: #94a3b8; }
    .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arr); }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
  </defs>
  <text class="title" x="230" y="24" text-anchor="middle">Le cursus du pilote de chasse (AAE)</text>
  <!-- Étape 1 -->
  <rect class="step" x="70" y="44" width="320" height="58" rx="8" />
  <text class="lbl" x="230" y="66" text-anchor="middle">École de l'air — Salon-de-Provence</text>
  <text class="sub" x="230" y="82" text-anchor="middle">formation militaire initiale, puis vol militaire</text>
  <text class="sub" x="230" y="94" text-anchor="middle">planeur · Cirrus SR20/22</text>
  <line class="arrow" x1="230" y1="102" x2="230" y2="126" />
  <!-- Étape 2 -->
  <rect class="step" x="70" y="128" width="320" height="58" rx="8" />
  <text class="lbl" x="230" y="150" text-anchor="middle">École de l'aviation de chasse — Cognac (BA 709)</text>
  <text class="sub" x="230" y="166" text-anchor="middle">≈ 18 mois — spécialisation chasse</text>
  <text class="sub" x="230" y="178" text-anchor="middle">Grob 120 puis PC-21</text>
  <line class="arrow" x1="230" y1="186" x2="230" y2="210" />
  <!-- Étape 3 -->
  <rect class="step" x="70" y="212" width="320" height="58" rx="8" />
  <text class="lbl" x="230" y="234" text-anchor="middle">Transformation opérationnelle</text>
  <text class="sub" x="230" y="250" text-anchor="middle">Rafale — ETR 3/4 « Aquitaine » (Saint-Dizier)</text>
  <text class="sub" x="230" y="262" text-anchor="middle">ou Mirage 2000 — EC 2/3 « Champagne » (Nancy)</text>
  <line class="arrow" x1="230" y1="270" x2="230" y2="294" />
  <!-- Étape 4 -->
  <rect class="step" x="70" y="296" width="320" height="44" rx="8" />
  <text class="lbl" x="230" y="314" text-anchor="middle">Escadron de chasse — qualifications progressives</text>
  <text class="sub" x="230" y="330" text-anchor="middle">équipier, sous-chef puis chef de patrouille (~3 ans)</text>
</svg>
