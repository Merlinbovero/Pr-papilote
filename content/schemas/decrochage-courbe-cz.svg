<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .ink { stroke: currentColor; fill: none; stroke-width: 2; }
    .accent-axis { stroke: #3b82f6; fill: none; stroke-width: 2; }
    .curve { stroke: #3b82f6; fill: none; stroke-width: 3; }
    .muted { stroke: #94a3b8; fill: none; stroke-width: 1.5; }
    .dot { fill: #3b82f6; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 12px; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="210" y="24" text-anchor="middle">La portance chute après l'angle critique</text>
  <!-- Axes -->
  <line class="accent-axis" x1="70" y1="228" x2="70" y2="46" marker-end="url(#ac)" />
  <text class="lbl" x="70" y="40" text-anchor="middle">portance (Cz)</text>
  <line class="ink" x1="70" y1="228" x2="398" y2="228" />
  <text class="lbl" x="336" y="249">incidence (α)</text>
  <!-- Courbe : montée jusqu'au Cz max, puis chute -->
  <path class="curve" d="M70,228 Q168,110 244,72 Q294,96 342,168" />
  <circle class="dot" cx="244" cy="72" r="4" />
  <text class="accent-t" x="252" y="66" text-anchor="start">Cz max</text>
  <!-- Repère de l'angle critique -->
  <line class="muted" x1="244" y1="228" x2="244" y2="72" stroke-dasharray="5 4" />
  <text class="sub" x="244" y="244" text-anchor="middle">angle critique</text>
  <!-- Zone de décrochage -->
  <text class="sub" x="330" y="128" text-anchor="middle">décrochage</text>
</svg>
