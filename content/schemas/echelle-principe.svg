<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .seg { stroke: currentColor; fill: none; stroke-width: 2.5; }
    .eq { fill: #3b82f6; font-size: 26px; font-weight: 700; }
  </style>
  <text class="title" x="230" y="26" text-anchor="middle">L'échelle 1/500 000</text>
  <!-- Segment carte (court) -->
  <line class="seg" x1="70" y1="96" x2="122" y2="96" />
  <line class="seg" x1="70" y1="88" x2="70" y2="104" />
  <line class="seg" x1="122" y1="88" x2="122" y2="104" />
  <text class="lbl" x="96" y="80" text-anchor="middle">1 cm (carte)</text>
  <!-- Égalité -->
  <text class="eq" x="192" y="105" text-anchor="middle">=</text>
  <!-- Segment réalité (long) -->
  <line class="seg" x1="250" y1="96" x2="424" y2="96" />
  <line class="seg" x1="250" y1="88" x2="250" y2="104" />
  <line class="seg" x1="424" y1="88" x2="424" y2="104" />
  <text class="lbl" x="337" y="80" text-anchor="middle">5 km (réalité)</text>
  <!-- Sous-titre -->
  <text class="sub" x="230" y="150" text-anchor="middle">1 cm sur la carte représente 5 km au sol</text>
  <text class="sub" x="230" y="168" text-anchor="middle">à cette échelle, 1 mille marin ≈ 3,7 mm</text>
</svg>
