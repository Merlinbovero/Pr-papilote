<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .plane { stroke: currentColor; fill: none; stroke-width: 2; }
    .force { stroke: currentColor; fill: none; stroke-width: 2.5; }
    .moment { stroke: #94a3b8; fill: none; stroke-width: 1.5; }
    .cg-fill { fill: currentColor; }
    .cg-line { stroke: currentColor; fill: none; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor" />
    </marker>
    <marker id="am" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8" />
    </marker>
  </defs>
  <text class="title" x="230" y="24" text-anchor="middle">L'équilibre longitudinal</text>
  <!-- Fuselage (profil, nez à droite) -->
  <path class="plane" d="M392,150 C368,140 300,136 240,137 L120,139 C108,140 100,145 100,150 C100,155 108,160 120,161 L240,163 C300,164 368,160 392,150 Z" />
  <!-- Dérive + empennage -->
  <path class="plane" d="M114,139 L104,116 L132,138 Z" />
  <line class="plane" x1="96" y1="150" x2="140" y2="150" />
  <!-- Centre de gravité (symbole G) -->
  <circle class="cg-line" cx="250" cy="150" r="7" />
  <path class="cg-fill" d="M250,143 A7,7 0 0,1 257,150 L250,150 Z" />
  <path class="cg-fill" d="M250,157 A7,7 0 0,1 243,150 L250,150 Z" />
  <text class="lbl" x="250" y="182" text-anchor="middle">G (centre de gravité)</text>
  <!-- Portance de l'aile (vers le haut) -->
  <line class="force" x1="262" y1="137" x2="262" y2="70" marker-end="url(#a)" />
  <text class="lbl" x="270" y="82" text-anchor="start">portance (aile)</text>
  <!-- Déportance de l'empennage (vers le bas) -->
  <line class="force" x1="118" y1="150" x2="118" y2="206" marker-end="url(#a)" />
  <text class="lbl" x="118" y="224" text-anchor="middle">déportance</text>
  <text class="sub" x="118" y="238" text-anchor="middle">(empennage)</text>
  <!-- Moments opposés autour de G -->
  <path class="moment" d="M238,110 A26,26 0 0,0 224,140" marker-end="url(#am)" />
  <path class="moment" d="M170,150 A40,40 0 0,1 206,176" marker-end="url(#am)" />
  <text class="sub" x="230" y="250" text-anchor="middle">les deux moments autour de G se compensent</text>
</svg>
