<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .body { stroke: currentColor; fill: none; stroke-width: 1.8; }
    .blade { stroke: currentColor; fill: none; stroke-width: 1.4; }
    .duct { stroke: #3b82f6; fill: none; stroke-width: 2.4; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 12px; }
  </style>
  <text class="title" x="230" y="26" text-anchor="middle">Le rotor anticouple — classique vs fenestron</text>
  <!-- GAUCHE : rotor classique exposé -->
  <path class="body" d="M28,120 L150,120" />
  <path class="body" d="M150,120 L150,80 L170,120 Z" />
  <!-- rotor exposé (hub + pales visibles hors carénage) -->
  <circle class="blade" cx="178" cy="96" r="24" />
  <circle cx="178" cy="96" r="3" fill="currentColor" />
  <line class="blade" x1="178" y1="96" x2="178" y2="74" />
  <line class="blade" x1="178" y1="96" x2="197" y2="108" />
  <line class="blade" x1="178" y1="96" x2="159" y2="108" />
  <text class="lbl" x="120" y="150" text-anchor="middle">rotor classique</text>
  <text class="sub" x="120" y="166" text-anchor="middle">pales exposées</text>
  <!-- DROITE : fenestron caréné -->
  <path class="body" d="M292,120 L392,120" />
  <path class="body" d="M392,120 L392,66 L420,120 Z" />
  <!-- fenestron : rotor intégré dans un carénage (duct) -->
  <circle class="duct" cx="404" cy="92" r="22" />
  <circle cx="404" cy="92" r="2.5" fill="#3b82f6" />
  <line class="blade" x1="404" y1="92" x2="404" y2="74" />
  <line class="blade" x1="404" y1="92" x2="419" y2="102" />
  <line class="blade" x1="404" y1="92" x2="389" y2="102" />
  <text class="accent-t" x="360" y="150" text-anchor="middle">fenestron</text>
  <text class="sub" x="360" y="166" text-anchor="middle">rotor caréné (intégré)</text>
  <text class="sub" x="230" y="210" text-anchor="middle">Même fonction — équilibrer le couple du rotor principal.</text>
  <text class="sub" x="230" y="226" text-anchor="middle">Le fenestron protège les pales et réduit le bruit et le danger au sol.</text>
</svg>
