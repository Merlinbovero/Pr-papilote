<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 280" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .plane { stroke: currentColor; fill: none; stroke-width: 2; }
    .thin { stroke: currentColor; fill: none; stroke-width: 1; }
    .surface { fill: #3b82f6; fill-opacity: 0.85; stroke: #3b82f6; stroke-width: 1; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 12px; }
  </style>
  <text class="title" x="230" y="24" text-anchor="middle">Les gouvernes et leurs commandes</text>
  <!-- Aircraft (vue de dessus, nez à droite) -->
  <path class="plane" d="M348,150 C332,142 300,140 250,141 L160,142 C150,143 146,147 146,150 C146,153 150,157 160,158 L250,159 C300,160 332,158 348,150 Z" />
  <rect class="plane" x="238" y="96" width="24" height="108" rx="4" />
  <rect class="plane" x="150" y="122" width="16" height="56" rx="3" />
  <!-- Dérive (vue de dessus, au niveau de la queue) -->
  <path class="plane" d="M150,150 L126,143 L126,157 Z" />
  <!-- Ailerons (bord de fuite, en bout d'aile) -->
  <rect class="surface" x="230" y="100" width="10" height="30" />
  <rect class="surface" x="230" y="170" width="10" height="30" />
  <!-- Gouverne de profondeur (bord de fuite de l'empennage horizontal) -->
  <rect class="surface" x="142" y="124" width="8" height="52" />
  <!-- Gouverne de direction (dérive) -->
  <path class="surface" d="M138,150 L126,146 L126,154 Z" />
  <!-- Étiquettes -->
  <line class="thin" x1="235" y1="185" x2="298" y2="222" />
  <text class="accent-t" x="302" y="226" text-anchor="start">ailerons (roulis)</text>
  <line class="thin" x1="146" y1="135" x2="96" y2="96" />
  <text class="accent-t" x="92" y="90" text-anchor="end">profondeur (tangage)</text>
  <line class="thin" x1="130" y1="152" x2="96" y2="196" />
  <text class="accent-t" x="92" y="200" text-anchor="end">direction (lacet)</text>
  <text class="sub" x="230" y="262" text-anchor="middle">le manche agit sur les ailerons et la profondeur ; le palonnier sur la direction</text>
</svg>
