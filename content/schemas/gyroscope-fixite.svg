<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .part { stroke: currentColor; fill: none; stroke-width: 2; }
    .axis { stroke: currentColor; fill: none; stroke-width: 2.5; }
    .spin { stroke: #3b82f6; fill: none; stroke-width: 2; }
    .lead { stroke: #94a3b8; fill: none; stroke-width: 1; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 12px; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor" />
    </marker>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="210" y="24" text-anchor="middle">Le gyroscope garde son axe fixe</text>
  <!-- Cardan (gimbal) -->
  <ellipse class="part" cx="150" cy="140" rx="92" ry="66" />
  <!-- Rotor -->
  <ellipse class="part" cx="150" cy="140" rx="54" ry="17" />
  <!-- Axe (fixe) -->
  <line class="axis" x1="150" y1="184" x2="150" y2="78" marker-start="url(#a)" marker-end="url(#a)" />
  <!-- Rotation du rotor -->
  <path class="spin" d="M116,140 A54,17 0 0 1 184,140" marker-end="url(#ac)" />
  <!-- Étiquettes -->
  <line class="lead" x1="150" y1="82" x2="196" y2="60" />
  <text class="lbl" x="200" y="56" text-anchor="start">axe du gyroscope</text>
  <line class="lead" x1="200" y1="152" x2="250" y2="152" />
  <text class="lbl" x="254" y="148" text-anchor="start">rotor (rotation rapide)</text>
  <line class="lead" x1="234" y1="118" x2="270" y2="104" />
  <text class="lbl" x="274" y="100" text-anchor="start">cardans</text>
  <text class="sub" x="210" y="242" text-anchor="middle">l'axe conserve sa direction quels que soient les mouvements de l'avion</text>
</svg>
