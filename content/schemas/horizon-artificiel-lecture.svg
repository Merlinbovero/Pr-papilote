<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .bezel { stroke: currentColor; fill: none; stroke-width: 2; }
    .horizon { stroke: #ffffff; fill: none; stroke-width: 2; }
    .plane { stroke: #eab308; fill: none; stroke-width: 3.5; }
    .idx { fill: currentColor; }
    .onsky { fill: #ffffff; font-size: 12px; }
  </style>
  <defs>
    <clipPath id="face"><circle cx="160" cy="172" r="120" /></clipPath>
  </defs>
  <text class="title" x="160" y="26" text-anchor="middle">Lire l'horizon artificiel</text>
  <!-- Boule ciel / terre, inclinée (léger virage à droite, nez haut) -->
  <g clip-path="url(#face)">
    <g transform="rotate(-15 160 172)">
      <rect x="-80" y="-40" width="480" height="257" fill="#3b82f6" />
      <rect x="-80" y="217" width="480" height="220" fill="#b45309" />
      <line class="horizon" x1="-80" y1="217" x2="400" y2="217" />
    </g>
    <text class="onsky" x="160" y="120" text-anchor="middle">ciel</text>
    <text class="onsky" x="160" y="250" text-anchor="middle">terre</text>
  </g>
  <!-- Bezel -->
  <circle class="bezel" cx="160" cy="172" r="120" />
  <!-- Index d'inclinaison (fixe, en haut) -->
  <path class="idx" d="M160,58 L153,44 L167,44 Z" />
  <!-- Maquette d'avion (fixe) -->
  <line class="plane" x1="104" y1="172" x2="140" y2="172" />
  <line class="plane" x1="180" y1="172" x2="216" y2="172" />
  <circle cx="160" cy="172" r="4" fill="#eab308" />
  <!-- Étiquettes -->
  <line stroke="#94a3b8" stroke-width="1" x1="120" y1="205" x2="70" y2="248" />
  <text class="lbl" x="70" y="262" text-anchor="middle">ligne d'horizon</text>
  <line stroke="#94a3b8" stroke-width="1" x1="200" y1="172" x2="264" y2="200" />
  <text class="lbl" x="266" y="214" text-anchor="start">maquette (fixe)</text>
</svg>
