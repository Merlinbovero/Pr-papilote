<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 240" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .box { stroke: currentColor; fill: none; stroke-width: 2; }
    .drop { fill: #3b82f6; }
  </style>
  <text class="title" x="230" y="26" text-anchor="middle">L'air chaud contient plus de vapeur d'eau</text>
  <!-- Air froid -->
  <rect class="box" x="64" y="60" width="128" height="100" rx="6" />
  <circle class="drop" cx="98" cy="98" r="5" />
  <circle class="drop" cx="140" cy="118" r="5" />
  <circle class="drop" cx="112" cy="140" r="5" />
  <text class="lbl" x="128" y="182" text-anchor="middle">air froid</text>
  <text class="sub" x="128" y="198" text-anchor="middle">peu de vapeur au maximum</text>
  <!-- Air chaud -->
  <rect class="box" x="268" y="60" width="128" height="100" rx="6" />
  <circle class="drop" cx="298" cy="86" r="5" />
  <circle class="drop" cx="334" cy="86" r="5" />
  <circle class="drop" cx="370" cy="86" r="5" />
  <circle class="drop" cx="298" cy="120" r="5" />
  <circle class="drop" cx="334" cy="120" r="5" />
  <circle class="drop" cx="370" cy="120" r="5" />
  <circle class="drop" cx="334" cy="148" r="5" />
  <text class="lbl" x="332" y="182" text-anchor="middle">air chaud</text>
  <text class="sub" x="332" y="198" text-anchor="middle">beaucoup de vapeur au maximum</text>
  <text class="sub" x="230" y="224" text-anchor="middle">humidité relative = vapeur présente / maximum possible (qui croît avec la température)</text>
</svg>
