<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .box { stroke: currentColor; fill: none; stroke-width: 2; }
    .axis { stroke: #3b82f6; fill: none; stroke-width: 2; }
    .o2 { fill: #3b82f6; }
    .other { fill: #94a3b8; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 11px; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="220" y="24" text-anchor="middle">Moins d'oxygène en altitude</text>
  <!-- Axe altitude -->
  <line class="axis" x1="44" y1="256" x2="44" y2="52" marker-end="url(#ac)" />
  <text class="lbl" x="44" y="46" text-anchor="middle">altitude</text>
  <!-- En altitude : peu de molécules -->
  <rect class="box" x="250" y="66" width="120" height="76" rx="6" />
  <circle class="other" cx="282" cy="92" r="5" />
  <circle class="o2" cx="322" cy="92" r="5" />
  <circle class="other" cx="300" cy="120" r="5" />
  <circle class="other" cx="344" cy="120" r="5" />
  <text class="lbl" x="310" y="158" text-anchor="middle">en altitude — peu de molécules</text>
  <!-- Près du sol : beaucoup de molécules -->
  <rect class="box" x="86" y="176" width="120" height="76" rx="6" />
  <circle class="other" cx="110" cy="196" r="5" />
  <circle class="o2" cx="142" cy="196" r="5" />
  <circle class="other" cx="174" cy="196" r="5" />
  <circle class="other" cx="110" cy="222" r="5" />
  <circle class="other" cx="142" cy="222" r="5" />
  <circle class="o2" cx="174" cy="222" r="5" />
  <circle class="other" cx="126" cy="242" r="5" />
  <circle class="other" cx="158" cy="242" r="5" />
  <text class="lbl" x="146" y="268" text-anchor="middle">près du sol — beaucoup de molécules</text>
  <!-- Légende -->
  <circle class="o2" cx="250" cy="196" r="5" />
  <text class="accent-t" x="262" y="200" text-anchor="start">= oxygène (21 % partout)</text>
</svg>
