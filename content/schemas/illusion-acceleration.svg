<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 240" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .plane { stroke: currentColor; fill: none; stroke-width: 2; }
    .ground { stroke: currentColor; fill: none; stroke-width: 2; }
    .flow { stroke: #3b82f6; fill: none; stroke-width: 2.5; }
    .bubble { stroke: #94a3b8; fill: none; stroke-width: 1.5; stroke-dasharray: 5 4; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 12px; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="230" y="24" text-anchor="middle">L'illusion d'accélération</text>
  <!-- Réalité : avion à plat qui accélère -->
  <line class="ground" x1="20" y1="192" x2="210" y2="192" />
  <path class="plane" d="M96,176 C103,172 123,171 135,176 C123,181 103,181 96,176 Z" />
  <path class="plane" d="M101,174 L96,165 L108,174 Z" />
  <line class="flow" x1="140" y1="176" x2="200" y2="176" marker-end="url(#ac)" />
  <text class="accent-t" x="172" y="168" text-anchor="middle">accélération</text>
  <text class="sub" x="115" y="210" text-anchor="middle">réalité — assiette à plat</text>
  <!-- Sensation : cabré (dans une bulle) -->
  <ellipse class="bubble" cx="352" cy="104" rx="86" ry="52" />
  <g transform="rotate(-18 352 104)">
    <path class="plane" d="M330,104 C337,100 357,99 369,104 C357,109 337,109 330,104 Z" />
    <path class="plane" d="M335,102 L330,93 L342,102 Z" />
  </g>
  <text class="sub" x="352" y="176" text-anchor="middle">sensation ressentie — nez qui monte</text>
  <text class="accent-t" x="352" y="196" text-anchor="middle">→ pousser serait dangereux</text>
</svg>
