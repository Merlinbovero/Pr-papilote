<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 11px; }
    .accent { fill: #3b82f6; font-size: 11px; }
    .ink { stroke: currentColor; fill: currentColor; fill-opacity: 0.10; stroke-width: 2; }
    .axis { stroke: #3b82f6; fill: none; stroke-width: 1.5; stroke-dasharray: 6 4; }
    .surf { fill: #3b82f6; fill-opacity: 0.5; }
  </style>
  <text class="title" x="210" y="20" text-anchor="middle">Les trois axes et les gouvernes</text>

  <!-- Avion vu de dessus -->
  <g class="ink">
    <path d="M204,44 q6,-8 12,0 v150 q-6,10 -12,0 z" />
    <path d="M40,124 h340 v14 h-340 z" />
    <path d="M165,192 h90 v10 h-90 z" />
  </g>

  <!-- Axes -->
  <line class="axis" x1="210" y1="34" x2="210" y2="212" />
  <line class="axis" x1="70" y1="131" x2="350" y2="131" />
  <circle cx="210" cy="131" r="5" fill="#3b82f6" />

  <!-- Gouvernes -->
  <rect class="surf" x="40" y="132" width="34" height="8" />
  <rect class="surf" x="346" y="132" width="34" height="8" />
  <rect class="surf" x="165" y="200" width="90" height="7" />
  <rect class="surf" x="206" y="192" width="8" height="24" />

  <!-- Étiquettes -->
  <text class="accent" x="30" y="150" text-anchor="middle">ailerons (roulis)</text>
  <text class="accent" x="300" y="222" text-anchor="middle">profondeur (tangage)</text>
  <text class="accent" x="230" y="131">lacet (centre de gravité)</text>
  <text class="lbl" x="210" y="246" text-anchor="middle">les trois axes se croisent au centre de gravité</text>
</svg>
