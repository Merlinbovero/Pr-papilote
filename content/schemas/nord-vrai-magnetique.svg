<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .vrai { stroke: currentColor; fill: none; stroke-width: 2.5; }
    .magn { stroke: #3b82f6; fill: none; stroke-width: 2.5; }
    .arc { stroke: #94a3b8; fill: none; stroke-width: 1.5; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 12px; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor" />
    </marker>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="210" y="26" text-anchor="middle">Nord vrai et nord magnétique</text>
  <!-- Nord vrai -->
  <line class="vrai" x1="160" y1="204" x2="160" y2="60" marker-end="url(#a)" />
  <text class="lbl" x="160" y="52" text-anchor="middle">nord vrai (carte)</text>
  <!-- Nord magnétique -->
  <line class="magn" x1="160" y1="204" x2="205" y2="66" marker-end="url(#ac)" />
  <text class="accent-t" x="238" y="70" text-anchor="middle">nord magnétique</text>
  <text class="sub" x="238" y="86" text-anchor="middle">(boussole)</text>
  <!-- Déclinaison -->
  <path class="arc" d="M160,94 A110,110 0 0,1 195,102" />
  <text class="sub" x="182" y="120" text-anchor="middle">déclinaison (D)</text>
  <text class="sub" x="210" y="228" text-anchor="middle">l'écart entre les deux nords est la déclinaison magnétique</text>
</svg>
