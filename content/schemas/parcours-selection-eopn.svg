<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 300" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .step { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .box { stroke: currentColor; fill: none; stroke-width: 1.8; }
    .num { stroke: #3b82f6; fill: none; stroke-width: 1.8; }
    .numt { fill: #3b82f6; font-size: 13px; font-weight: 700; }
    .link { stroke: #3b82f6; fill: none; stroke-width: 2; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="220" y="26" text-anchor="middle">Le parcours de sélection EOPN</text>
  <!-- Liaisons -->
  <line class="link" x1="52" y1="79" x2="52" y2="97" marker-end="url(#ac)" />
  <line class="link" x1="52" y1="139" x2="52" y2="157" marker-end="url(#ac)" />
  <line class="link" x1="52" y1="199" x2="52" y2="217" marker-end="url(#ac)" />
  <!-- Étape 1 -->
  <circle class="num" cx="52" cy="64" r="13" /><text class="numt" x="52" y="68" text-anchor="middle">1</text>
  <rect class="box" x="74" y="48" width="342" height="34" rx="4" />
  <text class="step" x="86" y="63" text-anchor="start">Dossier de candidature (CIRFA)</text>
  <text class="sub" x="86" y="77" text-anchor="start">dépôt et étude du dossier</text>
  <!-- Étape 2 -->
  <circle class="num" cx="52" cy="124" r="13" /><text class="numt" x="52" y="128" text-anchor="middle">2</text>
  <rect class="box" x="74" y="108" width="342" height="34" rx="4" />
  <text class="step" x="86" y="123" text-anchor="start">Présélection</text>
  <text class="sub" x="86" y="137" text-anchor="start">tests psychotechniques, condition physique, anglais</text>
  <!-- Étape 3 -->
  <circle class="num" cx="52" cy="184" r="13" /><text class="numt" x="52" y="188" text-anchor="middle">3</text>
  <rect class="box" x="74" y="168" width="342" height="34" rx="4" />
  <text class="step" x="86" y="183" text-anchor="start">Sélection EOPN — 4 jours</text>
  <text class="sub" x="86" y="197" text-anchor="start">au sol, au CSSA (BA 705, Tours)</text>
  <!-- Étape 4 -->
  <circle class="num" cx="52" cy="244" r="13" /><text class="numt" x="52" y="248" text-anchor="middle">4</text>
  <rect class="box" x="74" y="228" width="342" height="34" rx="4" />
  <text class="step" x="86" y="243" text-anchor="start">Formation à Salon-de-Provence (BA 701)</text>
  <text class="sub" x="86" y="257" text-anchor="start">orientation chasse / transport / hélicoptère</text>
</svg>
