<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .land { stroke: #94a3b8; fill: none; stroke-width: 1.5; }
    .zone { stroke: #94a3b8; fill: none; stroke-width: 1.4; stroke-dasharray: 5 4; }
    .base { stroke: currentColor; fill: none; stroke-width: 1.8; }
    .track { stroke: #3b82f6; fill: none; stroke-width: 2; }
    .plane { stroke: currentColor; fill: none; stroke-width: 1.6; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 12px; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="230" y="24" text-anchor="middle">La patrouille maritime (ratissage d'une zone)</text>
  <!-- Terre à gauche -->
  <path class="land" d="M40,44 Q64,120 46,180 Q34,230 58,270" />
  <text class="sub" x="34" y="150" text-anchor="middle" transform="rotate(-90 34 150)">terre</text>
  <!-- Base à terre -->
  <path class="base" d="M54,196 l10,0 -5,-9 z" />
  <text class="lbl" x="70" y="210" text-anchor="start">base à terre</text>
  <!-- Zone surveillée -->
  <rect class="zone" x="96" y="56" width="332" height="182" rx="4" />
  <text class="sub" x="262" y="252" text-anchor="middle">vaste zone maritime surveillée</text>
  <!-- Trajectoire de ratissage -->
  <path class="track" d="M104,74 L420,74 L420,110 L104,110 L104,146 L420,146 L420,182 L104,182 L104,218 L420,218" marker-end="url(#ac)" />
  <!-- Avion sur la trajectoire -->
  <g class="plane" transform="translate(230,146)">
    <line x1="-14" y1="0" x2="14" y2="0" />
    <line x1="-2" y1="-11" x2="-2" y2="11" />
    <line x1="-13" y1="-6" x2="-13" y2="6" />
  </g>
  <text class="accent-t" x="262" y="42" text-anchor="middle">trajectoire de recherche · longue endurance</text>
</svg>
