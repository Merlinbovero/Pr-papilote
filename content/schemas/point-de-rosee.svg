<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 240" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .arrow { stroke: currentColor; fill: none; stroke-width: 2; }
    .vapor { fill: #94a3b8; }
    .drop { fill: #3b82f6; }
    .threshold { stroke: #3b82f6; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 12px; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor" />
    </marker>
  </defs>
  <text class="title" x="230" y="26" text-anchor="middle">Le point de rosée</text>
  <!-- Flèche de refroidissement -->
  <line class="arrow" x1="48" y1="58" x2="410" y2="58" marker-end="url(#a)" />
  <text class="lbl" x="225" y="50" text-anchor="middle">refroidissement de l'air →</text>
  <!-- Seuil : point de rosée -->
  <line class="threshold" x1="250" y1="74" x2="250" y2="196" />
  <text class="accent-t" x="250" y="212" text-anchor="middle">point de rosée (saturation, 100 %)</text>
  <!-- Air non saturé : vapeur dispersée -->
  <circle class="vapor" cx="96" cy="104" r="3.5" />
  <circle class="vapor" cx="140" cy="140" r="3.5" />
  <circle class="vapor" cx="180" cy="110" r="3.5" />
  <circle class="vapor" cx="118" cy="170" r="3.5" />
  <circle class="vapor" cx="200" cy="160" r="3.5" />
  <text class="sub" x="130" y="92" text-anchor="middle">air non saturé (vapeur)</text>
  <!-- Condensation : gouttelettes -->
  <circle class="drop" cx="298" cy="112" r="6" />
  <circle class="drop" cx="344" cy="150" r="6" />
  <circle class="drop" cx="312" cy="180" r="6" />
  <circle class="drop" cx="366" cy="116" r="6" />
  <circle class="drop" cx="388" cy="166" r="6" />
  <text class="accent-t" x="344" y="96" text-anchor="middle">condensation (gouttelettes)</text>
</svg>
