<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 11px; }
    .accent { fill: #3b82f6; font-size: 11px; }
    .axis { stroke: currentColor; opacity: 0.6; fill: none; stroke-width: 1.5; }
    .curve { stroke: #3b82f6; fill: none; stroke-width: 2.5; }
    .tan { stroke: currentColor; opacity: 0.4; fill: none; stroke-width: 1; }
    .pt { fill: #3b82f6; }
  </style>
  <text class="title" x="210" y="20" text-anchor="middle">La polaire d'Eiffel</text>

  <!-- Axes -->
  <line class="axis" x1="70" y1="215" x2="390" y2="215" />
  <line class="axis" x1="70" y1="215" x2="70" y2="40" />
  <text class="lbl" x="386" y="232" text-anchor="end">Cx (traînée)</text>
  <text class="lbl" x="62" y="46" text-anchor="end">Cz</text>

  <!-- Tangente de finesse maximale (origine → point de tangence) -->
  <line class="tan" x1="70" y1="215" x2="150" y2="118" stroke-dasharray="4 3" />

  <!-- Courbe polaire (Cz vs Cx) : monte, sommet (Cz max), redescend -->
  <path class="curve" d="M74,196 C90,150 120,120 150,118 C210,112 250,90 262,64 C266,80 262,104 250,128" />

  <!-- Points remarquables -->
  <circle class="pt" cx="74" cy="196" r="4" />
  <text class="lbl" x="80" y="208">portance nulle</text>

  <circle class="pt" cx="96" cy="150" r="4" />
  <text class="lbl" x="102" y="150">traînée mini</text>

  <circle class="pt" cx="150" cy="118" r="4" />
  <text class="accent" x="156" y="112">finesse maxi (tangente)</text>

  <circle class="pt" cx="262" cy="64" r="4" />
  <text class="accent" x="256" y="58" text-anchor="end">Cz maxi</text>

  <circle class="pt" cx="250" cy="128" r="4" />
  <text class="lbl" x="258" y="140">décrochage</text>
</svg>
