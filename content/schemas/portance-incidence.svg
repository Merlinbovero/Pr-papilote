<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .ink { stroke: currentColor; fill: none; stroke-width: 2; }
    .accent-axis { stroke: #3b82f6; fill: none; stroke-width: 2; }
    .curve { stroke: #3b82f6; fill: none; stroke-width: 3; }
    .muted { stroke: #94a3b8; fill: none; stroke-width: 2; }
    .dot { fill: #3b82f6; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="210" y="24" text-anchor="middle">La portance augmente avec l'incidence</text>
  <!-- Axes -->
  <line class="accent-axis" x1="70" y1="225" x2="70" y2="44" marker-end="url(#ac)" />
  <text class="lbl" x="70" y="38" text-anchor="middle">portance</text>
  <line class="ink" x1="70" y1="225" x2="392" y2="225" />
  <text class="lbl" x="330" y="246">incidence (α)</text>
  <!-- Courbe de portance -->
  <path class="curve" d="M70,225 Q190,150 295,74" />
  <circle class="dot" cx="295" cy="74" r="3.5" />
  <!-- Au-delà : décrochage (évoqué) -->
  <path class="muted" d="M295,74 Q322,82 348,126" stroke-dasharray="5 4" />
  <text class="sub" x="330" y="60" text-anchor="middle">décrochage</text>
  <text class="sub" x="330" y="74" text-anchor="middle">(voir fiche dédiée)</text>
</svg>
