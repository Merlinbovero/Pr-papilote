<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .profile { stroke: currentColor; fill: none; stroke-width: 2; }
    .flow { stroke: #3b82f6; fill: none; stroke-width: 2.5; }
    .accent-t { fill: #3b82f6; font-weight: 600; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="230" y="24" text-anchor="middle">L'origine de la portance</text>
  <!-- Profil incliné -->
  <path class="profile" d="M150,155 C190,133 280,124 330,132 C285,148 200,168 150,155 Z" />
  <!-- Vent relatif -->
  <line class="flow" x1="40" y1="155" x2="140" y2="155" marker-end="url(#ac)" />
  <text class="lbl" x="50" y="147">vent relatif</text>
  <!-- Filet dévié vers le bas -->
  <path class="flow" d="M150,150 Q250,116 330,128 Q382,134 420,166" marker-end="url(#ac)" />
  <text class="sub" x="356" y="186" text-anchor="middle">l'air est dévié vers le bas</text>
  <!-- Portance (résultante, perpendiculaire au vent relatif) -->
  <line class="flow" x1="216" y1="132" x2="216" y2="60" stroke-width="3.5" marker-end="url(#ac)" />
  <text class="accent-t" x="224" y="74">portance</text>
  <!-- Répartition de pression -->
  <text class="sub" x="286" y="104">dépression (−) à l'extrados</text>
  <text class="sub" x="196" y="198" text-anchor="middle">surpression (+) à l'intrados</text>
</svg>
