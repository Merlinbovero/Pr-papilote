<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .profile { stroke: currentColor; fill: none; stroke-width: 2; }
    .ink { stroke: currentColor; fill: none; stroke-width: 1.5; }
    .muted { stroke: #94a3b8; fill: none; stroke-width: 1.5; }
  </style>
  <text class="title" x="230" y="24" text-anchor="middle">L'anatomie d'un profil d'aile</text>
  <!-- Profil -->
  <path class="profile" d="M110,150 C160,124 270,122 368,146 C270,160 165,162 110,150 Z" />
  <!-- Corde -->
  <line class="muted" x1="110" y1="150" x2="368" y2="146" stroke-dasharray="5 4" />
  <text class="lbl" x="300" y="162" text-anchor="middle">corde</text>
  <!-- Épaisseur (cote) -->
  <line class="ink" x1="175" y1="130" x2="175" y2="157" />
  <line class="ink" x1="170" y1="130" x2="180" y2="130" />
  <line class="ink" x1="170" y1="157" x2="180" y2="157" />
  <text class="lbl" x="175" y="120" text-anchor="middle">épaisseur</text>
  <!-- Étiquettes -->
  <line class="ink" x1="110" y1="150" x2="82" y2="184" />
  <text class="lbl" x="78" y="196" text-anchor="end">bord d'attaque</text>
  <line class="ink" x1="368" y1="146" x2="398" y2="180" />
  <text class="lbl" x="402" y="192" text-anchor="start">bord de fuite</text>
  <line class="ink" x1="252" y1="123" x2="252" y2="98" />
  <text class="lbl" x="252" y="92" text-anchor="middle">extrados (dessus)</text>
  <line class="ink" x1="235" y1="161" x2="235" y2="192" />
  <text class="lbl" x="235" y="206" text-anchor="middle">intrados (dessous)</text>
</svg>
