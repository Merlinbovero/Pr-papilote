<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .ink { stroke: currentColor; fill: none; stroke-width: 2; }
    .muted { stroke: #94a3b8; fill: none; stroke-width: 1.5; }
    .accent { stroke: #3b82f6; fill: none; stroke-width: 3; }
    .accent-axis { stroke: #3b82f6; fill: none; stroke-width: 2; }
    .dot { fill: #3b82f6; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="200" y="20" text-anchor="middle">Le profil de température ISA</text>
  <!-- Axe altitude (accent, fléché) -->
  <line class="accent-axis" x1="70" y1="240" x2="70" y2="42" marker-end="url(#ac)" />
  <text class="lbl" x="70" y="34" text-anchor="middle">altitude</text>
  <!-- Axe température (ink) -->
  <line class="ink" x1="70" y1="240" x2="362" y2="240" />
  <text class="lbl" x="356" y="258" text-anchor="end">température (°C)</text>
  <!-- Repère tropopause -->
  <line class="muted" x1="70" y1="88" x2="101" y2="88" stroke-dasharray="4 4" />
  <text class="sub" x="64" y="92" text-anchor="end">36 000 ft</text>
  <text class="sub" x="64" y="244" text-anchor="end">0</text>
  <!-- Profil ISA (accent) -->
  <polyline class="accent" points="334,240 101,88 101,50" />
  <circle class="dot" cx="334" cy="240" r="3.5" />
  <text class="lbl" x="340" y="236">+15 °C</text>
  <circle class="dot" cx="101" cy="88" r="3.5" />
  <text class="lbl" x="110" y="84">−56,5 °C</text>
  <text class="sub" x="150" y="70">tropopause (~11 km)</text>
</svg>
