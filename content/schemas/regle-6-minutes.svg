<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .clock { stroke: currentColor; fill: none; stroke-width: 2; }
    .sector { fill: #3b82f6; fill-opacity: 0.16; stroke: #3b82f6; stroke-width: 1.5; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 13px; }
  </style>
  <text class="title" x="200" y="26" text-anchor="middle">La règle des 6 minutes</text>
  <!-- Cadran -->
  <circle class="clock" cx="110" cy="132" r="72" />
  <circle cx="110" cy="132" r="3" fill="currentColor" />
  <!-- Secteur 6 min (1/10 de tour) -->
  <path class="sector" d="M110,132 L110,60 A72,72 0 0,1 152,74 Z" />
  <!-- Repères 12 et 6 min -->
  <line class="clock" x1="110" y1="60" x2="110" y2="70" />
  <text class="sub" x="110" y="52" text-anchor="middle">12</text>
  <text class="accent-t" x="166" y="70" text-anchor="start">6 min</text>
  <text class="sub" x="166" y="86" text-anchor="start">= 1/10 h</text>
  <!-- Explication -->
  <text class="lbl" x="230" y="140" text-anchor="start">en 6 min, on parcourt</text>
  <text class="accent-t" x="230" y="160" text-anchor="start">V / 10 (en milles marins)</text>
  <text class="sub" x="230" y="182" text-anchor="start">ex. 120 kt → 12 NM en 6 min</text>
</svg>
