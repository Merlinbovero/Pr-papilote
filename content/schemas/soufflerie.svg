<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 11px; }
    .accent { fill: #3b82f6; font-size: 11px; }
    .ink { stroke: currentColor; fill: none; stroke-width: 2; }
    .flow { stroke: #3b82f6; fill: none; stroke-width: 2.5; }
  </style>
  <defs>
    <marker id="sf" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="210" y="20" text-anchor="middle">Une soufflerie à circuit ouvert (Eiffel)</text>

  <!-- Parois : collecteur convergent, veine constante, diffuseur divergent -->
  <g class="ink">
    <polyline points="20,50 110,80 240,80 380,44" />
    <polyline points="20,170 110,140 240,140 380,176" />
    <!-- séparations de zones -->
    <line x1="110" y1="80" x2="110" y2="140" stroke-dasharray="3 3" />
    <line x1="240" y1="80" x2="240" y2="140" stroke-dasharray="3 3" />
  </g>

  <!-- Maquette d'aile dans la veine d'essai -->
  <g class="ink" transform="translate(175,110)">
    <path d="M-22,0 q22,-9 44,0 q-22,9 -44,0 z" fill="currentColor" fill-opacity="0.15" />
  </g>

  <!-- Écoulement : accélère dans le collecteur, régulier dans la veine -->
  <line class="flow" x1="45" y1="110" x2="80" y2="110" marker-end="url(#sf)" />
  <line class="flow" x1="120" y1="98" x2="150" y2="98" marker-end="url(#sf)" />
  <line class="flow" x1="120" y1="122" x2="150" y2="122" marker-end="url(#sf)" />
  <line class="flow" x1="255" y1="110" x2="290" y2="110" marker-end="url(#sf)" />

  <!-- Ventilateur (schématique) à droite -->
  <g class="ink" transform="translate(360,110)">
    <circle r="16" />
    <line x1="0" y1="-16" x2="0" y2="16" />
    <line x1="-16" y1="0" x2="16" y2="0" />
  </g>

  <!-- Étiquettes de zones -->
  <text class="lbl" x="60" y="205" text-anchor="middle">collecteur</text>
  <text class="accent" x="175" y="205" text-anchor="middle">veine d'essai</text>
  <text class="lbl" x="300" y="205" text-anchor="middle">diffuseur</text>
  <text class="lbl" x="368" y="205" text-anchor="middle">ventilateur</text>
</svg>
