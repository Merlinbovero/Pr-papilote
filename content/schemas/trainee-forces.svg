<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 240" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .profile { stroke: currentColor; fill: none; stroke-width: 2; }
    .ink-arrow { stroke: currentColor; fill: none; stroke-width: 2; }
    .flow { stroke: #3b82f6; fill: none; stroke-width: 2.5; }
    .accent-t { fill: #3b82f6; font-weight: 600; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor" />
    </marker>
  </defs>
  <text class="title" x="230" y="24" text-anchor="middle">La traînée s'oppose au mouvement</text>
  <!-- Profil -->
  <path class="profile" d="M150,150 C190,130 280,128 330,142 C280,156 200,164 150,150 Z" />
  <!-- Vent relatif -->
  <line class="flow" x1="40" y1="150" x2="140" y2="150" marker-end="url(#ac)" />
  <text class="lbl" x="50" y="142">vent relatif</text>
  <!-- Portance (secondaire, en ink) -->
  <line class="ink-arrow" x1="215" y1="132" x2="215" y2="70" marker-end="url(#a)" />
  <text class="lbl" x="223" y="80">portance</text>
  <!-- Traînée (force étudiée, accent) -->
  <line class="flow" x1="336" y1="150" x2="418" y2="150" stroke-width="3.5" marker-end="url(#ac)" />
  <text class="accent-t" x="376" y="142">traînée</text>
  <text class="sub" x="377" y="170" text-anchor="middle">(parallèle au vent relatif)</text>
</svg>
