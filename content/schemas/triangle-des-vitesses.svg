<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .air { stroke: currentColor; fill: none; stroke-width: 2.5; }
    .ground { stroke: currentColor; fill: none; stroke-width: 2.5; }
    .wind { stroke: #3b82f6; fill: none; stroke-width: 2.5; }
    .arc { stroke: #94a3b8; fill: none; stroke-width: 1.5; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 12px; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor" />
    </marker>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="230" y="26" text-anchor="middle">Vitesse propre, vent et vitesse sol</text>
  <!-- Vitesse propre (cap) : O -> A -->
  <line class="air" x1="90" y1="196" x2="250" y2="80" marker-end="url(#a)" />
  <text class="lbl" x="150" y="120" text-anchor="end">vitesse propre (cap)</text>
  <!-- Vent : A -> B -->
  <line class="wind" x1="250" y1="80" x2="322" y2="104" marker-end="url(#ac)" />
  <text class="accent-t" x="292" y="72" text-anchor="middle">vent</text>
  <!-- Vitesse sol (route) : O -> B -->
  <line class="ground" x1="90" y1="196" x2="322" y2="104" marker-end="url(#a)" />
  <text class="lbl" x="256" y="182" text-anchor="start">vitesse sol (route)</text>
  <!-- Angle de dérive en O -->
  <path class="arc" d="M150,161 A72,72 0 0,1 168,150" />
  <text class="sub" x="176" y="168" text-anchor="start">dérive</text>
  <text class="sub" x="230" y="240" text-anchor="middle">la route (sol) est la somme de la vitesse propre et du vent</text>
</svg>
