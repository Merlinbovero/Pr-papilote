<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 280" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .plane { stroke: currentColor; fill: none; stroke-width: 2; }
    .axis { stroke: #3b82f6; fill: none; stroke-width: 2; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 12px; }
    .cg-fill { fill: currentColor; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="230" y="24" text-anchor="middle">Les trois axes de l'avion</text>
  <!-- Aircraft (vue de dessus, nez à droite) -->
  <path class="plane" d="M348,150 C332,142 300,140 250,141 L160,142 C150,143 146,147 146,150 C146,153 150,157 160,158 L250,159 C300,160 332,158 348,150 Z" />
  <rect class="plane" x="238" y="96" width="24" height="108" rx="4" />
  <rect class="plane" x="150" y="122" width="16" height="56" rx="3" />
  <!-- Axe de tangage (transversal, vertical) -->
  <line class="axis" x1="250" y1="240" x2="250" y2="58" marker-start="url(#ac)" marker-end="url(#ac)" />
  <text class="accent-t" x="250" y="50" text-anchor="middle">axe de tangage</text>
  <!-- Axe de roulis (longitudinal, horizontal) -->
  <line class="axis" x1="70" y1="150" x2="432" y2="150" marker-start="url(#ac)" marker-end="url(#ac)" />
  <text class="accent-t" x="404" y="142" text-anchor="start">axe de roulis</text>
  <!-- Axe de lacet (vertical, perpendiculaire au plan → symbole au centre) -->
  <circle class="axis" cx="250" cy="150" r="12" />
  <circle class="cg-fill" cx="250" cy="150" r="2.5" />
  <line class="plane" x1="286" y1="196" x2="266" y2="162" />
  <text class="accent-t" x="290" y="204" text-anchor="start">axe de lacet</text>
  <text class="lbl" x="222" y="140" text-anchor="end">G</text>
  <text class="sub" x="230" y="266" text-anchor="middle">chaque axe passe par G — la rotation autour porte son nom : roulis, tangage, lacet</text>
</svg>
