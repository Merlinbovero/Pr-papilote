<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 240" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .iso { stroke: #94a3b8; fill: none; stroke-width: 1.5; }
    .wind { stroke: #3b82f6; fill: none; stroke-width: 3; }
    .big { font-size: 22px; font-weight: 700; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 12px; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="230" y="26" text-anchor="middle">L'origine du vent</text>
  <!-- Hautes pressions (A) -->
  <circle class="iso" cx="110" cy="130" r="34" />
  <circle class="iso" cx="110" cy="130" r="20" />
  <text class="big" x="110" y="138" text-anchor="middle">A</text>
  <text class="lbl" x="110" y="186" text-anchor="middle">hautes pressions</text>
  <!-- Basses pressions (D) -->
  <circle class="iso" cx="350" cy="130" r="34" />
  <circle class="iso" cx="350" cy="130" r="20" />
  <text class="big" x="350" y="138" text-anchor="middle">D</text>
  <text class="lbl" x="350" y="186" text-anchor="middle">basses pressions</text>
  <!-- Vent : des hautes vers les basses pressions -->
  <line class="wind" x1="152" y1="118" x2="308" y2="118" marker-end="url(#ac)" />
  <text class="accent-t" x="230" y="110" text-anchor="middle">vent</text>
  <text class="sub" x="230" y="214" text-anchor="middle">l'air souffle des hautes vers les basses pressions</text>
</svg>
