<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .ink { stroke: currentColor; fill: none; stroke-width: 2; }
    .flow { stroke: #3b82f6; fill: none; stroke-width: 2.5; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="210" y="22" text-anchor="middle">L'effet Venturi</text>
  <!-- Parois du conduit -->
  <polyline class="ink" points="40,52 150,52 190,90 240,90 280,52 380,52" />
  <polyline class="ink" points="40,168 150,168 190,130 240,130 280,168 380,168" />
  <!-- Écoulement : arrows courtes (lent) puis longue (rapide) dans le rétrécissement -->
  <line class="flow" x1="60" y1="110" x2="100" y2="110" marker-end="url(#ac)" />
  <line class="flow" x1="122" y1="110" x2="160" y2="110" marker-end="url(#ac)" />
  <line class="flow" x1="188" y1="110" x2="244" y2="110" marker-end="url(#ac)" />
  <line class="flow" x1="300" y1="110" x2="340" y2="110" marker-end="url(#ac)" />
  <text class="lbl" x="210" y="208" text-anchor="middle">dans le rétrécissement, la vitesse augmente et la pression diminue</text>
</svg>
