<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 280" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .plane { stroke: currentColor; fill: none; stroke-width: 2; }
    .force { stroke: currentColor; fill: none; stroke-width: 2.5; }
    .flow { stroke: #3b82f6; fill: none; stroke-width: 3; }
    .comp { stroke: #94a3b8; fill: none; stroke-width: 1.5; stroke-dasharray: 5 4; }
    .arc { stroke: #94a3b8; fill: none; stroke-width: 1.5; }
    .accent-t { fill: #3b82f6; font-weight: 600; font-size: 12px; }
  </style>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor" />
    </marker>
  </defs>
  <text class="title" x="230" y="24" text-anchor="middle">La portance en virage</text>
  <!-- Avion vu de face, incliné (vue arrière) -->
  <line class="plane" x1="181" y1="141" x2="279" y2="209" />
  <circle class="plane" cx="230" cy="175" r="7" />
  <!-- Composante verticale (= poids) -->
  <line class="comp" x1="230" y1="175" x2="230" y2="77" />
  <text class="sub" x="224" y="120" text-anchor="end">composante</text>
  <text class="sub" x="224" y="134" text-anchor="end">verticale</text>
  <!-- Composante horizontale (centripète) -->
  <line class="comp" x1="230" y1="77" x2="299" y2="77" />
  <text class="sub" x="264" y="70" text-anchor="middle">composante horizontale (centripète)</text>
  <!-- Portance (inclinée avec l'avion) -->
  <line class="flow" x1="230" y1="175" x2="299" y2="77" marker-end="url(#ac)" />
  <text class="accent-t" x="305" y="74" text-anchor="start">portance</text>
  <!-- Poids -->
  <line class="force" x1="230" y1="175" x2="230" y2="256" marker-end="url(#a)" />
  <text class="lbl" x="238" y="246" text-anchor="start">poids</text>
  <!-- Angle d'inclinaison -->
  <path class="arc" d="M230,131 A44,44 0 0,1 256,145" />
  <text class="sub" x="248" y="126" text-anchor="middle">inclinaison</text>
  <text class="sub" x="230" y="274" text-anchor="middle">la part verticale porte l'avion, la part horizontale le fait tourner</text>
</svg>
