<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font: 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .title { font-size: 14px; font-weight: 600; }
    .lbl { font-size: 11px; }
    .accent { fill: #3b82f6; font-size: 11px; }
    .ink { stroke: currentColor; fill: currentColor; fill-opacity: 0.12; stroke-width: 1.8; }
    .part { stroke: #3b82f6; fill: #3b82f6; fill-opacity: 0.18; stroke-width: 1.8; }
    .flow { stroke: #3b82f6; fill: none; stroke-width: 2; }
  </style>
  <defs>
    <marker id="vb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6" />
    </marker>
  </defs>
  <text class="title" x="210" y="22" text-anchor="middle">Volet et bec sortis (configuration atterrissage)</text>

  <!-- Corps du profil -->
  <path class="ink" d="M110,120 q90,-30 180,-6 q-90,20 -180,6 z" />

  <!-- Bec au bord d'attaque (avancé, crée une fente) -->
  <path class="part" d="M96,124 q-8,-12 8,-18 q10,-2 14,6 q-10,4 -12,14 z" />
  <text class="accent" x="70" y="150" text-anchor="middle">bec</text>
  <line class="flow" x1="60" y1="108" x2="92" y2="112" marker-end="url(#vb)" />

  <!-- Volet au bord de fuite (abaissé) -->
  <path class="part" d="M280,116 q26,4 44,22 q-22,4 -46,-4 z" />
  <text class="accent" x="322" y="156" text-anchor="middle">volet</text>

  <!-- Ligne moyenne cambrée (pointillés) -->
  <path class="flow" d="M110,118 q90,-16 180,-2 q22,2 40,16" stroke-dasharray="3 2" />

  <text class="lbl" x="210" y="204" text-anchor="middle">le bec retarde le décollement · le volet augmente la cambrure — Cz max plus élevé</text>
</svg>
