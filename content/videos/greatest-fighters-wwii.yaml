summary: |-
  Ce documentaire dresse le panorama des grands chasseurs de la Seconde Guerre
  mondiale et de la course à la supériorité aérienne entre les belligérants. On
  y croise les appareils devenus légendaires : côté britannique le Spitfire et
  le Hurricane (héros de la bataille d'Angleterre), côté allemand le
  Messerschmitt Bf 109 et le Focke-Wulf Fw 190 (l'ossature de la Luftwaffe),
  côté américain le P-51 Mustang (le chasseur d'escorte décisif) et côté
  japonais le Zero (roi du Pacifique au début de la guerre).

  C'est un excellent support de culture aéronautique : reconnaître ces avions,
  savoir à quel pays et à quel rôle ils correspondent, et comprendre les grands
  arbitrages de conception (vitesse, altitude, rayon d'action, protection,
  maniabilité) qui décident d'un duel aérien. Nous en tirons une fiche par
  appareil, avec les faits vérifiés sur sources encyclopédiques.
takeaways:
  - Royaume-Uni — Spitfire (rapide, agile) et Hurricane (robuste, nombreux) défendent le ciel lors de la bataille d'Angleterre.
  - Allemagne — Bf 109 (le plus produit de l'histoire) et Fw 190 forment l'ossature de la Luftwaffe.
  - États-Unis — le P-51 Mustang, décisif grâce au moteur Merlin et à son rayon d'action (escorte des bombardiers).
  - Japon — le Zero domine au début du Pacifique par sa maniabilité et son allonge, au prix d'une protection quasi nulle.
