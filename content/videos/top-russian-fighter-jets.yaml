summary: |-
  Cette vidéo est un classement (« top ») des principaux chasseurs russes. C'est
  un format grand public : il donne un bon aperçu des appareils, mais ses
  chiffres et affirmations ne doivent pas être pris pour argent comptant. Nous
  en avons retenu les avions les plus significatifs, et vérifié chaque fait sur
  des sources encyclopédiques.

  On y retrouve la grande famille Sukhoi « Flanker » — le Su-27 de supériorité
  aérienne et ses dérivés (le Su-35 très modernisé, le bombardier Su-34), le
  chasseur furtif de 5e génération Su-57 — et côté Mikoyan le chasseur léger
  MiG-29 et l'intercepteur ultra-rapide MiG-31. Un bon support pour reconnaître
  ces appareils, comprendre leurs rôles (supériorité aérienne, interception,
  frappe, furtivité) et les situer face à leurs homologues occidentaux.
takeaways:
  - La famille Sukhoi « Flanker » (Su-27) est la matrice de nombreux appareils russes (Su-35, Su-34…).
  - Le MiG-29 est le chasseur léger (face au Su-27 lourd), comme le F-16 face au F-15.
  - Le Su-57 est le premier chasseur furtif russe (5e génération), mais produit en petit nombre.
  - Le MiG-31 est un intercepteur parmi les plus rapides du monde ; le Su-34 un bombardier, pas un chasseur.
